body:
  text: 橫塘集卷三宋許景衡撰五言律詩張元光生日濶步雲霄去當年屬意深感時雖白髮許國尚丹心顧我無才思登門怯醉吟誰能將壽酒滿滿為公斟寄欽師亭障臨燕塞江山復楚鄉艱難悲客路宴坐憶禪房燒盡蒲花燭清餘柏木香十年如夢覺兩鬢自蒼蒼還自肅寧晚色可愛寄盧行之送客關城外回鞭驛路長風煙無限好簿領底能忙平野破寒木紅塵烘夕陽新詩巧模寫最憶幕中郎信步信步春風逺田家暮景遲亂畦還有徑踈竹自成籬雞犬皆豐嵗漁樵獨此時年年看節物鬢髮欲絲垂招隱堂僧家樂幽獨世路自塵埃丈室何人到重門盡日開石泓泉滴瀝竹徑月徘徊多謝相招意江湖歸去來次韻彥崇逰三洞兩溪尋勝處三洞得偕行澗外雲猶濕山深谷應聲留連看龍躍來往計牛鳴回首林間寺迹鐘報晚晴送翁修撰天上曽三接人間第一流雲章頒召節錦里送行舟急雨千山暮回風五月秋紅旗猶可識賔吏滿江頭端午節序重重過京華物物新安排黍生角粧點艾為神窮弄無來客他鄉有故人揮毫非楚些誰與弔靈均九日青女飛霜重黃花挹露鮮伊人今已矣節物獨依然撫事真疑夢登髙淚迸泉關河重回首煙草夕陽天九日追懷叔父兄長登髙殊方復嘉節對酒重悲嗟逝水人何處荒籬菊自花南樓秋色逺西嶺夕陽斜舊日登髙處于今定幾家送黃元賔還鄉寄語黃夫子而今正好行麥秋最涼冷梅雨半隂晴客路空形役鄉山獨眼明偏親應更喜少婦好家聲送世厚還鄉斷續黃梅雨清涼小麥秋謫官猶逆旅送汝上歸舟松菊宜勤種簞瓢善自謀餘生須付託可但鹿門逰過西岑泛湖而歸呈左經臣留連不覺久蕭寺足清風短棹平湖裏孤城落照中朝廷尚多難身世轉飄蓬安得言分散清尊豈易同呈吕幾仲曽作河陽客春來花滿城曉風吹玉勒殘月落金觥天末傷離索京華忽會并琵琶雙鳯翅耳冷十年聲别黃巖問我黃山尉無才亦可知頻修謝罪啓祇作送人詩壠畝豐登外山林冦盜衰曽無慰父老别後莫相思奉酬胡丈贈别蹇淺時何取蹉跎嵗又隂田園歸去計事業老來心好句煩相屬離愁自不禁松江分手處煙水暮沉沉春晚行樂連三月漁樵亦醉吟桑麻須日力花絮識春深飄泊驚時變文章信陸沉故園渺天末無限欲歸心和經臣晚春蝶散花猶在鴉藏柳已隂敢辭連日醉恐負惜春心金縷休頻唱瑶箋正苦吟獨慙詩學淺三嘆豈知音伯氏伯氏古豪士何曽與俗同酒狂天地外詩句笑談中池水添新緑林花看舊紅向來多樂事天末任漂蓬早渡浙江官舟憐逐客鳴櫓破驚湍霞氣橫江白秋風送曉寒平生獨往願今日上恩寬漸近嚴家瀨擡頭覓釣竿晚行脈脈多愁思栖栖復晚行路回村更逺林邃客頻驚宿鳥非無處歸雲自有情鄉關悵何許天際暮山橫松門詩竹轎兼程去松門百里餘荒林疑獸伏窮海異人居山擁波濤急沙輕步履虛來因王事耳此外敢躊躇送從姪邦直丞長溪阮舍淹丞屬閩山得俊髦詩書能自立州縣豈徒勞迂拙從吾老飛騰看爾曹祇應記岑寂尺素到江臯示世隆問訊吾家姪題詩寄此情遺孤猶小在聰慧乞憐生祖母今年老門風待汝成須知迹懶叔早晚欲歸耕吹臺聞説吹臺上秋來鎖薜蘿白雲長自在幽徑復誰過天末空愁眼尊前且浩歌山林與廊廟二者竟如何種樹幽谷青青樹移根倩爾栽祇疑荆棘地不稱棟梁材豈為嵗寒改稍看春色回清隂惟海國回首思悠哉翁行簡挽詩學舍賢師友年家老弟兄分符渺淮楚傾蓋憶都城白雪千篇在黃粱一夢驚承家今有子未覺負平生趙敦禮見招小飲投壺明日南去瀟灑賢公子間邀病客俱青燈初照席彩箭已盈壺隆凖真龍種清聲想鳯雛扁舟明發處應記夢華胥挽劉太君詩二首婉娩宜家早孳孳執禮勤事姑俱白髮看子上青雲飛旐隋河路新阡慎水濆哀榮兩殊絶州里未前聞配德樂邱園承家屬後昆千鍾豈榮耀一笑為平反庭樹悲風慘霜天落月昏斑衣已陳迹補衮看忠言次經臣見寄之韻召節來金闕扁舟望石門家山秋渺渺煙水暮昏昏竟失臨分語徒傷逺别魂殷勤謝池月相對宿江村次韻周共叔五首問學探前聖聲名自妙年何疑待價玉却計買山錢北極雲垂地西江水接天扁舟如有約吾亦賦歸田黃卷開三館紅塵又幾年病多須藥物旅寓費囊錢舊學寧無意斯文祇任天軒軒千里鶴可但戲芝田鄉國兵戈息仍聞大有年欲尋江上宅預辦酒家錢好句煩招隱餘生且樂天向來真可笑舍已别耘田賜環初就日弛擔又逾年老矣懷三徑歸歟有幾錢報君慚犬馬戀闕望雲天但得鄰顔巷寧論負郭田鄰並端如約追隨可判年稻粱當富嵗魚蟹不論錢春到花開處霜餘橘熟天清尊長嘯傲滄海半桑田次韻王功逹見寄烏府參風憲鯫生負德音投間雖白首體國尚丹心天上浮雲散江邊秋色深苐知歌擊壤寧復賦愁霖次韻陳仲山見寄風雨江湖夢衣裳京洛塵人生皆物役海內豈吾貧丈室雖多病鄰翁或可親杖藜元有約會見往來頻次韻似之運使奉呈左經臣兄二首江海間來久篇章老更新蒿萊猶自飽天地豈吾貧舊友今持節諸郎亦可人應憐未歸客白首尚紅塵酒膽他年大詩名近世無山林多避冦里巷笑為儒老去慵開眼秋來欲染鬚涼風千萬里的的為南圖寄許樂清沖輔入竹空陳迹經行憶嵗除舊遊誰更在逸興近何如樹密鶯聲逺江寒鴈影踈樓頭紅日晚徙倚獨躊蹰曽汝器既别奉寄憶在西齋日斯文得細論别離空嵗月飄泊任乾坤把酒餘風味看雲各淚痕扁舟獨歸處煙水暮昏昏余與汝器皆有哭弟之戚寄張德祥細草碧侵池幽花亦滿枝羣生俱有德造物定誰私故國春將暮他鄉日自遲論文一樽酒何路得追隨寄竹閣臣師鹿苑西湖上烏臺北斗旁塵沙空自老雲外定相望林麓餘秋色郊原半夕陽惟應閣前竹凛凛帶新霜寄沈亨老時在京師京國三千里人來慰所思遙知為客好何似在家時春日鸞凰去秋風鴻鴈悲衣裳慈母線亦恐汝歸遲寄薛十七巨源茅屋西山曲擕書喜見過别離驚嵗月淹泊奈時何末俗皆浮誕斯文肯琢磨後生餘力在吾意已蹉跎寄錢子勉花縣逢迎日琴堂宴坐頻簿書時有暇燈火夜相親世系皆王澤官曹獨海濵政成飛舄去念别一傷神寄題張學士三徑堂二首留侯有髙致世業更誰傳苕霅新開徑蓬瀛舊集仙藜床蔭松桂蕙帳帶雲煙擾擾爭毫末何人解樂全我欲尋三徑長歌歸去來未能似夫子還是走塵埃彩筆臨流賦清樽對菊開披榛往來處東望思悠哉縱目軒詩真人已仙去釋子在髙岑暮色江山逺春風草木深何人與題詠今我亦登臨縱目皆云爾誰知有縱心行役詩行役無時節春來又幾時柳條隨處處梅蘂亦枝枝弱質曽無取斯文祇自宜眼邊新物色駐馬暮江湄石泉小軒泉裂碧巖腹茲焉復小渠泓澄元有在溉濯乃其餘孤迹寄江海三年困簿書間來俯清淺感歎獨踟躇土山驛詩在永靜軍界時被檄濵州渺渺指滄海行行過漢陵衣裳千里雪鞍馬九河氷寓宿適有處悲歌自不勝平生少遊語耿耿對寒燈晚晴南州苦卑濕梅熟復何如老夫厭巾屨稚子在泥塗新月出天末微涼生雨餘陶公入州府此興與誰俱天街經暑雨烏府絶塵氛躍馬人皆散新蟬我獨聞風生初罷扇日轉漸無雲寄語同時客清涼尚可分駐馬詩駐馬長河曲穿林小徑斜猶能尋隱逸可是厭泥沙軒冕雖無意田園尚有涯何時策笻竹隨意到山家無題台奴初學語丹子已能行問叔今何處嗔爺太懶生會令主門户豈復意功名坐對江湖晚橫塘舟自橫野外野外連荒草樓頭正夕陽憑欄空逺目何處是吾鄉王粲從軍樂少陵羈旅傷男兒知底事出處兩難忘宿僧房捕逐雖王事經行亦自強艤舟當海島寓宿得僧房絶境三山在清風一水長此生空物役回首意茫茫夜過杜家村駐馬問村老却言行未遲路雖十里逺月到四更時我去良有役子眠寧負期人生隨意好冷笑一題詩送師顔致康深道入京二子今西去贈言聊爾規勉哉精素業行矣仕明時破臘梅先蘂含春柳欲絲江邊人散後帆影漸參差上章倅二首海內名聞久江邊嵗復期美才由世濟清節畏人知郡國已無事朝廷方有為會參鴻鴈序歸去鳯凰池簿領勤官府聲名振士林雖云心尚在自覺力難任嵗月淹多病江山入苦吟髙堂昔三嘆亦恐負知音逺意逺意誠難問狂歌自不禁花光春灼灼月色夜沉沉簡册終何事江湖獨此心野禽多意緒飛集近寒林橫塘好在橫塘水人今去幾年秋光空到地霽色自連天伐石圍髙岸誅茅駕短椽歸歟此心在何苦利名牽節物詩江水西風急江天作暝隂鄉山猶在眼節物莫驚心是處皆秋穫誰家急暮砧薄遊愧妻子飄蕩到而今聞子瞻南遷隴蜀﨑嶇外炎荒聞望中黑頭方世用青眼忽途窮遂作天涯客何如塞上翁幽愁還有作笑殺贊皇公賀人祖父生辰青春嘉誕日八十渭川師林下有真樂人間無愧辭松梢看舞鶴荷葉隱巢龜賴有榮孫子藍袍薦壽巵贈吳子思花縣初相見清樽日笑歌交情論厚薄客路自蹉跎歷歷功名意駸駸嵗月多豈知同夜宿還問命如何贈姚儀甫年少開千卷生涯祇一瓢聲名動場屋意氣在雲霄素髮今垂領青衫尚折腰未應輕斗祿吏隱本逍遙贈張承老永裕躬神武開邊絶漢西雖云擁貔虎猶未斬鯨鯢吾子名家後當年訓士齊天涯思往事回首祇悽悽題壽聖院古寺重門裏回廊一徑幽水聲長帶雨山色最宜秋寓宿已多日題詩更少留此生隨利祿行路日悠悠寄題葉希聖申申亭燕處厭紛華穿林一徑斜層巒開水墨古木走龍蛇事業雖無補田園尚有涯何時策笻竹隨意到山家每向新亭去何曽問主人弟兄俱有好樽俎自相親棲翼雲山晚飛花洞府春長愁醉歸去步步近紅塵孫大夫絶塵亭詩丈人樂高曠閲世等樊籠池館重城外塵沙一笑空紅蕖新過雨修竹自生風未必全違俗杯盤與客同池上十里西城去春風水拍堤畫船簾幕動别殿管絃齊勿覺仙山逺相將醉路迷紅塵競回首斜日杏花西螢不知何處出牢落水村邊隱隱猶含雨飛飛欲近船詩書看老矣事業尚茫然今夕知何夕篷窗猶未眠去國詩書元有志耕養苦無田去國何為者題詩獨慨然廟堂修政事郡國奏豐年五斗雖云薄餘生得醉眠升之兄見訪竹閣飛蓋山城外尋幽鹿苑中層軒不受暑修竹自生風江海多年别杯盤一笑同平湖吞晚照歸棹惜匆匆寄題會文閣劉子天台去君今幾代孫山居多水石客至亦琴樽簿領嗟淹泊詩書失討論何當謝羈束杖策過層軒亞叟惠臘粥次韻飛琯迎長後香糜入臘新交情最憐客節物獨驚人雲意安排雪梅香告報春病中踈酒盞兀坐惜芳辰再和河南聞譽久漢上定交新遺粥聊從俗題詩更可人歸期恨不早旅思怯逢春他日從誰餉長懷臘八辰邱隱夫傳神曹霸逢佳士殷勤為寫真今君仍妙筆顧我獨何人軒冕曽無意功名敢問津會須添杖屨却作自由身挽左司江公前輩風流逺惟公尚復存此心無限量所得有淵源眷奬深宸扆聲名重諫垣平生經世志已矣復何言壯嵗從淡泊猶餘味道心今朝嘆流落羇旅老侵尋庾嶺暮雲合釣臺秋水深向來逰歷處千載只如今憲府叨新渥京華會卜居迂踈慙瑣瑣許與獨渠渠酬唱看遺墨漂零送輤車他年桐水上雪涕更躊躇樓朝議挽辭金閨早通籍銀兔屢分符文采傾簪笏謳謡足袴襦聯榮看子舍從養亦神都八十終天祿朋儕更有無東南獨耆德湖海老門生未厭遺簪舊頻煩倒屣迎音容忽𡨕漠嵗月又崢嶸夢入鄞江路依稀晚柝聲送吳師常吳君久羇旅所至即為家傾倒賢人酒浮遊仙客槎此身惟願健萬事儘從他聞説今歸矣田園亦有涯送蕭德宏孤嶼何時别雙溪纍月留父兄安契濶庠序得優遊宿霧散初日春風乘去舟好看清汴水渺渺帶伊流送李季成花入新年好傳觴日倚欄故人從此别春色更誰看灑落餘篇翰芬芳識蕙蘭片帆天際晚回首獨江干送李忠彥留滯嗟為客而今始據鞍梅花春信早星斗夜堂寒此别十分飲何時一笑歡勞生強半在見晚不須歎送德祥四首借杜子美首句天上張公子河間善最多三年種桃李萬室自絃歌北闕今歸去斯民奈别何會將清禁月千里照嘉禾縣之西堂天上張公子同時桂籍人江湖嗟迹逺關塞獨情親鴻鵠寧無志驊騮已絶塵音書憐舊好别後莫辭頻好去張公子依然别後深霜清風槭槭野曠馬駸駸奕世皆榮問連枝復好音青雲多意緒寧復故人心好去張公子離歌盡一尊朝廷方北顧父老惜南轅禦侮從先志招擕亦舊恩須君對宣室為我折羣言挽元僧正物外孤髙客人間九十春朋逰多有道學子略成塵仙嶺浮雲散寒潭夜月新孤生長感愴先友更何人景城雜詩六首井邑遺孤壘漁樵尚幾家洪河散陵谷古冢入桑麻燕子初經節蜂兒幾報衙此身天地內隨處是生涯故國豈不好卑官良為貧驅馳萬里去憔悴九河濵亂水才通野幽花已繡春天公渾不惜乞與作詩人藜藿晨昏外詩書寤寐間百年皆物役五斗愧身間暖日花爭發春風鴈欲還杖藜俯清淺蕭颯鬢毛斑誰道邊城逺春風也自來咿啞林鳥囀細碎野花開日壓初晨霧龍驚昨夜雷郊原間駐馬極目絶纎埃燕趙當南北關河獨鬱盤時平無戾氣嵗閏有春寒仰祿家千里題詩思萬端危樓多晚照倚遍小欄干氷雪初消凍關河已見春民居樂豐嵗吏隱是間人黃水魚偏美青簾酒亦醇吾生如有計五斗未為貧任夫人挽詞宋國保母榮養方南國安輿更北轅從容對孫子聞問及平反無復承顔樂猶餘在耳言會看墳上柏千尺倚髙原寄兄長江上分擕日樽前聽我歌安居是非少遊宦别離多陋巷從顔子斯文續孟軻平生端有意嘆息自蹉跎寄三十九兄伊昔初分袂于今幾度秋鵷行慙北闕鴈序憶南洲湖海誰招隱塵沙獨倦遊平生一樽酒好在謝公樓次韻兄長見示二首拜命辭南國擕孥客上京塵沙驚老眼江海夢歸程釃酒誰思我看雲賴有兄遙知倚欄嘯天濶暮潮平此境本無塵端居更可人林園稍成趣風月轉相親暇日已卜築他年待乞身絶勝貪夢好臨老種松筠翁老過邑百里絃歌地别來俄至今江山已陳迹桃李漫餘隂白髮心猶壯清歌酒屢斟何妨鎮還往眷眷吏民心酬盧行之緑分氷片碎金拂柳絲長臘雪猶含凍春風何太忙會看鶯出谷不羡鴈隨陽誰憶江梅發風流八米郎次陳留裋褐驅羸馬依然寒氣侵春風官柳細紅日雪泥深藹藹多佳氣飛飛亦好音寧辭去家逺魏闕舊馳心欵某大理墳丹筆持平久清時屬望深誰憐一壞土長負百年心舊友多髙誼諸郎亦好音獨慚門下客流落但悲吟姨母薛夫人挽詞不獨相君子仍聞教子功安輿四方外色養百年中隴畝唯先樹江湖獨轉蓬凋零驚母黨涕淚落秋風趙表姪出先德彥章詩卷晚路嗟流落長時任鬱陶故人今地下新句出兒曹野潤春風早霜清夜月髙杯盤舊行樂江水日滔滔和陳澤民見寄涉世真堪笑論交愧未忘先生已髙遁賤子尚他鄉簿領三年夢塵沙兩鬢霜扁舟歸未得春水滿橫塘逗曉逗曉復籃輿平田細路迂村墟元闃寂籬落更蕭踈吠犬行隨客癡童喚覷渠從來喜淳朴况復野人居海上江濶渾無際潮平更不流魚龍方鼓躍鳬鴨共沉浮别岸多雲樹斜陽一釣舟蓬萊如可到當與子同逰和左經臣移居暑往衣仍葛秋來甑尚塵北宫尤養勇東郭故安貧去國經時久臨江卜築新未能供祿米愧爾少陵人五言排律王義夫召飯鼇山亭詩海上聞三島人間占幾州孤城臨鳥道雄構壓鼇頭縹眇層軒外縈紆一徑幽鳴琴常有暇飛蓋許同逰平野連天濶洪河繞塞流清風驅酷暑畏日得新秋麥破銀絲淨茶烹玉蘂浮官聨慙蹇淺恩紀獨綢繆牢落登髙賦驅馳為食謀從公時晤語不復歎淹留寄劉元禮東郡趨鋒召西雍振羽儀微言元自得夫子更誰師文物今為盛賢能衆不遺秋風看雕鶚碧海盡蛟螭妙選追前輩髙標照一時綵衣供戲樂絳帳欲歸遲念昔羣居盛論文非我私艱難良自信出處不無疑騏驥方千里鷦鷯但一枝田園日牢落浩蕩故山期
