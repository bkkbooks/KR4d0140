body:
  text: 橫塘集卷十三宋許景衡撰啓余待制賀正啓鳳歷自天端示歲時之始雞圖在戶亦為風俗之常恭惟某官陳義甚高樂善不倦禁塗持橐受一人之眷知海國分符真千里之師帥柏葉既伸於壽祝茅茹方慶於彚征賜環言歸指日可待良深欣忭曷既敷陳提舶蔡學士賀正啓伏以歲元肇始蓋禮交樂舉之時陽德寖亨有小往大來之吉恭惟某官文筆絶俗風采照人漢法備於三章允資潤色蠻琛來於萬里暫屈總臨茂對新春坐膺純嘏柏葉已稱於壽祝茅茹方慶於彚征超升之恩倚立以俟某屬縻簿領阻造門闌下情無任欣頌之至提舉張大夫賀正啓上詞同前某官精忠許國美利在民茂對三朝柏葉方傾於壽祝前趨一節茅茹行慶於彚征進據要華以究施設某備員屬部逺迹使臺猥沿簿領之拘縻莫綴門闌之慶謁下情無任祝頌之至運使修撰賀正啓上下詞同前某官誠心及物德望在人善遇吏民得部刺史之體不遺故舊有古君子之風判府陸中丞賀正啓上下詞同前某官忠嘉體國豈弟在民擢總臺綱凜然先輩之風采屬意人物允矣大臣之規模上運使陳龍圖賀正啓鳳歷自天端示歲時之始雞圖在戶亦為風俗之常恭惟某官東南偉人搢紳先達職清邃閣是為要顯之階德重外臺尚淹刺舉之任屬三元之肇序宜萬福之來同即慶賜環遂班持橐某方縻簿領阻拜門闌敢持咫尺之書仰祝百千之壽張提舉王提茶賀正啓上下詞同前某官忠孝承家果毅從政南閩刺舉善譽固已翕然北閣褒延異數屬諸賢者翁修撰賀正啓上下詞同前某官朝廷雋人搢紳先達職清東觀方新論撰之榮任重南閩再總轉輸之寄建州判府蘇待制賀正啓上下詞同前某官東南偉人搢紳先達剖符南國甫當報政之期持橐西清式遂承顔之寵汀州知郡建州通判賀正啓上詞同前某官風采照人文華絶俗南閩剖竹茂宣豈弟之風北闕賜環行拜褒延之寵屬三元之肇序宜萬福之來同某猥以阻修缺然慶謁其為祝頌實倍品倫賀正啓伏以鳳歷自天端示歲時之始雞圖在戶亦為風俗之常恭惟某官世德在人天才絶俗握蘭中省早膺上聖之知分竹南州特峻一方之寄履兹令旦密介繁禧某屬以居間阻趨慶謁是為祝頌未易敷陳代人賀正啓肇元歲始蓋禮樂交舉之時觀象泰亨有小往大來之吉某官高才絶俗俊望在人抗斧列城暫奉將輸之寄賜環清禁行躋侍從之聨茂對令辰坐擁休祉某竊官末局託庇使封敢沿尺牘之書仰祝百千之壽欽惟陰相符此願言上判府陸中丞賀冬啓伏以七日陽來故受之復五雲物色以望而書恭惟某官造道精微執德洪毅正色獨立糾肅百官至誠不欺師帥千里讜論既亦明驗清衷益當見思屬兹至日之長即拜自天之命進位廊廟均福生靈某荷眷門墻縻身簿領莫前參慶徒劇頌瞻運判鄭學士賀冬啓上詞同前某官豈弟在民忠嘉體國道山寓直英俊樂與並遊閩嶺轉輸兵民為之兼足屬剛陽之寖長與盛德以俱亨召擢之期倚立以待某猥沿孱陋實荷庇存方祗役於簿書阻參慶於墉屏其為祝頌未易敷陳提舉張奉議提茶詹大夫賀冬啓上下詞同前某官豈弟在民忠嘉體國金閨通籍擅偉譽於公朝繡衣乘軺凛清威於屬部蔡提舶賀冬啓上下詞同前某官望重南州職清中祕衣繡抗斧有使者之光華平市上旌紛逺人之嚮慕興化權郡孔朝請泉州權府李奉議賀冬啓上詞同前某官天資高明吏事精敏金閨引籍擅偉譽於搢紳皂蓋臨民凛清威於郡國屬剛陽之寖長與盛德以俱亨召擢之期倚立以待某托身冗役邀庇鄰封方爾拘縻缺於參慶其為瞻頌實倍品倫運使翁修撰賀冬啓伏以緹室飛葭慶剛陽之肇復繡工續縷知愛日之初長恭惟某官天才不羣宸衷彌寵肅將使指三膺帝命之申嗣奏歲功七更雲物之瑞屬兹道長宜與時亨進班持橐之榮益攄及物之澤某荒唐無取庇賴有歸方爾拘縻缺然參慶雖竭誠於祝頌猶愧訥於形容瞻望台庭下情無任欣悚之至運使陳龍圖賀冬啓上詞同前某官天資高明人望顯赫西清峻秩尚淹持斧之行南至令辰宜擁自天之祐倚須嚴召進陟從班某久荷撫存屬兹縻繫捧觴稱壽雖有阻於奔趨拈紙寓辭寫無窮之祝頌陸中丞賀冬啓上下詞同前某官名重本朝才高當世霜臺執法暫辭耳目之官玉殿賡歌行預股肱之喜屬書雲物茂擁天休提舉張大夫提茶王大夫賀冬啓上下詞坰前某官陳義甚高樂善不倦繡衣出使方宣持斧之威華衮推褒行被賜環之召屬書雲物茂擁天休余待制賀冬啓上下詞同前某官德在羣黎名高法從承宣郡國已看鼓舞之兒童賡載廟堂行見後先於伯仲屬書雲物茂擁天休提舶蔡學士賀冬啓上下詞同前某官忠孝出於天資辭翰本諸家學錦衣故里赫然持節之榮華衮言行美矣賜環之召履兹令序密介繁禧汀州知郡大夫建州通判大夫賀冬啓上詞同前某官體國忠嘉愛民豈弟千里安堵咸歸及物之仁萬彚滋萌宜享自天之祐倚須召節進陟要塗某託庇寶鄰偶拘賤役莫遑稱壽苐劇馳心瞻望門闌無任祝頌之至上運使陳龍圖賀冬啓至日之時方候陰陽之定卦爻之復遂觀天地之心恭惟某官厚德鎮浮至仁及物西清寓直英雋樂與並遊南國轉輸兵民為之足食履兹令序密介繁禧某猥以孱微槩於庇覆屬拘賤職阻詣崇閎翁龍圖賀冬啓上下詞同前某官厚德鎮浮至仁及物河圖入直英雋樂與並遊閩部轉輸兵民為之足食李提學賀冬啓上下詞同前某官重德鎮浮懿文華國出將使指多士已被於作成入副簡求上聖方資於獻納張提舉王提茶賀冬啓上下詞同前某官厚德鎮浮至誠格物出將使指屬部已被於澄清入副簡求上聖方資於獻納建州知府蘇修撰賀冬啓上下詞同前某官庠序宗師朝廷元老揮毫祕殿文采固已絶人分竹閩山豈弟見於善俗福州判府陸中丞賀冬啓上下詞同前某官厚德鎮浮精忠許國烏臺抗疏風霜已肅於姦回虎節偃藩錦繡有光於閭里屬剛陽之來復與盛德以俱亨即慶賜環進躋要路某夤緣猥職奔走外郊不獲奉觴祗前稱壽汀州知郡李大夫賀冬啓上下詞同前某官陳義甚高樂善不倦承流千里藹聞襦袴之歌入覲九重行拜絲綸之寵履兹令序密介繁禧屬以拘縻缺然慶謁永言瞻頌實倍品倫建州通判李朝奉賀冬啓上下詞同前某官賢臨一時名重多士二車淹德方播海沂之歌三節追鋒行拜宸綸之寵賀石司諫啓伏審拜命宸廷升華諫省伏惟歡慶恭以某官山陰秀傑江左名家文章出於天才議論當於上意南臺簪筆獨推執憲之威右省露章而有敢言之氣眷七人之在列乃一德之明揚前挹獸尊蓋臨大節為難也進瞻龍衮夫豈小補之云哉方振迅於要塗行躐躋於從槖益攄賢業光輔聖朝顧已拙疏逺依庇賴屬塞垣之有守慶賓廡以無階惟是欣愈實倍倫品代賀陳禾張義直兩正言啓伏審光被制恩榮升言職伏惟歡慶恭以某官賦才彌劭養氣至剛頃繇主上之知遂膺天下之選凛然風采早參三院之遊盛矣宸廷密次七人之列方激昂於要路行擢任於榮塗光輔聖朝益奮賢業顧惟疏薄方此瞻依屬假守於塞垣阻趨慶於賓席惟是欣懌未易名言代賀某正言啓伏審祗奉詔恩榮升言職聞者相慶翕然一辭知朝廷之用賢宜士民之被澤伏惟歡抃恭以某官天資爽拔經術修明擢自聖知置之要路豈碌碌自汨於流俗方挺挺追配於古人議論雍容啓沃間燕蓋君子常惡訐以為直者則仁人之為利豈不溥哉服豸之威已超騰於三院補衮之闕仍密次於七人矧日侍於清光行併推於異數屬臨邉閫阻慶賓閎欣誦之深敷陳罔既賀翁修撰啓伏審光奉制恩榮升論撰訓詞甚寵清議交孚伏惟慶抃恭惟某官忠孝本於天資詩禮傳於家學少年庠序文采爛然一時弟兄聲名籍甚受知上聖出刺南閩霜臺歘振於紀綱晝錦獨榮於鄉黨環千里部封之廣如在目前總八州賦調之繁運之掌上於昭偉績密簡淵衷列職西清已峻河圖之直摛文東觀重增使節之華矧異數之相仍如百川之交湧行慶褒延之詔入躋侍從之聨多士所期斯言可必某蒙恩優渥聞命歡欣祝頌雖陳敷宣罔既賀梁修撰啓伏審光被茂恩超升華序除音始下輿頌交騰伏惟歡慶恭以某官名重縉紳才周事物將漕朔部已足食於兵民弭節常山方折衝於樽俎屬河渠之報政渙綸綍以疏榮雖聖孝格潤下之祥實賢德有赴功之助劉向都水之政已謝前聞千秋富民之封方須逺業某承乏帥閫託庇使臺雖慶謁之未前苐欣愈之無斁代賀梁修撰啓伏審祗拜詔恩升華書殿河濵父老慣迎使者之車朔部山川復見漕臺之節凡繄庇賴舉切欣愈竊以麗正為官舊兼書詔本朝正秩惟寵忠賢身雖逺於闕庭職獨清於禁省凡預此者莫非傑然恭以某官聖世偉材相門名胄自任古人之重上當明主之知一與選掄寖更要劇漢使都水嘗道河於二渠禹迹隨山乃為壑於四海洪惟逺略克繼前修維時疇庸是宜因任畀之撰述委以轉輸豈惟儒者之榮實峻使權之重飛芻挽粟暫勞講畫於邊郵經體贊元行見後先於伯仲某幸沿閫寄逺借德輝念展慶之未遑徒傃風而增企代賀鄭資政啓伏審顯頒中制光被茂恩虛席鴻樞雖重違于勤請疏榮祕殿仍俯極于優褒伏惟歡慶恭以某官卓然之才輔以所學少年庠序聲稱固已絶人一門弟兄文采皆可為法頃由君命亟踐要華西府判花繹溫言而作命北門視草贊樂育以成書屬疇咨于明廷爰圖營于巨德除音已布瀝懇固辭俾使琳宫而奉朝仍侍金華而勸講上非得已始徇至情士之有知舉高清節然蓄道德之富則貴乎兼濟任將相之重烏可以小嫌歷數前修固當跂吉甫之盛也敷求一德尚庶幾伊尹之憣然士論企同天意有待代賀盧中丞啓伏審拜恩宸廷進職憲府除音一出歡頌四騰伏惟慶慰恭以某官養氣至剛造道自得發揮六藝之淵懿貫通百家之支離親遘盛時躐升要路總臨殿省六尚居服御之嚴樂育儒宮三舍復賓興之盛蓋使人有君子之器故得賢立太平之基協贊聖功前追古治惟時專席實長南臺正百度於朝綱論一時之人物允為妙選斷自清衷風采所臨觀聽皆聳朝廷執法暫須耳目之官廊廟賡歌行預股肱之喜清議所屬斯言不誣某猥以拙疏嘗叨遊舊雖聞命而喜甚顧展慶之缺然永言傾馳未易敷述代賀兵部吳執中侍郎啓伏審拜恩天陛二職夏官詔語推褒士論欣愜伏惟歡慶恭以某官賦材強濟植操端方以忠勇結主知以儒雅飾吏事諸艱歷試所臨有稱仰惟淵衷每慎中臺之選就加寵數遂躋從橐之榮矧掌國之五兵以佐時之九伐天聲逺暢方資文武之才國論所咨行有謀猷之告某猥臨邊閫坐逺崇閎愧祗慶之莫前徒馳情而彌切代賀禮部李侍郎啓伏審光膺帝詔榮二秩宗大賢序遷多士誠服伏惟歡慶恭以某官學優聖閫名重賢關在昔元豐首預英才之教育逮兹大觀輔成聖學之光明曾日月之幾何已清虛之歷踐惟是文昌之妙選獨高宗伯之亞卿式和神人尤重賓祭執事郊廟已對越在天之靈秉國樞衡當潤色繼志之政超進之拜佇立以頒某猥以空疏逺借輝潤未從慶謁之列莫量傾頌之私代賀何學士啓伏審被命嚴宸進職東觀伏惟歡慶恭以某官摛文早歲擅譽盛時跂德履於前修謹義方於左省他日獨立嘗趨學禮之庭三年不飛俄奮沖天之翼論著乃其漸也清切蓋有待焉經體贊元方君臣千載之遇銜訓嗣事乃父子一門之榮超升之期倚立以俟某備官塞閫荷眷慶闈聞成命之誕頒劇私心之欣躍尚稽趨賀徒切瞻依代賀吏部慕容侍郎啓伏審光膺帝制進二天官除目四傳輿情胥協伏惟歡慶恭以某官自任以古人之重躬行為學者之師亟被眷知寖邀寵渥揮翰西掖逺追煩悉之書論兵中臺作成勇果之氣眷惟小宰榮絶文昌激濁揚清大振一時之風俗崇德黜惡實為多士之權衡得賢者處乎其間則人材可以無慮分二銓之掌方推藻鑑之公歌庶事之康行預股肱之喜某備官逺守竊照餘光展慶未間傾仰彌切代賀侯侍郎啓伏審光膺帝制進二天官士林有光省闥增重伏惟歡慶恭以某官淮海之傑庠序所稱筆陳堂堂坐却萬夫之敵談鋒落落遂令四壁之空十年周流江湖之間一日自致雲霄之上代言西掖富於文華論駮東臺好是正直眷惟小宰榮絶文昌激濁揚清有補一時之風俗尚賢黜惡實為多士之權衡自昔不輕畀之於今乃屬賢者除音始下輿議交欣甄拔人材公嘗以此而自任進斷國論上方有意於仰成顧惟卑庸實借輝潤屬帥垣之有所造賓廡以無階慰抃之深敷致難盡賀戶部洪侍郎啓伏審光膺帝制進二地官除目喧傳輿情恱服伏惟慶慰恭以某官懿文照世榮問動人頃繇眷知荐更任屬抗斧出使利澤被乎兵民授鉞開藩威聲懾乎冦敵顧分外寄未究壯猷惟神考釐正於文昌而國用獨專於民部平居之論每難其人既屬高才夫復何患上資邦計賦不益而用饒下叶民聲財有餘而頌作懋兹嘉績簡在宸衷廟謨方俟於贊襄省闥豈遑於淹久式符公議何獨愚言某適綴守符阻慶賓席惟是嚮往未易名言賀翁侍郎啓伏審顯頒帝制擢二地官侍從惟賢朝廷增重伏惟歡慶恭以某官學周今古名重搢紳昔者傳聞已見九齡之有作得諸談笑尚期七步之成章頃繇眷奬之殊荐歷輸將之寄心計綽有餘裕意匠舉無不能坐振臺綱稜稜使者之風采區處人物凜凜大臣之規模十年于兹七閩兼足眷惟版部實總邦材顧在廷豈無人哉而裕民莫如公者賜環承命載路歡謡倚慶司徒之成功進登冢宰而制用關中粟腐不獨前聞地上錢流請從此始某天涯冗吏門下散材猥沿覆庇之私曾冒荐論之寵恭聞榮拜倍愜感懷屬以拘縻阻於慶謁瞻望台庭下情無任代賀工部賈侍郎啓伏審光膺帝制進二冬官凡預見聞舉皆欣爽伏惟歡慶恭以某官才高世胄名重相門能任本乎效忠銜訓可以嗣事被眷宸扆贊治帝畿聰明過人滯務資於一掃公恕及物清操至於屢空豈惟賢業之不羣抑亦聖朝之盛美宜峻文昌之擢徑躋從橐之榮水土惟修上贊九功之敘廟堂致理即歌庶事之康時乃輿言顧非私禱某竊官關塞方爾拘縻企首門墻尚稽慶拜惟是欣頌未易名言
