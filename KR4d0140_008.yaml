body:
  text: 橫塘集卷八宋許景衡撰表代賀紫芝表協氣橫流珍符委至一人有慶萬邦咸休中賀竊以再闢河湟肇自仁聖雖曰復古之迹實昭繼代之功德既洽於淵泉瑞乃形于草木稜層挺秀萃天地之英華雜沓縱觀駭縉紳之耳目允契千齡之運豈比九莖之歌恭惟皇帝陛下孝通神明恩被動植受此天申之命燦然地産之祥燕及羣生咸獲嘉祉臣叨蒙宸眷逺守帥垣獲覩殊休莫預四方之來賀式傾善頌永言萬壽之無疆天寧節賀表上帝眷命用寵綏於四方率土傾心祝誕彌於良月中賀恭惟皇帝陛下以神明之德繼天地而生憐憫下民蔽於逐末照臨中國悉俾還淳俗既格於不迷人宜錫以難老茂享無疆之壽式符有道之長臣叨綴邇班屬拘逺守歸美以報咸歌天保之詩與物皆昌竊效封人之祝代賀宗祀表致享合宫神天昭格孚號率土福祿攸同盡日月之照臨均手足而舞蹈中賀竊以宗祀配帝所以得萬國之歡至德順民不獨教諸侯之孝若古有訓惟聖為能恭惟皇帝陛下純誠祀天明禋備物既右烈考欽承如在之神延及羣生皆知必至之惠禮行榖旦慶浹綿區無疆惟休自今其始臣叨持從橐假守帥垣丕顯丕承雖弗獲從清廟之奔走我將我享尚庶幾美盛德之形容臣無任代賀降西蕃王子表天威逺暢蕃部來降慶在一人歡傾四海中賀竊以湯聖昭假氐羌莫不來王舜德誕敷苗民無復逆命適當盛世度越前聞恭惟皇帝陛下睿知有臨神武不殺招擕懷逺方絶域之咸賔慕義向風有名王之樂附於昭偉烈益顯貽謀臣假守逺藩欣聞慶事同四方之賀雖忝近臣上萬年之觴阻陪都護臣無任代賀環慶捷奏西蕃偽王子降表赫然天討洊奏捷書蠢爾羌童聿歸聖化朝廷多慶海宇均歡中賀竊以有此武功周王既伐於崇國誕敷文德虞帝遂格於苗民屬我熙朝萃兹休烈恭惟皇帝陛下雷霆震疊天地生成鞠旅陳師運神謀而折馘招擕懷逺致異類以來庭蓋威之所制者不愆故德之所加者彌廣於昭顯烈坐格丕平臣叨綴近臣恭聞盛事四方來賀悵江海之獨遙萬夀無疆望雲天而傾祝臣無任賀河清表駿命有歸篤生千載之上聖澄瀾告瑞乃在九河之下流凡屬照臨孰不鼓舞中賀竊以靈源五色實兆帝王之作興曠世一清概見古今之紀述雖曰流傳之不妄猶患寂寥而無聞事出非常理宜有待惟章聖之在御有靈寶之發祥聳動綿區焜耀方册創業垂統傳休德於無窮繼體守文格珍符之委至矧乾寧建壘之所當洪河入海之衝會原委以來同宜休嘉之濬發於昭景貺厥邁前人恭惟皇帝陛下宅心唐虞比肩文武上帝之所眷佑斯民永有依歸孝極奉先水皆潤下流而不雜湛分千里之渾渾巍乎有成慶在一人之穆穆臣叨持從槖假守塞垣眷此殊禧見于所部河水九折有再出之榮光天子萬年敢對揚於休烈臣無任代人除蜀漕表井谷無與敢期當寧之知雲漢為章忽降自天之命輟北道之斂散總東蜀之轉輸拜命非常撫躬增栗中謝臣東南冷族江海微生少也無竒徒服勤于簡册長而不競亦濫綴于搢紳昨玷睿恩再將使指坤維萬里河朔二年每自勤于驅馳冀少酬于生造鴻私無極冗役少安重念先臣受知神考進登禁從出守帥垣首尾三年之間委曲十行之詔料敵嘗稱其慎重眷留仍許以忠誠蕞爾諸孤雖不廢箕裘之習惕然小已實恐貽門户之羞豈意上簡淵衷親紆宸翰追懷往遇復賁後來粲然奎壁之文逮兹牛馬之走亟蒙嚴召入奉燕間獲伸欵欵之愚少盡拳拳之義屬之以將漕大計戒之以鎮拊小民欽若聖謨具昭德意重沿家世而敦奬實為存沒之至榮兹蓋伏遇皇帝陛下大德并包至明旁燭制治無有逺近俗已大同録善及其子孫人皆知勸致兹疏冗亦被寵光敢不勵夙昔以飲氷視險艱而叱馭世濟其美雖有愧于前修父教之忠誓不渝于素守庶幾塵露仰報邱山臣無任謝御史中丞表臣某言伏奉告命除臣試御史中丞尋具狀辭免蒙賜詔書所請宜不允者起廢瑣闈已誤甄收之渥執憲烏府重叨超進之恩自惟積釁之餘且困纒疴之久忱辭懇迫竊效於循墻溫詔丁寧莫回於渙汗靦焉拜命惕若臨淵中謝伏念臣一介迂愚半生齟齬自備使令之乏洊膺簡拔之私頃綴臺僚嘗汙言路既不能指陳時政又不能糾正官邪卒以曠瘝自貽斥逐比蒙抆拭蓋出矜憐講禮奉常兼冒銅龍之直試言禁掖旋陪金馬之遊未酬天地之生成已歎風波之流落粵從去國惟日省愆奉香火於祠庭獲安故里竊斗升於賜廪重愧空餐方國步之多艱慶龍飛之在上四方傾耳須號令之更新多士屬心知朝廷之求舊維時風憲宜得忠賢顧巳試而無堪敢強顔而冒處恭承明訓莫遂牢辭蓋人臣事君在於勿欺而王者用人亦常使過苐慚暗劣莫副明揚兹蓋伏遇皇帝陛下勇智表於萬邦孝悌光於四海拯國家巳墜之緒紹祖宗無疆之休去凶邪而登俊良咸欣千載之遇修政事而攘強敵即迎二聖之歸有如薄識之庸愚亦預中興之選擇臣敢不益堅素守勉蹈所聞雖一簣為山敢云或止而萬折之水要在必東永肩此心以報殊寵臣無任辭免右丞表臣某言伏蒙聖批除臣尚書右丞尋具劄子辭免繼奉詔書所請宜不允者祗被異恩擢陪大政凡才蹇淺亦既力辭溫詔丁寧未蒙賜可敢再傾于誠懇仰多冀於矜從中謝伏念臣起自江湖之間辱在紀綱之地徒以朴忠而自獻不知狂易之為非惟時艱虞無裨聽納曠官之罪宜正典刑陟明之恩乃司丞轄上焉有紊於國體下則深纍於臣私伏望皇帝陛下大度兼容至明旁燭雖命不可易初或誤於出綸若事得其宜亦何嫌於反汗俯躬以俟得請是期臣無任謝右丞表臣某言伏奉告命特授臣中大夫守尚書右丞特封瑞安縣開國男食邑四百户尋具表辭免蒙賜詔書所請宜不允仍斷來章者總憲府之紀綱初無顯效陟中臺之管轄復玷殊恩亟疏孱微仰祈照鑒再瀆巳寬於嚴譴十行洊降於溫言弗容牢辭輒巳拜命中謝恭惟國家建六官以修政事分兩轄以督維綱均謂輔臣參與治體平時選擇皆天下之英才同德贊襄躋域中於仁壽矧在艱虞之際益知授受之難伏念臣十年決科三紀作吏斗釜日叨於天祿絲毫無補於公家白髮蒼顔憔悴百罹之後驚風駭浪飄零三黜之餘巳分退藏旋蒙收召綴近班於瑣闥未及論思訪陳迹於霜臺恍如夢寐造膝上勤於三接沃心曽乏於一言念執邦憲而糾官邪已孤任屬則謀王事而贊國論何取庸虛雖自列以籲天訖莫回於渙汗夫何謭薄有此遭逢兹蓋伏遇皇帝陛下勤儉御于家邦化育參乎天地隆寬盡下以通四海之情詢事考言以察羣臣之實有如近列宜得名儒不圖孤立於傾危獨受聖知而録用臣敢不激昂晚路淬礪初心永惟承學之淵源尤在事君之忠義進思展盡期上報於生成言或迂疏亦何逃於黜罰念兹終始實賴照臨臣無任謝賜物表生育在辰方兹永慕匪頒備物申以溫言祗服寵光惟知悚惕中謝臣粗沿末學遭遇盛時祿不逮親徒興懷於勞瘁恩惟厚下叨拜賜之光榮恭惟皇帝陛下以愛物之仁厚使臣之禮方務隆於國體俾胥慶於家庭敢不欽戴鴻私激昂晚節欲報之德或負素心能仕之忠敢忘遺訓臣無任又使華臨寵天語推褒燦名物之滿前惕疲駑而拜賜中謝伏念臣生而顓魯迫於賤貧在負米之初心止期三釜記設弧於斯日獨厚百朋悵崇養之無從顧恩頒而有靦恭惟皇帝陛下德參天地信及豚魚每惟慶賚之行不爽始生之旦矧珍竒之溢數備燕喜之殊私揆以庸虛豈所當得雖羔羊正直願成王化之功而蓼莪劬勞已輟門人之誦臣無任代謝賜歷日表仰稽天令俯授人時詔令駿發於九重正朔一新於四海長民于此拜賜為榮中謝竊以治歷明時有天下之所先務迎日推䇿非聖人莫與成能俾民知寒暑之期繇吏有承宣之效聿興嗣嵗爰錫新書申以溫言欽哉有土恭惟皇帝陛下儀刑神考體蹈帝堯有平成天地之功得歷象日月之法四時不忒百榖用成丕建太平適當今日臣濫侍從橐假守塞垣念方竭其憃愚豈敢忘於奉順臣無任婺州代謝賜歷日表堯階授歷聿興嗣嵗之期漢郡承流共仰先天之治寵光至渥德意咸孚恭惟皇帝陛下寅畏三無協循五紀數本在躬之錫䇿由迎日而推和玉燭於四時敦窺成化膺珍圖於萬國悉俾同文不愆震兊之常誕布甲寅之信臣叨分竹使祗奉禮書順令班條想清臺之候氣使民觀象跂魏闕以馳情臣無任謝賜對衣金帶等物表臣某言伏蒙聖恩特賜臣對衣一襲金腰帶一條鍍金銀鞍轡馬一匹者十圍煥爛副以笥衣千里瑰竒加之寶帶祗拜非常之賜苐懷不稱之慚中謝伏念臣江海孤生庠序後輩徒步京國所覬至微衣敝緼袍何恥之有不圖晚遇寖歷華塗未殫論思獻納之勤巳冒衣被服乘之寵兹蓋伏遇皇帝陛下經緯天地駕馭英雄法漢祖之解衣眷康侯而錫馬豈伊玼賤亦玷匪頒臣敢約束身章期不致於縱弛顧瞻鞭影或稍進於尋常雖竭疲駑莫酬覆幬臣無任代人謝表東南六路方祗役於轉輸燕趙兩河乃誤司於貿糴亟蒙嚴召獲望清光羣玉英躔躐升論撰兼金寶帶洊被寵頒仰異數之頻仍撫微躬而震栗中謝伏念臣早緣簡擢寖冒使令綿力薄材了無一德隆恩厚施常越稠人頃自坤維易使江右山川彌逺職事在所必躬舳艫相銜嵗計偶然告辦雖究心於狗馬常軫慮於淵氷敢意記憐以時甄拔總漕運以赴上國曽未效於拙勤廣聚蓄以餉北陲乃獨煩於臨遣矧當陛下布昭神武恢復新疆如熊如羆以戰則克足兵足食莫此為先欲奔走成命則自揆無能欲傾倒丐免則或疑避事倣徨失次進退無從幸嗣對於便朝得欽承於獨斷凡兹纎悉備極丁寧念畀付之非輕豈庸虛之能副六持使節常虞鼠技之窮再錫身章徒重鵜梁之刺而況濫塵中祕猥預俊遊念昔先臣嘗居撰述之職豈伊小子獲承家世之榮兹蓋伏遇皇帝陛下體蹈有虞儀刑神考得詢事考言之要成任賢使能之功有如斷斷之無知亦被循循之善誘薰然德意賜以褒嘉雖復即於馳驅巳濫叨於優渥臣敢不淬礪柔鈍鞭䇿疲駑臣無任
