body:
  text: 提要橫塘集二十卷别集類三宋臣等謹案橫塘集二十卷宋許景衡撰景衡字少伊溫州瑞安人登元祐九年進士宣和中召為監察御史遷殿中侍御史欽宗即位以左正言召纍遷中書舍人高宗朝至尚書右丞罷為資政殿大學士提舉洞霄宫卒諡忠簡事迹具宋史本傳景衡雖源出洛學而立身剛直不與賈易諸人囂爭門户其文章亦坦白光明粹然一出於正在徽宗時即極言財力匱乏請罷花石綱運為王黼所中而去及從高宗在揚州又與黃潛善不協借渡江之議斥逐而死雖厄於權幸屢起屢躓而終始不撓今集中所存奏議如論童貫誤國辨宗澤無過論王安中不當自便乞寬恤東南諸劄子皆誠意懇摯剴切詳明其他亦多關係家國大計雖當時不能盡用其説而史稱既沒之後高宗每念其遇事敢言追思不置亦足見其忠愛之忱有以感孚於平素也至其詩篇乃吐言清拔不露伉厲之氣如玉樽浮蟻一樣白青眼與山相對橫諸句殊饒風調胡仔漁隱叢話謂冦凖詩含思凄婉富于言情殊不類其為人今景衡亦然蓋詩本性情義存比興固不必定為濓洛風雅之𣲖而後謂之正人也宋史藝文志載橫塘集三十卷書録解題亦同自明以來傳本久絶今從永樂大典中採掇裒綴以次排纂為二十卷朱子語録嘗稱陳少陽事其詳見許右丞哀詞中今已不覩是篇則巨製鴻裁佚者不少其幸而存者彌宜寶貴矣乾隆四十六年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:7817bed10e7b3f92d8c124a6af1a3054c837b531a87a3d51a7ddf1d64b21852c
