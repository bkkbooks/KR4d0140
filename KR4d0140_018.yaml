body:
  text: 橫塘集卷十八宋許景衡撰序送左經臣序齊人藝粟越無粟齊人食粟笑越人無以生也越人藝稻齊無稻越人食稻笑齊人無以生也越人遇齊人而問之曰子奚食曰食粟越人以為不若吾稻之美也齊人遇越人而問之曰子奚食曰食稻齊人以為不若吾粟之美也夫稻與粟均五榖也而齊越之人不知焉以其蔽於在我者故也士之特立獨行力學問為文章固有以自見於世也而世之君子則曰我有是而彼無是也我能是彼則不能是也吾何取哉知人之有是矣知人之能為是矣則猶以為未也嗚呼士之生斯世其亦可謂難矣古之君子見人之善惟恐其弗聞也見人之不善惟恐其或聞也後之君子見人之善猶不善焉見人之不善猶善焉嗚呼士之生斯世其名譽之聞於人蓋亦幸而巳矣松柏之始生也巖石軋之荆棘繚之然松柏未嘗不生也卒之閲千嵗而不朽夫士欲有立於當世亦顧所自為如何耳奚彼之恤哉孟子曰人知之亦囂囂人不知亦囂囂臨海左經臣有學行其為文與古人相先後而世未有知之者瑞安許景衡其友人也於其歸寧故有以贈焉送徐長世序元豐改元豫始總髮授書鄉校於時同處者三十餘人惟劉安行居仁徐陟明長世與豫年相若相好也而余又與長世門巷相當凡出入必偕合居仁為三人早暮未嘗輒相舍也其後居仁遊郡學長世徙居别業湖嶼而余以貧就食旁縣而三十人者皆散去不復見聲音不相聞惟吾三人者嵗時或一見焉又數年余遊太學既而官於台台濱大海每持檄出則託命舟楫其窘於風濤者數矣幸不死又以罪斥比歸遂丁家艱於是居仁死已七八年矣而長世亦為人訟縶於官者三年衣食不能繼幾無以活其妻子嗟夫吾三人者裁二十年間若居仁者既死矣其幸而存者其憂患又如此也顧童子時相與之歡與夫嬉戲釣遊處厯厯在目恍然夢中事嘻其亦可悲矣夫嘗謂長世人固有幸不幸然世所謂幸未必不為不幸其所謂不幸未必不為幸也以豫愚且蠢使終身學問猶曰不足不自意遽得仕既日為事物侵奪雖欲學焉有不可得者是世之所謂幸乃豫所謂不幸也今長世雖困頓憔悴之餘然無意外事分神庶幾盡力於學乎使進而不止則彼聖賢處皆可指而到也是前日之不幸蓋未為不幸也昔孔子論善與人交惟晏平仲其人今長世將逺適與余别使余無以相告語則是棄於孔子者也然則長世為何如哉送李季通序始余兄少明遊京師其往還多豪傑知名士而與鄭將道最友善當其倘徉塵埃之外觴豆滿前相與醺酣淋漓道古今是非成敗慨然謂前人功業為不足述而當時士大夫推數天下竒男子鄭必在其間余以為將道當乘時得志鼓所有而前也今季通之來也好學而文其馴靖端飭固余所甚畏又况將道之所與俾壻其家者耶將道令吳門今季通歸亦將役於江南往拜將道問安否外為致其故人稚弟之語曰士無賢不肖惟所遇耳然辦天下大事著不朽竹帛則宜屬之誰耶駑駘當前坐嘆千里為逺嗚呼彼特未知其何以逺耳送韓用可序余友用可少力學手抄經史至數十萬言皆能竟其義尤喜為古文章世方以靡媚叢脞語組為時文邀祿利後生從之翕然獨用可不肯蹈襲一字人皆曰用可之文則善矣以為利科舉則未也余以為天下是非之理常私於寡常公於衆用可前此齪齪方州彼决得失者果何人囁囁相告語必求合我繩尺宜其屢却哉今去是而遊京師所謂好古君子不可以一二數然則用可亦何疑其不合哉用可為人介而通其事繼母如生巳其待朋友信出入州黨無一非議者然則用可所以異於人者非獨言語文章也彼挾而之世者有是哉送俞叔通序君子之於仕未嘗有所擇也夫君子之仕綦大至於王公大人綦小至於抱關擊柝大者祿足以仁族屬厚朋友而小者升斗不足以活其父母妻子大者任道小者任力任道者使人任力者使於人其勢之懸異至於如此然君子未嘗有擇也夫擇則安不擇則不安此人之情也而君子於此獨有以異乎人哉蓋君子常病夫所以在我者而不病夫所以在彼者在我者則未嘗不勉也在彼者則聽之而巳矣茍吾所學不悖於聖人而所行不愧於聖人則雖死生禍福之變未嘗有所擇也而况其下者乎故在衆人擇則安不擇則不安在君子擇則有所不安不擇則無所不安也昔者孔子以大聖人事業其為堯舜為禹湯為伊尹周公適其所耳而言不信於人道不行於時故為乘田為委吏然亦曰牛羊遂而巳矣㑹計當而巳矣後之君子則不然有是志則期於無所不至有是能則期於無所不為其所懷者大其所慕者逺其所懷者大則其小者有所不屑其所慕者逺則其近者嘗羞道而恥為之蓋其所自擇者如此夫以孔子之聖猶屑其小者而今君子乃止欲為其大者其可笑矣夫句章俞叔通有學問自弱冠時聲名已隱然為東南冠其後屢以文藝進當時賢公卿皆盛稱道之以為當得志於斯世雖叔通所以自任者亦然既而顛頓不售與俗益齟齬晚乃從吏部選主溫州平陽簿議者以為叔通髙才主簿小官以髙才處小官所懷當如何吾將見叔通縮手閣筆不知所以事事矣豫因曉之曰夫為其大者則喜為其小者則悲豈吾叔通之謂哉叔通學孔子者也夫學孔子則無適而不可豈以彼此小大為擇哉叔通至邑承前人廢弛後滯訟山積叔通為之盡力區處兩造廷下指示黑白衆皆誠服㑹其令憂去叔通遂専縣事豈弟愛物而痛懲强梗為民者皆相戒以為簿公遇我屬厚其可撓之耶異時吏治文書日夜不休比叔通為之率午刻廷無留人然叔通於此得考就除他官邑父老重其去相與狀其事於州於監司冀其為嵗月留而州亦表於朝未報㑹詔至遷某令於其行也邑人相顧泣遮道如堵曰天乎鄙我甚乃不畀我以公耶今世俗益薄議論益不一前日以為是則今日以為非前日以為可則今日以為不可如叔通之來也議者固疑其不事事也因曉之比又觀叔通所以惠愛其邑人然後議者不復置疑其間今天子仁聖求賢如不及叔通去是是將進為其大者矣彼議者又將疑焉以為叔通能為之於此而不能為之於彼也故欲余道其所以然俾凡今之疑者又將不復疑也碑溫州瑞安遷縣學碑崇寧元年有詔郡邑皆立學置師弟子員錫以餼廪校其行藝而升貢之所以作人之意甚盛天下鼓舞有司奔走從事瑞安為溫之支邑廟孔子於縣治之東而迫隘不足以容多士邑人病之久矣㑹聞詔亟徙於南江之濱山川風氣散漫不收潮濤泛濫牆宇圯壞神人靡寧邑人願復故處數請於官弗聽政和五年春具以告郡守劉公從之於是邑令蔡景初為之規畫而丞張宇發實領教事乃斥舊址廣袤三倍撤昔構之卑陋者易瓦木之腐敗者凡為重門兩廡殿以嚴像設堂以𨽻講習廡為齊以處學者纍屋為閣以儲經史髙明深曠為一方偉觀落成之日三獻如式稚耋和㑹瞻仰稱嘆邑之子弟來學者日益衆丞善教道士既知勸乃相與庀石請書其事某以為天子立學養士所以明人倫善風俗而為有司者能推而行之可歌也巳乃為詩以貽邑人俾歌之其詩曰在溫之陽表裏河山盤礴逶迤有邑其間祥禽嘉禾實肇厥名厯唐五季人物無稱祖宗聲教被於四海以迄於今理若有待明明天子生知逹孝曰余繼志乃在學校奔走詔令以後為羞孰與改作弗慎爾謀度地鳩材於江之漘齧於潮濤士氣不振郡邑維賢丕從衆志亦有爾丞既心乃事器非求舊維不善故吾以汝遷庶幾復古嘉而多士而父而兄協力并謀不日而成殖殖其庭渠渠其屋像設其中冠冕佩服修幣碩牲於粲豆籩庸告爾成神享亦䖍學者四來十百其輩絃誦洋洋飲食教誨維爾學者興於草萊天子樂育篤其成材亦維有司欽承德意爰居爰處擴此宏麗咨爾學者學古之道維古善教有倫有要曰行曰藝庸迪厥初天子作人其止是乎其學維何致知格物反身而誠物我為一匪曰我私推之斯行親親長長而天下平秦漢以來治功蔑然學校弗修斯道弗傳明明天子千載有作稽古聖謨以覺後覺咨爾學者欽哉無斁唯道是力以成皇極以報天子之休德記迎坡閣記平陽浙東之窮處也邑於山谷間直南有坡曼延數重而其勢稍平滎陽潘君閣於所居之東而請名於余兄少明少明為之榜曰迎坡蓋坡之旁江流入於海路接於七閩而極於交廣凡士大夫之北去與夫官於南者往往取道於此與夫土地所産百貨之所交販夫販婦侏儒傴僂所以提攜負荷朝往而暮歸者莫不道於此而閣適當其坡勢之平而介乎人物雜沓之地余嘗過潘君與之憑軒徘徊四顧因謂之曰子亦見夫往來者乎方其居也若不忍出其既出也往往放蕩而忘返或者欣然而出則又栖栖焉計日刻晷惟恐就舍之不早也且其出也必有所謂不可不出者出而返猶饑而食寒而衣而世俗昧昧至有終身不知返者有汲汲而欲返者可悲也哉古之君子未嘗出未嘗不出無居安之逸亦無奔走之勞豈不以在彼者雖不一而在我者未嘗不一耶余方以貧而仕每誦斯語而學焉而君亦習進士業遊學四方是又不可不知此也然君善教子其子將有立以自拔於庸俗則是閣也又止於迎坡而巳耶飄然齊記余兄少明倜儻有大節久不遭時乃浩然有江湖志所居瑞安别業橫塘旁屬於西山要皆山水之國俄而乘興則鼓棹浮游而去然每恨孤篷短艇低回齷齪不足為游覽之觀一日召工師刳大木以為舫其修長十丈而其博十之一可行可踞可倚可卧廓然如坐大庭廣厦之上寒暑莫為窘而風雨不能迫也於是自號飄然齊設庖壺床几其上朝暮往焉客怪而問曰夫所謂飄然者一葉之舟可也今君髙桅重纜長篙傑櫓上如垂天之雲下如蔽海之鼇僕夫十餘輩怒目攘臂而操之然後徐而動惡在其為飄然耶少明笑曰子所謂飄然者在乎舟吾所謂飄然者在乎我遡輕飈截駭浪而頃刻千里惡知其果飄然耶欵如輜車植如枸株而窮日尋咫惡知其果不飄然耶客未及語而少明遽命蕩舟以行舉杯大笑信其所之日之夕矣煙波蒼莽雲物蕭爽明月杳乎其無涯清風浩乎其莫窮夷猶蕩漾如游虛空而茫不知其所於是客矍然大驚謝而去文祈晴文天作淫雨既踰浹旬民惟怨咨不堪朝夕仰惟大覺孚佑含生驅除隂雲收卷積潦赫然一照拯我羣氓永念歸依以答覆護又麥未云秀稻方播種譬如赤子未堪饑凍淫雨害之重以風雹如幼多疾成人亦弱民既告病吏亦靡寧有謁於神神忍弗聽維民足食視稼之始維神保民猶民之視諸廟謝晴文暑雨淹時靈祠致禱惟我神明之德拯民溝瀆之中既獲奠居敢忘為報某寺謝晴文積隂失度輒有請祈妙覺垂慈應如影響仰惟覆護之施莫知報謝之方願與含生日嚴善果謝雪文雨暘豐凶雖神司之亦吏之責維嵗云暮雪不時作神豈爾嗇我是用懼將請於神庶幾渥澤誠萌於中神應如響不待懇迫俾民有秋疾癘不作吏亦安職酒牢鼓歌徒寫我誠何以報德遷廟祝版文神血食此土久矣乃廟於聽事之西偏吏有祀事則出入惟艱今遷像以妥我神堂宇維新香火具存神無驚無擾而居之安祭諸廟文二州於兹涖事之始恭陳禮物祗欵祠庭徼福神靈庶逃罪悔願推所學仰報鴻私祭趙彥澤文嗚呼人材之難難乎無蔽也蓋和易者常失其所守而剛峻者或流而狠戾也是皆學問之不至豈獨禀賦之弗類也孰如彥澤髙明而居以謙抑徑直而濟以豈弟也既有其質又敏於學如玉之得追琢如金之從淬礪也是故信義施於朋友而孝友睦其兄弟也凡人之稱彥澤者必以送終恤孤急人之難與夫力辭八行之選深遁而逺逝也孰知夫臨大節而不撓判死生如反掌視古人為無愧也嗚呼彥澤所貴乎君子者為其有補於世也胡不百年半塗而廢也聞訃驚咽紛涕淚也緘辭千里侑一酹也將子不昧知我之悲不獨以其親愛也祭張顯謨文昔我試吏兩河之間人笑迂愚亦疾其頑公獨憐之逮見前輩從容函丈飲食教誨幕府多賢聞於四方我實何人亦玷揄揚惟公强學英果敏明折獄忠厚治邊威名今也則亡邈焉誰繼聞者涕泗矧門下士絮酒千里侑辭匪他永言報功疵賤奈何祭宣州劉舍人文公游太學我亦諸生我䝉召還公在朝廷僦舍國南門巷相望把酒道舊其喜洋洋嗟我昏䝉惟公之畏公不我鄙委曲教誨廣大精微我駭且疑公指其要莫先致知用舍行藏我亦公告公曰有命豈不自好取别汳堤嵗月如馳公往不還而以喪歸大車夷塗發軔千里伊誰柅之而止於此公之道學我實銘之匪告於今維後之貽公葬荆川千夫臨穴而我何為薄祿羈紲絮酒寓辭以寫契素瞻彼大江日夜東注祭王經國文嗚呼經國世人所慕公不屑為世人所難公獨易之三十年間奔走州縣人皆公憐公獨不倦凡我長民以民為師夫豈他求惟天我知鄰冦猖狂聞者四走公令其民吾其汝守礪兵搜卒以固吾圉賊鋒屢接民卒安堵豈惟吾邑旁障毗境億萬生靈惟公為命天子嘉之能保我民召檄甫下而公訃聞搢紳嗟咨論著初終恩録其子天子勸忠士方平時抱能未見遇事而發功立名顯矧吾經國豈弟英果使其得年何施不可嗟我與公實同臭味而公所造非我敢跂寓形斯世孰短孰長雲飛川駛此獨不亡尊酒相歡今奠一觥嗚呼經國炯若平生祭王義夫文嗟我涉世了無一得天實矜之畀以三益有如義夫王國之英徑氣直辭期我有成百錬之剛莫施一割挹彼秋潦灌於尋尺出處三紀將起復仆惟惠在民曰吾父母後生笑公進不自營我獨知之惟義之行俯首一邑興悲父老胡不百年福祿是考嗟豫昏塞誰發藥之天既畀之曷又奪之念昔為僚兩河之間傾蓋銜杯綽有餘歡大篇短章更唱迭和公語一出獨驚四座嵗月幾何奄忽陳迹遡風北望涕淚淋臆位不侔德雖我亦疑公實有子天豈吾欺祭劉元修文嗚呼元修玉璞金渾孝友孜孜交際溫溫事境紛然錯節盤根至於元修一掃劇煩維昔先公德髙邱園不有其躬以燕後昆屹屹仲氏瑣闈掖垣簪笏相仍榮耀里門川游洋洋雲飛軒軒各適其適可以忘言念我季姊早奉蘋蘩元修友之琴瑟蘭蓀二紀之間歘如晨昏後先幾何各反九原一時族姻僅爾有存言念及之涕淚河翻此理尚矣宜勿復論永懷平生奠此一樽祭蔡濟仲文嗚呼朋友道喪道學不明我雖冥頑而得友生偉歟濟仲相與以誠誘掖切磋期豫有成今子死矣倀倀吾行我愧子知子墓我銘爾父命我我敢不承朱絃疏越世人莫聽聊以斯文告於冥冥我獨何為涕泗雨零寓辭千里侑此一觥祭丁二丈文嗟我始冠遊學京師道大如天吾將焉之嶷嶷諸郎實同旅食直諒多聞展也三益間誦公文想見其人亦既見之又過昔聞公曰爾來凡友吾子忠信而文實難爾比匪今之難惟終是圖凡今之人鮮不有初竊官於台公亦從養安輿往來惠然我訪往拜夫人重叙姻㜕言念伯兄泣焉其澘嵗月幾何各返九原惟其德名愈久彌尊今我免喪始哭公墓瞻彼大江日夜東注祭胡源秀才文吾聞死者骨肉復於土魂氣則無所不之嗟乎胡君客死於此誠魂氣之有知雖故鄉千里亦將悠然而歸嗚呼哀哉代趙彥章祭鮑丈文嗚呼自公云亡俯仰嵗年而我思公如始死然豈無朋友亦有姻戚謂公云亡則不可得念公平生洵約且儀不跂而髙不俯而卑徜徉里閭卒嵗娛嬉李杜不作兒曹亂真鬬靡儷華泯泯紛紛孰如我公渾然天成近體古風琅琅厥聲嗟我弗類涉世多畸而公不遺以子妻之嵗時拜公飲食教誨更僕之幾而公不怠謂公健强優遊百嵗云何不淑欲見難再嗚呼公乎此方耆舊平時往還埋骨已朽惟公夀考獨殿其後今則巳矣誰其似之前輩風流掃地弗遺嗟我後來孰問孰咨考日惟良葬車東馳惟公平生豈獨我悲代人祭弟文嗚呼凡人之生仰以事父母俯以畜妻子事父母以孝而畜妻子以恩此天性之同然矧恭順慈和若汝之所存今汝之死也脫撫育於未央割定省於晨昏老親八十扶杖而送柩少妻稚子呱呱而撫棺此豈汝所願欲耶將造物之不仁紛行路以愴悲矧為汝之弟昆葬車既東往安邱墳惟是天性之同然與凡汝之所存今則巳矣尚貽慶於後人汝有知乎實聞我言代家兄祭趙彥章文我家諸甥森然比肩秀特而文孰如子賢而我與子總髮嬉戲匪親之好亦其臭味釃酒如池炙肉如邱笑語歌呼竟日獻酬新詩醉墨淋漓滿紙惟此筆力一抹千里每言此樂天實豫私俗子紛紛慎勿彼知三十年間屈伸臂頃而子何為遽纒以病我往視子子亦云瘳人物眇然實重我憂滯流橫塘見子弗繼歘然訃聞驚淚濺袂嗚呼彥章凡物之生等歸於死何夭之悲何夀之喜世之惑者因殤慕彭豈知至人未嘗死生嗚呼彥章此理尚矣而我之悲亦豈為是祭亡兄文嗟我之生庸陋弗靈俾克有成惟賢父兄有列於朝初膺贈典兄時欣然曰適我願命書及門祗奠於廟尚須涓吉邱壠是告天禍我家變故靡常雲飛川逝有志莫償今我來歸恭踐言語顧念疇昔涕零如雨祭韓夫人文猗歟夫人洵淑且儀入嬪大家承祀孔時閨門懿範萬齒一辭亦惟夫人俯仰且宜君子惟良絃誦詩書與遊何多磊落瑰竒友來四方入門如歸君子宴斯有肉如邱有酒如池笑語歌呼卒嵗娛嬉夫人裕然有婉其辭言告君子汝無彼遺厥餉惟賢我無汝疵大貝南金簪珥葳蕤斥奉其須視如塵泥憎彼女婦規規銖錙曽何彼知日惟巳私客主在堂有似弗隨彼聞夫人厚顔忸怩天畀善人福履將之命難忱哉而不嗜之考日惟良葬車東馳萬松之顛周湖之湄更千萬年夫人是思某從遊君子厯年於茲設奠柩前以寫我悲祭人母氏文我方志學永懷師友惟夫人子學問有守時我父兄俾我從之分章摘句祛蒙指迷徒聞夫人友夫以義善事其姑善教其子篤恭節儉表於一鄉秀眉兒齒既夀而康我欲拜之今三十年二州此來庶適願焉胡不少須遽棄以死維此傷心豈獨爾子嗟我先君及我先兄與夫人子如古友朋及其淪謝惟夫人子臨喪㑹葬不逺千里今我何為薄祿羈紲不往而留有負存沒絮此㫖酒侑以斯文夫人享之俾無愧云祭家姑文昔我皇祖生子六人夫人維季孝友慈仁能悅其親皇祖所愛常曰吾女不與俗子妙擇婚對維時沈氏母子自立門户不墜夫人既歸婦姑歡然其家大順善事其夫善教其子孜孜不怠男也儒服女歸令族卒如所戒內外諸孫及其族姻百十為輩幼稚壯長紛然燕笑嵗時之㑹明目聰耳秀眉兒齒八十三嵗一旦難有嗟維夫人諸福來萃念我先公手足之愛夫人實倍延及諸孤撫育周旋飲食教誨嗟我不天先公同産獨夫人在朝夕左右如侍先公庶幾自慰云何踰年間因小疾奄然而逝我生孤苦其將誰訴有願莫遂拊棺長號不往而留薄祿綴系豈無他人謹遣厚恩致此一酹我哀如何終天之訣而不親饋念昔違離夫人泣言此見難再我曰不然百嵗期頥夫人之謂受代來歸把酒為夀愚實有待而今巳矣顧念前言悲懷曷既祭亡妻文祭告於前妻陳孺人嗟汝歸余余方初官憂患窮空實罹百艱義命之安亦克自娛匪汝勤儉孰左右余尚期夀祉爰享其報云何不淑卒罹短夭自汝云沒於今九年顧念平生不忘朝暮嵗行壬辰有降自天追榮之恩下逮九泉生也何戚沒也何慶國有典常服此休命食飲滿前衣冠在笥汝歆受之生者之意
