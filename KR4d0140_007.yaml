body:
  text: 橫塘集卷七宋許景衡撰制越王偲第八男乞特賜名可除右驍衛將軍制朕惟祖宗明帝堯之峻德以親睦九族積周家之忠厚而本支百世慶流王邸克生多男肇頒爵命以為爾寵蓋有國之常典非近屬之私恩矧吾叔父僉謂大雅之不羣宜爾諸子咸知為善之最樂往服訓辭永綏福履可越王偲第十二女可宗姬制敕眷吾叔父為時賢王席餘慶於祖宗盛鍾愛於閨閫爰稽邦典載錫恩章爾性稟靜貞習知淑慎服姆師之訓見於夙成閲圖史之規庶幾克踐益崇懿德允協令名尚體眷懷永綏祉祿可宗子安止正任觀察使制敕漢唐宗室子智略類有可稱者而朱虛江夏折衝禦侮卓然不羣著在史册後世稱慕焉具官某於皇家為近屬於環尹為顯位而能持心樂易志在有為比緣冦攘乘城扞守有夙夜之勞有司奏功朕用汝嘉進陟廉車是為異數其益自勵於忠勇庶幾無愧於古人可通直郎向子扆除右衛將軍駙馬都尉制敕具官某周詩之美王姬能致肅雍之化唐室之尚公主必求文雅之流惟我國家稽古典禮若時下降宜舉舊章以爾天資粹溫人物秀整凡今故相孰如文簡之一門詒慶後昆時乃欽聖之餘澤擢居築館式重國姻進秩副車參官環衛其益思於兢慎尚永對於恩榮可向子扆除正任刺史駙馬都尉制敕婚姻以時二南以基王化夫婦有義五典以敘人倫屬嘉禮之告成疏茂恩而進秩具官某風姿凝粹器宇靖深生于勳德之門習知詩禮之學眷貴主之下降涓榖旦以有行爛然車服之儀申以爵祿之寵粵從環尹遙總守符進以才能當知選尚之意宜爾家室允資德義之修往復訓辭益光時譽可陳遘中山路安撫使制敕師克在和方慎鎮綏之寄人惟求舊益隆注倚之私乃眷老成申頒優渥具官某早以風幹寖被簡知敦郤榖之詩書洊分閫寄師留侯之智勇灼著戰功屹若長城護我方面屬兹易地還蒞舊封拊循兵民謹守疆圉繄爾中山之重寬子北顧之憂可李邈依舊真定安撫使制敕自金人侵侮河朔用兵多士獻言莫先擇帥朕惟用人在乎因任泛舉不如求舊於以底績不亦優乎具官某以孝為忠寓文於武出守關塞持節西河威名灼著邊人信服比膺柬求分閫全趙易鎮定武乃以親名自列避而弗居是用申命俾仍舊服維我祖宗善馭將而漢班超則善守邊撫育將士綏靖疆場使敵人畏威而逺遁惟爾勉之益勵乃績可郭奉世除集英殿修撰制朕惟盜賊竊發或稽天誅若守將得人則凶徒必獲以爾奉世早以吏能見推多士出守髙密政績可觀比者逋卒狂悖侵擾吾民爾能提兵乘時掩擊斬獲之多至于千數威名暴著達于豫聞論撰集英士夫髙選不獨旌爾之勞烈且以為四方守臣之勸焉益究壯猷以俟褒陟可商守拙除直顯謨閣制朕惟河朔比罹冦攘若守將得人則凶徒自潰以爾守拙精於刑名之學夙有平反之譽出臨便郡施設可觀屬盜賊之竊發嚴壁壘而固守躬冒矢石至傷體膚而能褁創督戰以全吾圉載惟忠藎良極嘆嘉其進直於西清以表勸於北道勉惟竭節嗣有寵褒可郭琰陜西轉運副使兼制置解鹽使制敕具官某解池滋息實佐邊費乃者任非其人公私告病肆求能吏俾經理之爾琰早以風幹屢更使指蔚有望實稱于搢紳其以册府論撰之職往副關陜漕挽之事凡鹽澤之盈虛貿易之政令惟爾精講而力行之使商賈流通邦計給足時乃之職可不勉哉可許髙可閣門宣贊舍人制敕具官某贊朝儀于宸閣總憲禁于一路厥惟能吏乃堪是選爾有幹材重以勇果自河以北今以命爾訓練民兵驅逐盜賊使疆場無擾而閭里妥安爾之職也往其懋哉可知威勝軍張堯佐可閣門宣贊舍人制敕具官某金兵內侵綿上闕守爾初臨孤壘安集驚擾之餘僉謂有勞宜膺褒寵夫贊儀上閣而剖符邊州亦武士之髙選也益懋勤績以對恩榮可劉錡除閣門宣贊舍人制敕具官某贊儀上閣武選之要職也朕所慎擇今得其人以爾錡名將之子能守家法乃者賜對便朝敷奏詳明俾踐厥次是為優寵益思自勉以稱簡求可劉衍宣贊舍人制敕具官某贊儀上閣武士之要選爾以智略見稱流輩今以命爾往參戎幕尚其自勉以趨功名之會副朕超擢之意欽哉毋忽可朱靖等授官制敕某等爾等各以勇鷙早𨽻軍籍積年有勞易官班祿往承新命益務忠勤可俞平等授官制敕酒醴之政付諸有司爾等各以恪勤遂膺初命賞則優矣往其勉哉可靳澤等授官制敕爾等宿衛有年各能不懈以及入官之格其祗初命益務忠勤可劉圭轉兩官制敕具官某邊臣無守禦之備乃欲棄捐堡寨爾能固護以全吾圉其功可録矣進官二等以為爾寵往惟欽哉可倪臯等各轉一官制敕具官某等酒醴之政付諸有司爾等各率乃職訖事無曠進官一等以旌爾勞往服欽哉益思來效可時孝悌轉一官制敕具官某爾祗役于官服勞良久進官一等以録爾勤往其懋哉益圖報稱可蔣祖師等轉官制敕具官某爾等蒞職外府能佐而長剡奏來上請録爾勞進秩茂恩往其祗服可朱革轉兩官制敕具官某爾頃為帥屬從軍兩河今録爾勞進官二等往其祗服益懋忠勤可成忠郎賀注轉兩官制敕具官某捕冦尉職也能盡其職則懋功之賞朕亦何愛焉乃者青冦嘯聚林莽爾能掩獲以靖里閭進官二等以為在職者之勸可崔廣等轉官制敕具官某頃者金人侵擾邊壘爾等咸奮忠勇一掃烽煙兵民帖然良以爾等能自竭也或進職上閣或增秩一等以寵爾勞益思戰守之力尚有殊恩以俟後效可修武郎趙思道轉官制敕具官某乃者西戎擾塞下爾能自奮斬首却敵宜從進秩以旌爾勞可祈立等轉官制敕敵師深入邦畿繹騷爾等各奮忠勤血戰却敵奏功第賞超進厥官往膺不次之恩益勵無前之勇可王子玘等轉一官制敕具官某等羌戎犯順侵軼邊陲爾等身先士伍各有斬獲進官一等以賞爾勞益勵忠勤以俟褒顯可李忠等各與轉官制敕具官某戎騎侵軼爾等各有斬獲之功進秩之恩以為爾寵往其欽哉可奉議郎宋晟轉一官制敕具官某爾能修戎器部民兵以守衛王畿其勞亦可録矣進官一等往惟欽哉可向齋轉官制敕具官某王師出塞破賊巢穴爾能力戰有功行間褒進爾官以為將士之勸可王郅等轉一官制忠以衛上人臣之節賞以勸功有國之權故髙爵厚祿非以茍私貴昵亦視其功之如何耳具官某早𨽻仕籍久于器使或祗事上閣或列職禁省恪恭匪懈蔚有能稱比因軍興區處纎悉有夙夜之勞進官一等為爾輩寵各殫乃心以圖報稱可茹端轉官制敕具官某爾以勇果從軍禦冦纍功議賞併進厥官往其欽承益務報稱可劉良弼等轉三官制敕具官某等敵騎侵軼邊陲繹騷爾等各提孤軍力戰拒敵功未就而忠有餘使者以聞朕用嘉嘆進官三等以旌爾勤往究壯圖以對殊寵可全端夫轉官制敕覃慶渥澤實均在服而爾兄以改授為請於以見友恭之義丕從厥志往服茂恩可郭彥章等轉官制敕具官某等乃者愚民嘯聚山谷爾等各奮忠勇俾即就擒今部使者列上功狀進官一等以旌爾勞往服寵榮益思報稱可權南豐巡檢髙騰因本寨兵級聶成等作亂勦殺淨盡轉一官制敕具官某卒驕倡亂威不素行非一日之積也録爾倉猝弭亂之功而略其不素訓整之罪可謂厚矣進官一等其克欽承可馬燾轉一官制敕爾等各以勇果從事戎行簡募土豪襲繫冦賊載嘉勤績進官一等益著來效以俟茂恩可武德郎張仙等各轉二官制敕具官某軍校狂悖驚擾兵民汝等各能掩捕俾即伏法進官二等以旌智謀往其懋哉益思後效可湯材等轉一官制敕具官某敵騎侵軼爾等各有守禦之勞有司奏功進秩一等勉修職業以稱恩榮可鄭宗孟轉官制敕具官某齊冦竊發屬邑騷然爾率卒徒多所斬獲併進爵秩以録爾功往惟懋哉尚思來效可孫世詢等轉三官制敕具官某逋卒狂悖侵擾旁邑爾等各能率先仕伍破其巢穴剪除醜類並著戰功超遷三官是為殊寵益懋忠勇以對恩榮可劉之才轉三官制敕具官某逋卒狂悖井邑騷然爾能躬帥其徒乘時斬獲奏功來上超進三官益務忠勤尚有褒寵可龍安等轉官制敕具官某爾等皆𨽻兵籍比緣脅從陷于非義而能以忠勇自奮糾率其徒屏除首惡初雖失道卒能自新功罪相除朕不終棄或擢居朝列或躐進武陛益思勉勵以報不次之恩可髙景雲轉官制敕具官某文武一道也而或不能兼焉者非才不足學不至耶以爾景雲早以詞藝聞于縉紳册府宰屬更踐滋久出守北州屬有邊警忠義不懾惟道是守捍禦有方卒固吾圉録功進秩以寵爾勞往其勉之以為文武全材則朕汝嘉可王雄等轉官制敕某官屬者逋卒侵擾冀方爾等能率其徒屏除斬獲奏功第賞各進爾官以為忠勇之勸可王彥轉一官制敕具官某爾以強勇躬督士伍翦除醜類以靖邑境進官一等用旌爾勞往服恩榮益勤乃職可全淵轉一官制敕具官某爾等列職禁省屬當軍興招置強勇部勒衛從有夙夜之勞第功來上進官一等以寵爾勤往惟欽哉以圖來效可董士良轉官制朕仰遵祖宗成憲刋正官制以祿左右之臣恩數寵章於是為稱以爾士良從事禁闥恭謹不懈涉時久矣纍官至是抗章有稱願從彞制勉服新渥益思所以為報者可張公濟等各轉一官制敕具官某爾以強勇射藝絶倫進官一等以為武力之勸往其欽哉可士琛等轉官制敕金人大舉侵擾畿甸軍書奏報汝等有勞第功進級往其欽哉可康弼轉一官制朕初嗣位均澤海內進秩文武之士以同邦家之休具官某早以恪勤官于禁省祗事率屬蔚有能稱推此茂恩遷秩一等益思矜慎以對寵榮可孟濤轉官制敕具官某爾祗役樞府實掌軍書積日有勞宜推懋賞往勤乃職以稱所蒙可趙升等轉官制敕具官某爾等各以武力宿衛有勞射藝中程宜膺懋賞併進祿秩往惟欽哉可趙明誠轉一官制敕逋卒狂悖驚擾東州爾為守臣提兵帥屬斬獲為多今録爾功進官一等翦除殘孽拊循兵民以紓朝廷東顧之憂惟爾之職往其懋哉可曹格等轉官制敕逋卒狂悖驚擾東州爾等能率其徒頗多斬獲併進爾秩以寵忠勤往惟懋哉以稱優渥可劉士通等轉兩資制敕具官某頃者元帥總戎河朔爾等有軍書奏報之勞各命以官往其祗服可張燾宣教郎制敕具官某往者敵兵侵軼近郊爰命樞臣總守衛之役而爾實預幕府贊畫居多今録爾功申命進秩然爾方官中祕涵養器業以須世用則褒延之寵實肇自兹往惟懋哉以稱朝廷期待之意可林朝佐可承節郎制敕具官某爾攝事逺邑督捕羣盜有司議賞進易武階往其欽承益務忠勇可李忠等補承信郎制敕具官某金人入邉軍書奏報爾等有勞各命以官往其欽服可郭元明補承信郎制敕乃者逋卒迷而不復爾能道朝廷恩意俾之悔罪自歸有司今録爾勞命官初等往其祗服益思報效可南景仁可承信郎制敕具官某爾以勇果從軍兩河畢事奏功宜膺初命祗服寵奬益務公勤可孟涓等並合轉承信郎制敕某等樞臣總戎鎮撫北道爾等各𨽻帳下有奔走之勞往服初命益務忠勤可劉慤致仕合换武節郎制敕具官某爾以恭慎列職禁省兹緣疾憊辭榮而歸易秩武階永綏壽嘏可何志同復顯謨閣直學士制敕朕纂受丕基均澤四海乃眷在服槩霑褒進之榮矧吾邇臣宜申敘復之命具官某天資豈弟世濟忠嘉早被眷知進履華近比坐過誤既閲嵗時宜從曠恩稍還舊物雖外司於真館尚益勵於逺圖可吳執中追復述古殿學士制敕示好惡以正風俗録往善以勸來者此為政之大方而今日之先務也具官某有通變之才有特立之操博聞精識洞達當世之務忠言讜論不撓羣枉之間受知先皇再執邦憲排擊姦慝杜絶濫恩謂內侍擅權將有意外之憂而新邊置郡徒耗海內之力至於花石之糜費後苑之淫巧慨然指陳多見開納雖清議所共與要直道之弗容乃從左遷未幾淪謝精忠凛然不泯當寧久而益思肆朕臨御屬兹艱難覽明哲之建言若蓍龜之先兆是謂三代之遺直獨嘆九原之不作宜覃渥澤追復祕殿英爽不昧服此恩榮亦使有志之士知朝廷之於賢者猶不忘於泉壤也可宋伯友復官制敕過眚有罰類從左授計期而還其官者哀矜之令典也矧在邇列其可後乎具官某早以時望久于器使更踐省寺進登禁途平反庶獄有忠厚之譽詿誤降秩亦既纍年俾復舊次是謂茂恩其體豫寬宥之意所以施於汝者以之讞疑則刑清而民服矣尚勉之哉可周武仲復官制敕具官某朕臨御之初均澤海內褒進文武之士俾同邦家之休矧吾邇臣敘復之寵獨可後乎以爾比由時望踐更器使司刑中省執憲南臺蔚有能稱著于士論坐法左授亦既纍年屬兹慶賚悉還祿秩祗膺新渥益勵逺圖可趙子淔復職制敕具官某朕初臨御大賚天下無有疏昵咸被渥澤而況嘗列侍從者乎以爾宗室之子幹敏有稱頃坐過差鐫職次對屬兹覃慶宜賜寵章論撰册府嚴奉祠庭是為異恩往其祗服可盧益等復職制敕朕纂受丕基大賚四海褒進文武之士俾同家邦之休矧在邇聨宜膺寵敘具官某早以時望揚于禁塗比𨽻刑書載更嵗籥兹從新渥一洗宿愆其還西清次對之班尚仍東州拊綏之寄勉服異數益勵逺圖可檀倬張志胡松年李璆高伯振復職制敕具官某朕嗣位之初均澤海內褒進文武之士俾同邦家之休矧在邇列宜膺寵敘以爾早被識擢亟踐華要持橐禁路掌制詞掖坐法左授亦既纍年屬兹新渥一灑宿負論撰祕殿嚴奉真祠是為殊恩往其祗服可方孟卿張動等落職制敕具官某轉輸六路以給中都常選才臣庶幾協濟爾等各以時望屢更煩使而處畫乖剌濡留道塗舟師散亡米粒朽腐豈不重負朕任屬之意哉宜罷直閣尚仍漕事毋忘省循以補過自效可余深落觀文殿大學士依前特進致仕制敕附下罔上久鬱人言置散投間用伸邦憲不獨為人臣之常戒抑以示天下之至公具官某比以時名驟膺器使宜盡瘁以體國乃懷利以事君附麗要權樹植黨與言路抗疏觀望風旨而橫肆中傷詔獄窮姦灼見邪慝而隂為道地訖從羣枉更踐要塗參預政機進登宰席茍得尚容於居位不祥莫大於蔽賢凡所選除皆由請囑寧復顧於公論唯知報於私恩當軸處中所操如此庇民尊主斯言謂何亦既罷歸尚存體貌擁節旄於將閫優餼廪於祠庭爾則擅以為榮人皆憤其非據兹覽引年之請亟推從欲之仁而宿負益彰清議弗置姑鐫顯職俾即安居朝廷保全之恩於汝厚矣臣子省循之念尚其勉哉可李丙落徽猷閣待制制敕彰善疸惡以清風俗此有國所常行而今日之先務也具官某早以文藝薦被任使不能自持比麗元惡雖竊一時之寵而抱無窮之悔比嘗抆拭畀以中權而宿愆益彰公論弗貸鐫職延閣往司祠庭尚為寬恩毋忘內訟可李仲詢特落致仕差知濬州制敕具官某以爾亷幹試吏有年旅力未愆遽爾謝事眷惟濬州宜得良守大臣僉謀以汝名聞亟從退間往踐厥次撫兵民備守禦汝之職也尚其懋哉可周敦禮等仍授職制敕具官某爾等引年告去筋力未衰再錫官榮還𨽻仕籍各勤乃職以對茂恩可翁彥國落徽猷閣直學士制有功則見知過眚則必罰此天下之至公也雖在邇列朕不敢私焉具官某有政事之才有鎮撫之譽更踐中外閲日滋久將漕六路宜優為之而舟師散亡米粒腐敗豈措畫之弗早抑佐屬之弗力耶其鐫西清次對之班尚仍東南餉餽之寄益圖後效以稱寬恩可黃鍔落直徽猷閣制敕具官某士以潔亷自持而以勤瘁事國庶幾無負於名教爾持節一路則黷貨以媚權貴贊畫幕府則憚勞而莫肯行雖爾善自為謀而朕獨安取此延閣清切非爾所宜居也斥歸銓部往務省循可皇甫僅降宫祠制敕子之能仕父教之忠厥或不恭宜誰之責具官某祗事禁省有年于此而羣小妄議既抵邦刑爾為其父獨無失教之罰耶露章自劾姑示矜容斥從外官俾司真館是為寬典無忘省循可翁彥國等特降兩官制敕具官某東南歲漕六百餘萬以給中都祖宗法度纎悉備矣有司能率而行之則為稱職以爾等各以吏幹見稱多士肆朕推擇俾使六路而措置或戾于法漕舟濡滯米粒朽敗亦既薄罰而論者不汝貸也降秩二等以責來效惟爾勉之以求合于祖宗成憲則朕豈以一眚掩爾善耶欽哉無忽可武功大夫王宗禮降兩官制敕具官某爾列于有司而徇私託疾以曠厥職此法所不容也姑從降黜以警在位毋忘循省庶幾補過可黃澤等降兩官制敕官各有守若皆徇私託疾則有司之事廢矣可無罰乎具官某等各以勞能踐更煩使謂宜盡瘁周旋厥職乃以病諗至于再三茍可強勉于公家何至誑欺而蘄免降秩兩等不獨小懲且以警夫在位者可杜宣降官制敕具官某職教事而士卒偷惰射藝弗中程式宜誰之責也薄示降黜往其省循可張見道等降官制敕具官某比詔有司窮治僥幸籍其資産以正邦憲爾等方命漫弗欽承屬更赦宥姑從降秩之罰尚其省循毋重後悔可宋㬇責授單州團練副使永州安置制朕昭示好惡大判淑慝悉屏姦巧投畀遐荒不獨少清於仕籍庶幾大正於邦刑爾以浮薄之資席世家之舊粵從卑冗依慿親黨出守節藩入二禁省華除要職談笑得之比緣奏稟稱造語言敢為面謾且陳已力徇私背公嗟爾何至於此以無為有聞者為之憤然向覽彈章姑從薄責而公論未允言者弗置其以散秩斥之荆蠻服我寬矜毋忘循省可范夙特贈朝奉郎集英殿修撰制敕具官某士之進説有忽於當時而見思於後日黯黮於平生而顯白於身後者固多矣念非録其往善則何以為後來之勸乎以爾為大臣子篤學好直憤宦者之出使緣橫斂而為姦慷慨有陳卒以貶死聞者惜之比朕臨御亟誅首惡憮然興懷優爾恤典論撰祕殿士夫清選爾尚不昧知遺志獲伸當釋然于泉下矣可曽燾贈官制人臣死難朝廷恤典自一命以上無遺者矣又況於親近者乎某官祗事禁省有年于兹扞衛乘城死于驚擾贈賻良渥以寵忠勤尚其有知服此休命可詹度祖母周氏特贈建安郡夫人劉氏特贈建康郡夫人制敕國家有大慶則士大夫皆得敘封其親其於爵尊位重則褒寵有至於再世三世所以加惠臣下而同其福祿者不已厚乎此近古所未有也具官某祖母某氏躬有懿德作嬪慶門克相其夫以氣節自重辭榮早歲養髙邱園積厚之施乃在諸子知名當世更踐要塗亦有爾孫以守邊鎖粵從小君進封大郡尚惟不昧以享此休顯之明命可父文贈開府儀同三司制敕孝子之事親也生則有養沒則有祭而國家之于多士自通籍以上則又有追封之典焉蓋方責其盡忠之效則徇夫罔極之報者曷可巳哉某官父某詞藝之學政事之林更踐中外茂著風績未究施設奄爾殂謝乃克有子銜訓嗣事司吾邊鎖有守捍之功敘贈之秩巳躋二品兹用申命進同三司所以為泉壤之榮者極矣則為其後者可不思稱所蒙哉可母何氏特贈榮國夫人制敕凡人富貴其身則思顯其父母而國朝敘贈之典非獨為死者之寵亦所以慰夫生者之情也某官母某氏生于令族克配君子閫德之懿實昌其家惟時慶嗣為國連帥褒崇之命進封大邦尚惟淑靈享此休顯可故妻王氏特贈太原郡夫人制敕士之有勞于朝廷則不獨爵命其身而又褒崇其家室故雖已往亦預斯榮焉某官妻某氏溫柔靜專來嫓慶閥不幸夭折弗終顯榮其以小君追畀大郡尚克有知享此休寵可妻劉氏可彭城郡夫人制敕周衰法度廢名稱浸訛孔子患之為正名焉故邦君之妻謂之夫人稱諸異邦則曰小君然非有懿行亦何以稱此名哉具官某妻某氏婉娩溫恭聞于族姻作配巨室克主饋事進封名城以正小君之號尚其祗服對此榮稱可鄭成之故妻王氏贈越國夫人制敕國家有大慶敷錫天下不間疏昵存沒咸被渥澤又况於戚里之近屬哉具官某妻某氏柔靜溫恭茂著閫德嬪于慶閥問譽藉甚降年不永弗究顯榮進封大邦以賁泉壤淑靈不昧尚克享此休稱可席貢母趙氏特贈燕國夫人制敕觀其子之賢否則知其父母之所積而朝廷追榮之典亦因其所積之厚薄以為爵命之崇卑具官某母某氏生于令族蔚有淑聞來嬪慶門實昌其家克訓諸子為時聞人持橐禁塗分閫帥路追榮之恩嘗啓大國兹用申命改封全燕尚其有知以享此休顯之報可
