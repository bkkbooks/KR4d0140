body:
  text: 橫塘集卷十九宋許景衡撰墓志銘丁大夫墓志銘丁姜姓系出太公望繇漢以來多聞人而寬及鴻恭皆以經術名家公世為溫州永嘉人更五代之亂譜籍不存然自髙曽而下積善有隂施號為長者至皇考始業儒通經術篤行著書教授鄉里既沒鄉人以經行先生易其名三子曰寬夫廉夫志夫皆好古博學被服禮義知名士大夫間蓋自宋興丁氏凡再顯為公卿其居毗陵吳興亦為東南望族永嘉之丁雖後出獨能以學問承家與漢名儒前後相望君子於是知丁氏之世有人也公字剛選經行之季子自幼篤學與父兄商論如朋友不肯茍且曰此理天下所公共不可為閨門屈也既冠游太學益務記覽其専勤不惰至忘寢食擢紹聖元年進士第起家為台州寧海尉縣有海游渡舟多覆溺公命邑人為石梁而躬督其役不閲月告辦民到於今德之丁內外艱再調開封府鄢陵主簿作勸學文賓禮耆德邑人翕然趨於學間攝邑事御吏民如家人柔聲緩氣循循訓飭之使各適理至其不悛則刑之久之皆馴服曰主簿不吾欺也徙監在京醫藥惠民局鄢人遮道相丐留者以數百計辟都水監措置修塘堤屬官就辟北丞司勾當公事豫修浮梁權都水監丞大河堤防千里公往還其間不憚寒暑雖幽僻必至究見利害之實其贊水政裨益為尤多河堤浮梁次第告功改奉議郎纍遷朝請郎浮梁役卒輒渡河者五百許人議者請繩以法公以為此屬暴露日久迫寒饑思歸耳亦既畢事罪可略㑹使者誕日有放雀鴿為夀者公曰羸卒冒法若寬釋之獨不愈於羽族乎願以是祝公夀使者大悅薄其罪擢司農寺丞屬卿以罪罷公獨領寺事大盈倉火大理具獄以公失暴涼節坐之士論鬨然不平曰暴涼豈丞職耶論法不當孰甚於此而公未嘗自辨也未幾朝廷察其非辜除國子監丞以水衡餘賞及積日勞三遷朝請大夫再丞國子公自宦學往還京師三十年鄉人及四方遊舊疾病死喪急難皆賴公以濟其父母妻子之在逺者亦曰丁公在庶幾無失所也其再至國子也京師方大疫太學諸生多感疾公躬督醫者治療之日問其食飲卧起狀多士感悅居無何公亦病矣俄致其事於朝訖不起宣和二年五月丙午也年五十五又明年七月甲子葬於永嘉某鄉某原曽祖諱某祖諱某考經行諱某纍贈朝散大夫母同郡蔣氏纍贈宜人公娶吳氏括蒼人中奉大夫諱克之女封宜人二男子長曰仲寧修職郎管勾開封府架閣文字其幼未名五女子壻曰迪功郎淮寧府商水主簿洪興祖其二早卒餘在室公天性至孝常歎禮學缺絶俗習卑陋而喪祭為缺比執親喪皆如古制而哭泣之哀人不忍聞斥佛事不用廬於墓側松檟皆手植終喪茹酒肉嵗時享祀齊戒日時幣祝皆有法式焄蒿悽愴若將見之於是州里始識喪祭之禮人多慕效之樂聞人善得其寸長稱嘆不容口而未嘗及過差其與人遊有終始茍有以成就之竭力弗怠甚於謀巳其在惠民局攝事者弗任纍公以罪後官河朔而公適在水衡為之延譽當塗論薦之或問何以報德曰故舊豈可以小忿絶耶遇人無貴賤小大豁然不為關鍵周防人亦以是信服之常曰官長即父兄也事之盡誠實爾故纍為佐屬皆得其歡心施設之際言無不從蓋有以感之也初從進士舉方尚辭賦或勸其從時好曰經術吾家學也舍之而從彼何哉卒以治經中禮部髙第未幾罷春秋學官公曰茲可廢耶故凡經理世務與人論議必稽焉曰他經明理而春秋斷事也最後罷官國子踰年不得調同里有橫貴者數以挽進招公非其好弗就也公為人號平易至於利害之際而其所守如此雅為太師清原王所知王常稱其人而惜其才未盡用比公卒搢紳無識否下至閭巷老稚皆曰惜哉善人而止於此也其為文有理致不事刻琢發明經㫖為尤多其家類集之為若干卷將葬仲寧以洪興祖狀泣請銘銘曰嗚呼偉哉永嘉丁父子兄弟皆豪英惟公秀發自妙齡揮斥異端専六經亶非空言在力行洞視物我一以誠施於有政皆可稱維爾後人尚儀刑有考其不在斯銘陳通直墓志銘陳公諱懿字公美溫州平陽人曽祖諱某祖諱某父諱某公美慈順謹飭遇人歡然無間人亦為之傾盡兄無子或勸其求嗣續曰吾弟孝友即我死尚憂身後乎公美事寡嫂彌謹撫其二女皆得所歸常曰吾早孤而窶不及學問幸有子庶幾成吾志手抄羣書授之早夜課其誦讀稍長俾從師營其資給艱甚而無厭怠色未幾其子桷以上舍生擢甲科聲稱翕然厯官太學祕書省每退食侍側必問所讀者何書所遊者何人所討論者何等典故桷具以對曰毋忘學毋友非其人蓋友所以輔學也吾聞某人某人賢者亦嘗從之遊乎故凡桷所與往還多名人其操履醞藉尤為賢士大夫所推許蓋有所授之也公美以其子之恩四封為通直郎致仕年若干宣和二年五月甲子以疾卒於京師明年某月甲子葬於福州長溪縣某鄉廣化寺之後山孺人某氏同邑人生二男子長即桷也以承議郎行祕書省著作佐郎次曰某習進士若干女子壻曰某其一早卒餘在室孫若干人公美重然諾與人交有終始振其急難唯恐力之不逮也故聞其卒皆為之出涕其柩東歸有越數百里迎拜致奠者行路嗟異之而邦人皆以其長者為可惜也將葬其子以書來告曰先人以里閈故辱公知今葬宜有銘敢請某曰嗚呼公美善事其兄善教其子善與人交其可考不誣如此桷方知名當世則公美之名不泯於後世必矣然其事則不可不識也故銘之以遺其子俾刻石納於墓隧云陳府君墓志銘平陽陳經德狀其祖府君之行告其所遊許某曰惟陳氏世為溫人吾大父生而挺特尚氣節不事細謹遇人洞然無疑礙雖犯之弗校也久之皆曰陳丈人長者不可欺也家多資度嵗費外盡以奉賓客善飲酒有過門者則為之歡欣引滿窮日夜弗厭邑之俗喜佛豪民多弟姪則畀於浮屠以并其所有大父深疾之每以為宗戚戒故於今凡陳氏子弟皆儒學無一人異趨者吾大父之教也又曰凡為人子若孫孰不欲顯其親於無窮今吾不幸大父早世茍失所記而不傳焉又其罪也子其與我銘乎余曰噫嘻余雖不與而祖接觀而等力學問能自拔於流俗中宜有自矣銘余其敢辭府君諱宗偉字公美年七十有二崇寧二年嵗次癸未十月二十八日死於家娶沛國朱氏女先府君十六年死生男三人曰士圭士衡士明女三人長適林湜次適繆誠早死季適林宗顔男孫九人經德經邦經郛經正經世經言經綸經猷經辨以明年甲申十一月十四日葬於所居宰清鄉樂溪村之原曽祖墓西四十步曽祖諱添祖諱度父諱文濟博學而文為州里所推重云銘曰為善之報其在後也修身慎言恐辱先也維先有開維後有傳嗚呼若君之子孫不其多賢者耶宣義劉公墓志銘公劉氏韓韜字公輔永嘉人皇祖延貴皇考瑩攝長史雅喜儒既進諸子於學且老矣謂公曰能任吾家事俾昆弟一於學乎曰惟大人命公警頴有志度方營其家規撫偉然日奔走於艱難無厭怠色久之凡所以為生之具畢辦而區處條理粲然可觀常歎世俗族衆則異居異居則恩意日薄顧弟侄孫子繁衍乃益廣室廬殖田疇為持久計而涵容愛拊上下輯睦四十年間如一日人皆以為難而公處之裕如也故家荆溪上公因之闢館裒書延師儒趣諸子族人皆從學曰是吾先人之志也既而其子故起居郎安節次子今給事中安上皆以文行知名太學相繼擢上舍第厯官御史聨職禁省門閥顯大而公之母徐氏尚無恙給事之為御史也以八寶恩封邑仁夀其後起居亦以元圭冬祀恩再封公宣義郎於是仁夀年九十餘見五世諸孫晨昏定省老稚歡然而爵命榮耀為時慶門東南不多見也公孝謹重去親側起居被召赴闕力請而西其後自饒移守宣城而給事出守東陽公以其思念故亦一往焉皆不越月而歸名藩相望千里安輿往來其間人皆以為榮而公歉然唯離親之為憂也宣城以治行聞而救災勤民遘疾不起公得訃哀思致疾病革曰吾其不得給養吾母耶涕泣嗚咽聞者傷之年六十八卒於政和六年七月戊戌而以宣和元年二月丙午葬於永嘉仙桂鄉余奧山之原孺人薛氏承奉郎諱京之女事姑友夫邦人稱之公之為家以迄有成薛助為多生四男子長起居也次曰安上官給事中次曰安禮曰安義皆業儒而安義為叔氏後二女嫁同郡每敏中吳岵孫男二人曰諶曰諴將仕郎女四人尚幼公平居不廢儀矩家人效之遇物仁愛尤篤於姻舊鄰有道死浙西者寓書屬公以其孤公顧恤之甚厚比成人且資其從學曰若父所以屬余者良在是宜勉之其與人有終始多類此葬有日其孤相與謀曰昔我起居兄之葬巳問銘於許氏矣今銘吾父墓宜無他屬也乃以書來請余唯長史樂善為鄉長者而公又不憚勤勞合族而居周人急難著信閭里蓋其所積者厚矣其有後也宜哉起居兄弟皆為世用施於有政惠利不資其所以為劉氏慶者殆未艾也宜有史筆著其終始以示來者使知為善之報如此是銘也亦所以資其采擇云銘曰劉氏世德粵惟皇考恂恂州里犯而不校隂施博矣雖蓋必彰何以占之維後之昌公其仲子銜訓嗣事裕我弟昆集勞於巳誰不葘播或不時穫我克有秋穰穰滿屋垂白在堂列侍縉紳繩繩千指雍雍一門曷夷而隆曷約而豐凡此有家孰不自公維恩維勤維孝維弟維我後人善繼無怠章延仲墓志銘崇寧元年秋八月甲子平陽章延仲卒於京師年四十一其友人蔡元康既為之具棺斂巳又行三千五百里護其柩以歸後十一年政和壬辰某月甲子其孤時敏葬君所居邑浦邊村之西山前期至書狀君行請銘於余余與延仲故往來知其為人宜銘也延仲諱某資禀渾厚不事表暴父死奉祖母楊氏尤謹楊常曰吾兒雖不幸有孫如此亦何憂卒年夀九十延仲持喪如禮里俗傾資奉老佛俾誦其書祈福死者延仲以為謹身節用養生喪死吾聖人所以教人者獨不率而行之乎乃集同志讀孝經曰願以是為鄉閭勸也比舉葬江上半渡風濤暴甚延仲伏柩而哭曰罪逆應死顧吾親獨何辜天地神明忍至是乎俄頃風息而濟議者以為延仲之孝感云曽大父某大父某父某其先漳州人五代之亂徙於溫世田家至其父始喜儒故以命延仲延仲有志於學善取友不妄為然諾其周人之急惟恐後纍從進士舉於鄉輒弗售比西游又不及試其藝以死故與之遊者皆悼惜之初娶林氏再娶璩氏先卒孫三人曰某某皆從學庶幾有成君之志銘曰夫孝經名教之極也而延仲以之諭俗送死大事也而能以誠格焉書其墓石以斯二者亦足以見其為人之大略云方文林墓志銘方氏子諱某者字從禮故新定人逺祖干有詩名五代之亂有家於台州臨海者以彊勇捍賊鄉人德之血食至今子孫滋衍然業儒多舉進士自皇祖諱某饒州安仁縣令纍贈金紫光祿大夫皇考諱某有政事才善論議知名士大夫間卒贈朝奉大夫從禮天姿開爽文思清婉自兒時已能習其家世飭以涖官之大略有所撥置輒從容以辦故方其未出而處也識者皆以能吏許之以大夫恩補郊社齊郎選於吏部易階將仕調信州玉山尉八寶恩進登仕郎再調越州蕭山尉差杭州方田指教官充㸃檢杭越溫州均稅又㸃檢兩浙路方田用舉者升文林郎大平州司兵曹事未赴而卒玉山舊多盜從禮治之有方其尤竒者羈縻狡甚者三人使執其類於是境內帖然衢信境上往來之衝也登陸者百許里有顯者議鑿以通漕郡邑翕然和之獨從禮不可議者致詰從禮曰二溪相望中雖通塗而岡勢益隆一里而尺中且數丈果興此役勞民費財而未必見功豈徒為公私害且貽執事羞也議者乃屈二州之民無重困從禮有力云蕭山湘湖湮廢久民田無以溉從禮亟以浚治請於有司而躬督其役未幾湖復邑人賴其利國家承平日久田野滋闢下民售易不常姦弊百出於是議者請用元豐法方田均稅事下有司而部使者差擇習民事悉心辦公者莫如從禮從禮亦慨然任其責奔走數州不憚深阻其考核鈎深洞見民隱凡髙下肥瘠廣狹盈縮黑白判然而關鍵籠絡胥吏無所肆其奸其在溫州平陽課督官吏定稅置籍方隆冬夜常逹旦因感寒氣得疾比至杭寖劇遂卒於僧舍其始得疾也或告之曰鄉版浩若煙海公能盡矚之乎徒自苦耳從禮不聽力疾檢察愈謹嗚呼其可謂不茍也巳朝廷建立法度凡以為民為有司者或非其人則反被其害者有矣今方田之法行於天下使人人如從禮者民有不受其實利者乎惜乎未究其所長而不幸短命死矣悲夫從禮事親能承其意大夫疏財好義而恬於進年未五十致其仕而歸生事蕭然從禮受命十年不敢調極力營其家弟妹婚嫁不失其時而親舊勞問饋遺纖悉畢舉大夫一無所問議者謂非從禮無以全其父之髙非大夫無以致其子之孝也常告其弟曰我所以不憚粗劇政恐若等廢學也勉之故其弟試可行可皆自勵相繼貢於鄉而以學行見稱於師友云從禮年四十六卒於政和六年四月二十六日其弟以重和二年某月葬於天台縣太平鄉雞頭奧先塋之次兩娶陳氏前室同郡奉議郎貽序之女其繼永康人朝請郎惕之女後從禮十四日卒子曰茂三女長適進士劉之珍二未行葬有日其仲從道自台抵福曰吾兄游最舊且厚惟子敢請銘余謝以非其人然嘗聞諸楊先生中立曰仕於州縣誠心愛民若吾從禮者無幾從禮小官又卒不得年未為當世所知而獨見稱於有道者如此則為從禮家若其朋游皆無可憾也故余録其語而銘之銘曰嗚呼從禮敏於為吏而死於勤事蓋食人之祿而無愧者也凡墓有文以告後人我銘從禮以勸當世蔡君濟墓志銘吾友君濟既卒之三月其父彥先遣使來諗余驚咽不能語頃之方能哭泣問故嗚呼善人君子其不幸至是耶而彥先以鄉先生林師古信夫狀請銘其墓信夫君濟所厚也故得其行實為詳然余豈足知君濟者耶惟蔡氏其先溫陵人避五季亂徙居溫之平陽君濟曽祖諱某祖諱某父諱某實嗣其業且以命君濟君濟資禀剛峻能自克力學其精識絶人論天下事評一時人物始卒皆如所言方兒時舉止端重有所遊觀輒曰不貽親憂否既冠游太學見儕輩從事乎文藝慨然曰此科舉所須耳夫學豈止是耶故聞賢有德者一言一行孜孜訪之惟恐不及太學善士聞名而願交者不可以一二數崇寧中下第忽忽不樂謂其游曰吾未嘗以得失為念而不樂者非親意有所不安耶即日馳歸及門而父疾甚巳淹時矣醫卜皆曰不可療君濟齊戒沐浴默有禱焉得吉兆而疾愈其事諸父友昆弟輯睦上下各得其歡心經理家事凡人情所難堪者皆身任之闔門幾百口今三十年矣無一後言者故鄉人稱族居者必曰蔡氏而戒狠戾不睦者必曰盍觀君濟之為人也其訓弟姪與朋友講習必以忠信愷悌為先嘗賦詩曰君親等天地忠孝無古今弟姪有過差未嘗面斥之委曲諷喻使改而止其在京師逆旅中失金方揭榜購賞有得諸同舍篋中者以告君濟曰此非吾金也常曰古之全交者非一道必欲伸己以求名人將何望耶往還京師朋友有疾病則為之辦醫藥同寢處終始不厭死喪則主後事或護其柩以歸前後蓋十數賢士遭斥逐傾槖資之眷眷焉勉以忠義報國而巳凡游太學十餘年七上於禮部不第中朝搢紳皆嗟惜之㑹天子以八行取士郡人條其應令者凡數十事有司方施行而四方有識聞之相與歡欣稱頌太學辟雍之士日徯其貢遣以來而君濟屬疾死矣悲夫君濟所學以正心誠意為本其優游涵養日趨於自得蓋質諸聖言而合措諸行事而不紊其進勇甚浩乎其未易量也其所往來皆一時賢士大夫而鄒志完陳瑩中楊中立周恭叔尤所欽愛皆許以有為於世鄒陳久於謫籍君濟從之不逺千里志完疾病以書招之比君濟至病且革矣盡吐生平所欲言者而性命之理死生之說見於問答云至君濟感疾啓手足神色不亂危坐如平時嗚呼非真有得者能如是耶君濟諱元康年四十三政和七年八月甲子卒於家明年二月甲子葬於邑之大奧山某原娶王氏閩清人仲舉之女有賢行順事其夫邦人取法焉生女蘇娘無男子以兄子蘇郎為後議者謂君濟安窮逹一死生雖不幸短命宜無惑者顧其親有子如此而失之何以塞其悲乎余以為死生命也夫人豈有不死者乎顧所為何如耳今君濟所學皆聖賢之事業而其從遊皆千載人也亦豈不足以慰其親乎衆皆曰然於是敘而銘之銘曰人不間於父母昆弟之言與夫見其進未見其止皆善學者之事也若吾君濟其庶幾乎非天為之而止於斯乎嗚呼哀哉朱純甫墓志銘朱君諱完字純甫少從進士舉以疾廢杜門謝人事元祐中邑人創佛廟峴山下而君適有地介其間佛者議丐於君君弗聽請以旁近地易之君弗聽又數倍其直冀君售焉且曰君有疾毋沮善事可以徼安寧之祉否且病君曰若言怪吾聖人不言也未幾果病邑人駭甚申諭者相屬君以為吾病非命也耶卒不聽嗚呼其可謂篤於自信者矣使其不病而從事於世顧易量哉崇寧改元七月某日卒於家年六十五娶戴氏生二男子曰紱習進士曰綡尚幼二女子其一早死次未嫁即其年十一月某日葬於邑之橫山陶公谷紱前期諗豫曰先人生而窮死而不窮惟公是屬君曽祖某祖某父某世家溫之瑞安云銘曰三軍可奪帥匹夫不可奪志自古然矣我思若人載石不誣以詔後昆
