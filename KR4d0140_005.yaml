body:
  text: 横塘集巻五宋許景衡撰七言律詩送李仔主木場寨塞垣人物豈㝷常推擇而今屬廟堂戚里從來有名將家聲當復振諸郎古陂解凍干頃碧官柳驚春一拂黄下馬也知無箇事蓼花詩興自難忘次韻曾光叔曇縣尉我今自笑菌生庵才讀君詩舌本甘未暇清修齊臘八要陪㳺冶趂春三光叔有春風浩蕩釣極知世外交從好却厭塵中富貴酣谿老絶無名利念不謀耕鑿即漁蠶次韻張縣丞賀三貢士貢籍初登郡學生海隅草木也欣榮一鄉三秀真希濶大筆千言豈猥并樂育從來推絳帳作新何止換丹楹㑹看騰躍如夫子淡墨髙髙掲姓名世綵堂菜子斑衣祇一身未如今日劔溪濵一門純孝非無種百歳髙堂更有人饒得雲孫千指盛知他間世幾畨新太平佳話君休惜洗我從來兩耳塵寄陳仲山當年抱疾題新句老歳支離已可嗟官學半生渾似夢塵埃兩眼漸生花相從杖屨非無意歸去田園亦有涯袛許刀圭振疲苶與公白首醉流霞勞勞苒苒任年華何用逢春苦嘆嗟但得千鍾傾竹葉不妨一笑為桃花麒麟莫問行天路魚蟹從今飽海涯祇恐愛閒成痼疾却須妙手泛丹霞昏昏煙土客京華節物驚心祇自嗟一飽徒饕太倉粟十年不見故園花躬耕舒嘯今方决卜築横塘尚未涯夫子元無療饑藥待從方士飯朝霞寄張敏叔壽春太守紫髯翁憶得當年笑語同應為江山盡詩助更無音信問途窮簿書覷著鈐齋静棊局拈來蠟炬紅也待去為樽俎客却憐身世尚漂蓬寄呉行可憶昨揚旌過水濵一樽燈火夜相親邊城喜有笑談頃鄉路誰知夢寐頻山驛梅花初破臘池塘草色稍囘春新年持節經行處亦許孤燈續後塵寄王經國曾陪誕節祝堯年過眼星霜嵗又遷誰信江湖閒釣艇却來霄漢聴鈞天錦筵樂事今何似蓬鬢蒼顔獨惘然還戴賜花殘照裏九衢塵土醉揺鞭寄文通俗流指笑漫喧喧好古初心自惘然已分平生有書癖况堪此日識碑顛萬金盡散英豪外千巻仍存六一編洗眼何時拂塵篋待將㸃畫較精研寄薛克勤髙才猶佐古諸侯樽俎時時好獻酬萬物也知皆有役此身安得不言休烹鮮未覺民難治炊黍猶忻客少留㑹看曲臺須舊德討論文物盡從周寄敏叔敏叔書云日與張卿天覺和匆匆候館陪歡笑别去而今又幾年冠盖由來在天上音書還肯寄江邊也知官長多詩句未省誰人與酒錢近日頻頻看除目諸公要路亦騰騫寄呉鄞縣呉郎人物最雍容不墜家聲浙水東輦寺昔曾酬雪唱道山今獨倚秋風簿書又報三年滿樽俎何當一笑同巻盡暮雲天更濶放教醉眼送飛鴻舊有詩寄左與言兼呈劉元禮今因寓此仍用前韻寄劉東行長憶過新樓衣綵題詩贈李舟千里尚歌公惠政十年誰念我重遊雨餘三洞雲俱散水落雙溪月自留莫戀城南好泉石斯民屬意富民侯左崇見寄以鄭䖍張籍見況憶向栖霞宫裏宿論文獨喜子相過酒酣尚覺初心在嵗晚其如别思何官比廣文還較冷詩疑司業不争多友生許予嘗如此更問旁人果似麽寄左經臣二年南邑好相看誰道忘形最較難别去光隂驚倐忽春來書訊喜平安如何柳市多時住不向横塘一笑歡節物慳人詩興懶多應閒處凭欄干依虞仲韻寄劉元禮先友相從古所惇杖藜當日喜盤桓雲泉何啻千年别塵土長懷一笑懽但掃勞心身後事何須天地掌中觀果容憐念如前約卜築從今始茍完李彦益過景城以詩寄之聞説安仁過東縣却撩梅福欲歸心畫船長是半日到秋水而今幾尺深人散渡頭飛鷺下月明波底老龍吟一杯相屬知何日驛路蟬聲急暮林次韻寄盧行之三首萬疊遥山鎻暮煙一江秋水渺連天慿欄正是滕王處下榻誰知孺子賢聞道白魚方切玉更饒黄雀正披綿一樽吟嘯無餘事説著塵埃却可憐莫厭喧譁近市㕓且欣空濶對江天揮毫曾不靳珠玉列斝何須問聖賢南浦西山雲漠漠夕陽芳草思緜緜飛牋逺寄京塵裏多謝星軺尚見憐撲撲金猊嘘白煙峩峩畵閣挿青天杯盤洒落有餘韻翰墨風流追昔賢逺岫長堆翠羽被晚霞碎拍臙脂綿銅章更有詩家子横寫緒餘猶可憐寄李聖與李侯自是金閨客奔走人間三十年未信簿書能老我何妨詩酒自陶然江山滿眼應相助風月關心最可憐解道清陂新過雨也教别乗愧前篇寄成正仲畫繡初乗八月槎肯來一笑子真家狂吟取次還成軸戯酌無多已過花陳迹悠悠驚夢寐勞生擾擾嘆長沙遥知髙㑹還思我共唱江天一抺霞寄行之城南城北長嫌逺卜得甘泉坊裏居笑語不愁歸去晚往還可似向來踈二毛自覺身將老一别誰憐嵗又除定是烏銀正忙裏怪生沒箇寄來書問訊盧家大小僧憶渠旅思為消凝春禽言語得能好秋水精神更乞增今日垂髫且嬉戯他年鼓翼看飛騰懸知父黨無能解頭白絲絲面有稜寄仲山城郭長時厭還往却來郊外飽經過故人一别已多日春色三分今幾何山鳥無端勸沽酒林鶯取次亦能歌花邊欲作當年醉望斷東風十里坡寄俞清老寒棲巖谷古浮邱曽約同為汗漫㳺十載光隂如夢覺半生簿領尚桴浮樓頭紅日半規晚眼裏青山萬㸃愁淮水悠悠從此去試慿雙鯉到揚州寄木尉君任江湖萍梗漫流連邂逅天涯獨慨然老去鮑昭非俊逸古來梅福是神仙一樽笑語渾如夢兩地音塵動隔年有底樓臺堪寓目平蕪千里夕陽天寄宋國寳問君何日過留都想見初寒尚在塗一去塵埃事奔走歸來門巷更荒蕪聲名盡欲傾時軰貧賤今方見丈夫勉矣此生忠與孝扁舟未好問江湖畫船重過穀城闉撞著人人問子真聞道詩書元有意莫嫌州縣尚勞神一樽何日能如約五斗而今亦為貧關塞塵沙騎瘦馬故園花柳一畨新題葉家雙蓮亭鴛鴦也是池中物何似芙蕖出水新獨蕋應慚今夜月羣花空占别時春恭惟陶冶歸元聖聞道丹青憶老臣更向東郊看合穎我曹今作太平人代書寄福清王居士前日匆匆問起居此心耿耿復何如身從驛騎三千里人在天涯八十餘自是浮雲有南北誰知明月滿空虚半生俯仰今塵土安得從容扣草廬陳節秀才失目贈之兼簡卓羅源何事詩翁遽失明朋逰相對淚縱横祇應藥石猶能療肯與風光便隔生老去篇章方得意春歸梅柳最關情風流宻令雲孫在雪唱何妨屢寄聲樂壽驛詩富韓公使北啓國書于此迢迢古驛倚城隈使者當年幾往來慨慷誰無致君意急難方見濟時才自知兵氣終須懾更覺天書不浪開堂上遺塵何處去太平父老獨徘徊和姪邦彦登道山亭詩縹緲三山海上州登臨便覺壓鼇頭風雲出沒千㝷塔煙雨溟濛幾葉舟嶷嶷朱顔方照日蕭蕭霜鬢獨驚秋人間榮悴何須較且把吟牋敵酒籌次韻黄堯翁南漪堂書事南漪勝槩壓西湖珍重瀛洲肯寓居紅藕自欣歸賦詠杜鵑應嘆早驅除煙收露下鳴臯鶴風定波平在藻魚箇裏凭欄知有得絶勝閉户病相如敏叔除祠曹以詩二首寄之掉却淮南好郡章歘然馳驛對天光有誰更草詩人詔應數從前水部郎霄漢豈惟收舊物鬢毛每苦嘆新霜十年尚有南昌客塵土昏昏只恁忙趙子相逢關塞間一聞消息破愁顔也知念舊心猶在頗怪題詩寄尚慳已分低頭從簿領却因歸夢見江山俱依風月應長好誰似先生耐得閒謂方彦徳也俱依羽天在台州方居其旁送蒲秀才遊南劔兼簡上官守十年萬事盡參差惟有騷人似有期山水窟中為俗吏簿書堆裏得新詩從來好古幾成癖此去論交亦可知安得相從飛兩槳看他郡國犬生氂送韓存中學士二首郡國棠隂日日濃乘軺衣繡惜匆匆秋天鵰鶚風雲外春草池塘夢寐中聞道蓬瀛才有素肯教江海樂無窮斯民未作北亭别使節時時過浙東憶曾共飲揚雄宅屈指而今又幾年還喜名藩陪燕俎剰看醉墨洒吟牋風煙羃羃留行斾鷗鷺翩翩近畫船囘首向來行樂處斷行踈雨濕江天赤鑒客館以清陂名堂賦詩古渡誰教名赤鑒新堂自是面清陂何人好事能題榜今我居先為賦詩風静波平人散後雲收天濶月明時可憐此箇無窮意多少漁翁醉不知清陂堂當年平翠看青嶂平翠在台州黄巖枕上長教捲畫簾今日清陂堂裏宿寒波萬頃浸銀蟾人間好景無如此物外清遊豈易兼富貴功名非我事尚容山水樂無厭即事關河念念問歸舟秣馬翻為楚國游野性從來迷出䖏濁醪端欲慰沉浮春風庭院花千片暝色簾櫳月一鈎看盡天邊歸鴈過悲笳三疊下城樓景城宛在水中央短棹飄然下渺茫早路常期泛滄海異時誰復問瀟湘看他賈客千帆過聽盡漁翁一曲長家在東南千萬里寒煙漠漠又斜陽城外黄河四面流此中真箇是瀛洲雞豚散處看漁市蘆葦叢中認馬頭子美凄凉聊遣興賈生卑濕不無憂相過喜得田郎子時有新詩與唱酬次韻邦直中秋夜月秋半風髙天四垂去年曽此賞清輝素娥可愛還依舊游子誰知尚未歸望極星辰皆北拱興闌烏鵲自南飛一聲水調何人唱莫惜淋浪酒濕衣初至郡流落翻為長樂翁也知天意憫人窮九仙巖洞寒林外干寺樓臺落照中漸覺杯盤如里閈從教言語變兒童郡人更説明年好緑葉垂垂荔子紅蒲秀才集臨川詩世人集句漫紛紜吾子超然有異聞獨把長矛探虎穴不教仙翼浪雞羣離離池上生春草藹藹江南欲暮雲喜得安居從此始絶勝釐析事虚文吕子光惠牡丹六年不見故園花每到花時只自嗟多謝故人分國豔尚憐羇旅惜春華芳菲仙圃烘初日冷落書牕照暮霞誰道無情便無恨祇應也學我思家越州孝女朱娥祠詩十嵗人家小女兒凛然髙節見臨危委身甘死凶人手轉眼猶懷大母慈天子早曽加寵賜邑官今為立新祠若教娥與名俱沒畏敵忘親未可知贈張同年諸孫詩緑髪蒙茸初著巾翁翁喚作掌中珍始知詩禮趨庭早又見芝蘭滿院春青紫近來如拾芥文章此去不勞神塵埃衮衮元無補應笑年家老丈人王經國生辰試問何時得異材斗杓挿子近旬來文星已作人間瑞陽氣方從地底囘何有摩挲話銅狄要看清淺半蓬萊斯民再嵗蒙休澤多少歡聲入壽杯和張子壽晚春東風作惡也輕佻斷送殘紅四散飄自是春愁渾未解不堪詩句苦相撩𡨕濛薄霧迷歸燕料峭餘寒入敝貂齋閣但知拚一醉儘教􅙘雨夜蕭蕭諸友偶賦克已以戰喻次韻酬之聞道除戎戒不虞何須深考七家書萬全要在先謀帥多算安能便勝予豈止邊陲卧􅎏鼓嘗聞俎豆薦牢蔬古來偃武修文者㑹使人人有室廬謝諸友絶學寥寥千載餘忽驚酬唱祖前書善人今得見之矣吾道將行命也歟滴滴寒聲消臘雪融融生意看春蔬不才聖世甘無用歸去先人有敝廬贈敏叔二首星郎持節厭驅馳解組蕭然兩鬢絲三紀聲名詩獨歩五州惠愛吏為師裕陵松栢秋風早茂苑江山落日遲千載赤松應更喜故人孫子也相隨公家舊物是蓴鱸好箇歸休便入呉唯有五湖供放曠也無三徑可荒蕪酒樽傾倒隨風月詩句流傳入畫圖煙水悠悠來不盡髙名千古與之俱退食退食㝷常無箇事杖藜蕭㪚有餘歡小橋落日蓮峯碧别圃薫風荔子丹早路謀身多齟齬餘生隨意得盤桓横塘應笑歸來晚短艇依然倚釣灘贈俞清老昔我江淮幾還往聞君兄弟有聲名小軒便作陶彭澤五字何如李少卿自説此身看老去却慙相見太忙生何時粗有田園計把手江邊取次行贈鄭介夫人笑流離自抱關天教强健老林泉囘頭嶺海幾千里屈指星霜五十年無事一樽誰與醉有時兩手自争先也知世上皆兒戯出處如公豈偶然鄭公自用兩手圍棊左手勝則右手把醆飲右手勝則左手把醆飲贈呉惇仁長文之孫塵埃簿領判悠悠瘦馬㝷春到海頭已是二毛侵老境尚能一笑得英逰誰言前軰風流盡我覺名家世業優但得此心常了了豈知州縣是淹留贈董公權前軰風流今掃地怪君尚肯轉頭看元來自作小兒子猶及當初老長官簡冊㣲言齊日月絃歌餘澤在芝蘭却慚江海生尤晚不得同年拜杏壇璧山堂在處看山多間斷經行尤喜得斯堂畫屏簇簇連千室古璧蒼蒼遶四旁憶昨服官叨内府祗供嚴祀屬新陽天涯寓目徒増感一覺鈞天夢帝鄉題竹閣西岑僧舎知多少竹閣巍然鹿苑中蠟屐登臨非俗客石床宴坐屬詩翁黄金堦砌紛紛月碧玉窻櫺細細風千里江山應在眼狂鞭何用作深叢又招虞仲來竹閣一諾定須逰竹閣多時凝望出松臺祇應城市醺醺醉肯為詩翁特特來湖水秋來清見底仙山雨後翠成堆欄干供盡登臨目鷗鷺翩翩日幾囘寄張宰幾仲往在横塘詩酒社而今不忍重尋思時人狂簡無如我縣尹風流更有誰塞上塵沙長𡨕寞江南梅柳正葳蕤人生閒健須行樂莫學安仁鬢早衰送髙宰長愛西湖無㸃塵樓臺倒影雜星辰未能把釣為閒客且喜鳴琴有主人揺槳何妨長載月新隄最好是逰春何須更說林間雉看取熙熙百里民送李彦侯宰黄巖委羽謂方彦徳人物已先去陳迹風流猶至今隠吏向來慚懶散令君此去好追尋春歸山奥十里雪霜後園林三寸金况有左生詩句好一尊端為伴髙吟自笑當初作底官只應山水得盤桓江樓風月傳觴後邊塞塵沙行路難閭里樵漁無失業嵗時簫鼓有餘歡十年父老今何似為我從頭問訊看題雁蕩山别來嘗憶舊躋攀好信迢迢慰病顏多按地圖傳藥石不煩䰟夢到仙山塵沙猶在㣲茫處雲水都歸指顧間看取蕩中多少雁衹應飛倦始知還䟦亨老所藏買田帖世間榮利等雲浮珍重先生早轉頭要得良田供玉粒何妨累紙洒銀鈎千金身後方為貴十襲公家得盡收我亦塵埃倦逰者紫薸二頃尚悠悠送為章使君遺愛在甘棠故老于今尚未忘椎鈍自嗟生太晚風流猶及見諸郎鳴琴暫肯留山縣飛舄還同指帝鄉囘首樓前江上月夜來無故照離觴送李彦禮持節西陲已清切還輿北道却盤桓當官未覺家風逺抗䟽要令邊計寛世俗多應笑公拙我曹徒解嘆才難但將名節為親壽何止平反一笑歡送廖用中也知志業在詩書可是才髙與世踈戯綵北逰非我計督郵南去近吾廬官田雨足秋多黍城市潮來食有魚更誦九江長短句人間樂事得如渠送趙仲明二首康州之猶子關塞相逢眼便青從容猶得問平生髙談大抵多忠義先世元來好弟兄但得朝廷收閥閲不論文武盡功名河隄奔走非吾事去去神京信意行役役都來幾獻酬生憎别語攪離愁五更門吏開魚鑰千里春風在馬頭若見逰從出京國為傳消息到真州田園未有歸來計萍梗而今已倦游張敏叔時守儀真送商霖兼簡共叔末學紛紛只是誇孔顔門户本無遮農工商賈皆同氣草木蟲魚是一家我欲收心求克已公知誠意在閑邪汝南夫子規模大歸去相從海一涯
