body:
  text: 横塘集巻六宋許景衡撰五言絶句宿崇國院世塗足趨競野性惟閒散卧聞風雨聲更覺江湖逺再宿崇國院和前韻二首能詩老工部好鍜狂中散相望千載間未覺風流逺羣山盡龍蟠十駕客駑散嗜酒愧陶潛過橋煩惠逺題坡竹勁節風霜日平生忠義心誰知身死後寸墨市千金絶句五載客河關塵沙滿領間扁舟下清阪眼底是淮山笑語三關去扶持萬里歸情知是同載為底更霑衣江樓江水去無邊江樓思渺然西風掛帆席一一是歸船七言絶句黙室寶冠題榜意已到竹閣作銘言豈多入室人人知是黙誰知个裏有傾河送人遊天台洞裏桃花無數開玉人不肯放春囘未容梅福休官去應怪劉郎獨自來過寳勝哭雅師二首鳳凰巖石最稜嶒十載重來强一登怪底巖前能寂寞年來失却兩詩僧雅與外師為詩友陳迹都來俯仰間空堂遺像已斕斑白雲誰道無情劇猶向山前自往還借蘇子美畫像呈趙君鐡面蒼髯見舊詩人間物色轉參差君家好本煩相示要識滄浪晚歩時過襄城三首范忠宣嘗為邑公子言歸嵗月深絃歌猶自有遺音誰云故國無喬木看取青青著作林父老分明識長官青衫緑鬢照朱顔故知廊廟經綸意也似鳴琴百里間聞道愛民如愛兒從教閭里作兒嬉紛紛行路皆垂白知是當年不忍欺題野鵲羽物從來數易完張生妙筆更多端東山詩老今黄壤野鵲寒林忍更看題醒心亭醒心亭下水悠悠歸棹匆匆更少留何日飄然五湖去醉吟還得過浮邱春日春日㝷常醉不醒而今春日若為情青絲纎手成陳跡舉案齊眉已隔生梅朔風吹雪滿長安閩越生來不識寒却有暗香飄六出不須借與外人看送筍與經臣短短犀簪尚帶泥重重書巻已參差題詩分贈君應笑何似東坡噴飯時再次江左司韻四絶句平生學道竟何知不覺垂垂兩鬢絲六義頼公多比興一言猶足慰朝饑春風吹面立多時此句誰知好色絲未許飲河同鼴鼠只消翫味已忘饑玉粉盛來祗小盤仁人覽物不徒然豈惟廪賜皆民力牛磨團團轉幾千土木形骸付等閒祇應飲啜亦皆然蒸來十裂已堪笑何况長持飯幾千還自樂壽寄盧行之三絶句漲水經春處處通悠悠雙槳夕陽中誰教醉眼添詩思不是松江萬頃紅順水知人欲到家扁舟拂地過天涯寄聲幕下紅蓮客穏放銀河八月槎當年玉帳撫轅門鼙鼓聲中十萬軍妙畧未應隨手盡諸郎才氣各凌雲行之見和再寄大手從容静塞塵人間猶誦病參軍詩家態度公能繼還見春空藹藹雲寄陳季衍父子二絶珠霰瑶花糝暮天亂侵酒琖洒吟牋須知望雪亭前客不學袁安閉户眠郊原草木盡枯荄重霧隂雲掃不開騎馬擁袍何處好梅花門外探春來寄望囘塞上何時謝抱關優遊琴酒舊家山小橋小艇相過處横徑横塘一水間行之席上送忠彦客裏相看常草草酒邊一笑莫匆匆明朝各自東西去囘首江山宿霧中訪唐尉郭外青山帶勢斜松篁深處子真家年來鉦鼔渾無事卧看殘陽映落霞酬戴禹功聞蛙三絶詩談經長下董生帷知有蛙鳴在曲池説似青衿來學者莫因聒聒亂心思春來蛙黽滿陂湖勿為繁聲便疾渠萬物爾時均長養洒灰未可信前書水畔螢飛雨過時天涯逐客獨思歸慣聽相應昏昏月好在横塘舊釣磯亞叟惠龍腦菊二絶州縣徒勞可自咍便憐三徑老莓苔拂衣未作歸來計且把黄花到處栽正色最宜霜後見清香自是藥中珍明年把酒東籬下采采何如舊主人再和節過霜風衮衮來幽叢渾欲卧蒼苔故知短簿朝天去更為淵明特地栽長笑麝臍難作敵未饒沉水獨稱珍移根只好留閒處不見紛紛藥市人贈别盧行之三絶三載相從樂有餘也知志業在詩書栁亭蘸甲分擕後更有何人得似渠尋常送客一樽酒醉聴離歌亦慘顔今日匆匆折揚柳高陽關裏唱陽關百金買得玉麒麟千里看他氣欲犇知子猶能守家法不應騎去傍人門贈别應仲康功二絶多謝故人憐逐客不辭追路到呉山誰知别意添悽斷却送歸舟出北關臘盡江梅未放春欲將何物贈情親端居陋巷有真樂寄語呉門老丈人蜡祭前一日致齋亭午風日和暖呈同舎二絶明朝八蜡徧羣神今日風光漸可人須信少陵能體物分明臘近已含春午枕昏昏迎好夢齋房寂寂稱幽人却思寒夜諸公子解作霜臺一笑春過靈壁阻雨不得逰張園二絶雲𤨏蘭臯十畆園蒼官青士自譍門何須風雨遮來客應怕莓苔有屐痕當年詩酒早盤桓無數蕭蕭碧玉竿雨籜風梢如好在故應知我轉頭看過强氏園詩門外逰人撥不開城隂小徑㸃莓苔踈枝淡蘂深深處只有春風自往來過朝娘墓所夢中眉目尚分明一過空堂百感生懷抱牽衣今已矣春風𣺌渺暮潮平題光武廟聞道三千惟一心未應百萬怕王尋可憐千載興王地城郭摧頺樹草深已卯元日持檄樂清界上望鴈蕩集句寄寜師笑指蓬瀛第十洲青山厯厯水悠悠眼邊江舸何匆促寸歩教身不得逰過天姥見敏叔留題尊酒都門昔解攜繡衣持節大江西却尋十載經行地半壁新詩手自題宿雲洞巖壁經春長薜蘿洞門亂石自嵳峩山僧祇愛雲長在不道人間雨未多梨花飛瓊端是張公女獨對東風無一語粉淚盈盈春欲暮看盡夭桃作紅雨妙智院雜花盛開而邑中獨未山城紅紫看猶蘂野蝶遊蜂祇漫猜却是此中春較早等閒行處亦花開試茶此生貧與病相兼從仕居閒兩不堪莫怪年來有茶癖要看滋味在餘甘損軒詩遷善宜將窒欲㕘此軒名損亦何談古來種種無非學更好從頭問老聃泗州堂投宿山房第二囘壁間題字已塵埃簿書奔走渾無定更解偷閒幾度來賈村三首浩浩長河去不囘先生風采亦悠哉纍纍古塚漫秋草日暮牛羊自下來蘆葦蕭踈倚斷垣賈家猶有兩三村鋤犁蓑笠紛紛去知是先生幾代孫漲河秋水日渾渾獨放扁舟過賈村記得塵沙厭為客初浮清汴出都門環翠軒横塘歸路尚間關環翠軒中幾往還山水祇應隨處好不勞囘首白雲間好是清風五月寒便教忙殺也盤桓最憐池水荷花滿不與詩翁一處看敏叔詩云來恨不逢池水滿屏風圍住芰荷香題平翠軒簾捲清霜曉尚寒好峯重疊在闌干登臨每恨青山逺今日青山枕上看道旁人家小軒方沼圓荷十數箇短墻新竹兩三竿慿欄盡日猶無厭却借行人一餉看斗野亭得得來㝷斗野亭亭今已作鎮官㕔壁間多少新詩句見説當年聚德星醉柳亭憶在河間醉柳亭十年南北嘆漂萍舉頭河上如相識多謝逢人眼更青過西湖懷詹致一憶昨籃輿出城郭靈芝軒檻共徘徊故人短棹今天末斜日湖山我獨來墜馬戯作病軀自覺海天遥瘦馬誰教作意跳也是諸侯老賔客不妨造物惡相撩次韻張敏叔筠軒蘭陵公子留題後野草閒花變四時惟有此君猶好在年年添得嵗寒枝孔顔畫像亭亭一氣自渾淪藹藹和風與慶雲畫手千年聊寫似豈知天未䘮斯文寄邱覺時在天台每欲扁舟老江海不堪五斗尚塵埃煩君且覔天台紙待取横塘居士來招琴僧客心日日是塵埃寄語家山好在哉流水松風無夢寐誰能特地抱琴來戯逺大師廬阜逺公真好事白蓮社裏盡髙才師今更不曾沽酒底事淵明日日來浄光旻老几上見吕沙逸詩軸二絶白髪龎眉一老僧掃除縁事室如氷案頭唯有新詩軸自説風流令尹能天涯此日逢周子海内今年得吕侯自笑種頑終不比可憐迂闊暗相投羅源䕶國院危簿以為大類廬山因作兩絶句石橋松徑入招提盡道分明是虎溪却恨歸鞍太匆促不能月下聽猿啼東林未到聞人説䕶國門前最逼真亦有逺公能好客他年同作社中人資福清軒偶過清軒坐餉時道人煑茗索題詩紅塵六月門前路踈雨泠泠滴小池宿横塘雨餘見螢感舊一賦流螢二十年短篷還是未能眠此生擾擾何為者寄語諸兒各勉旃宿辯正酒酣詩巻幾賡酬十載光隂一轉頭休聽空堦鳴夜雨何郎雙鬢不禁秋行之見招觀畫喚我來看訪戴圖溪山慘淡雪糢糊扁舟也待江湖去更有王維妙手無乙已五月十八日沈元鼎招飯昭慶登白蓮望湖樓汎舟過靈芝少憩孤山下七絶句蓮社羣公迹已陳壁間詩句尚清新湖山俛仰成今古更好留題遺後人樓前湖水與隄平湖上周遭翡翠屏徙倚闌千聊寓目知公教我醉時醒藕花亂㸃水中天小雨輕隂淡暮山試倩舟師連蕩槳要隨飛鷺過前灣鳴琴餘暇即湖山飛鷁傳觴縹緲間只恐雙鳬朝帝所不容長伴老人閒幾年塵土客京華夢到西湖佛子家今日扁舟還似夢不知流落在天涯蘋末渾無向晚風湖光湛湛磨青銅平生箇處要如許塵垢從今一洗空雨過孤峯濯翠鬟亭亭倒影夕陽間夷猶待看湖中月可奈城門欲上關經臣重九假馬同諸友登髙借馬登髙日已曛一尊眊矂自相親可憐山奥無多地著盡秋來沒興人病告看看近兩旬登髙一一聽諸鄰佩萸誰是佩刀者落帽多應落解人經臣秋試失利時余在告墨牛圖一牛動是萬錢值墨指一作何紛綸安得田家真有此坐令四海無饑民出處由來祇一塗區區分别欲何如試看信手作毛角絶勝當年陶隠居横塘春日横塘緑渺漫扁舟欲去重盤桓誰教向晚亷纎雨又作殘春料峭寒次韻戴人逹逰靈隠春來幾度過靈山不覺穿林錦籜斑可是人間未炎熱冷泉終日自潺潺左經臣觀潮閣見招有祇把清風占得公之句週遮豈得吾徒事省浄還為世俗嫌若把清風召人客已應賽過水晶鹽次韻江左司長空翳翳木落處流水渾渾沙盡頭安得此身生羽翼眼中長見釣臺秋次江文韻釣瀬沉沉月一鈎魚龍夜夜盡囘頭狂奴活計非公意乞與江湖萬里秋學道誰言百不憂欄干盡日倚樓頭須知横雨千山暮不比西風一葉秋擾擾争碁局與籌也知一著在前頭終朝下手渾無處為底無人問奕秋請公早早泛虚舟多少行人在渡頭看取清風起蘋末片帆歘過五湖秋平生有志慕前修嘆息因循漸白頭端向嵗寒看松栢始知凡木不禁秋温嶺界上嶺北無端去抱關嶺旁便是舊家山囘頭試覔歸時路只在行人頃步間剡溪橋去去來來今幾秋霜毛漸漸滿人頭束書匣劔平生事斜日江山獨倚樓歸自濵州扶踈弱柳緑初勻啞咤黄鸝語未真行路逢春渾不覺却須説似探花人馬首石詩世俗亦知千里逺却將凡馬被雕鞍何人欲識真龍種好向巖頭子細看和朱深明曾陪杖屨古荆州十載光隂一轉頭擾擾紅塵長滿眼峩峩三峴獨横秋當年一笑得英逰共弔沉碑漢水頭囘首鹿門髙遁去人間姓字亦千秋贈左司先生見告漢江上居士歸從庾嶺頭白日火珠無玷翳閒花野草是春秋和經臣閣上思彦章登賞猶訢詩友俱不知趙子更來無暮天好處須同賦乞與人間作畫圖和江左司新麥紛紛落磑時旋看片片作銀絲先生自足醍醐味惻隠猶憐穉子饑西湖夜歸口占送李泰發山上徜徉湖上歸月明千頃浸玻瓈明朝有客朝天去多少紅塵在馬蹄戴浚秀才需堂客到需堂日已曛從容樽酒話情親欲來却去知何事笑殺當年訪戴人清陂堂簿領他年解印歸尚憐江上子魚肥扁舟不學鴟夷子只要清陂作釣磯午枕欹時睡思遲含風百頃碧琉璃人生適意當如許莫遣塵埃外客知取次題詩留屋壁從他傳唱落漁家禪翁好事還堪笑枉却青青一尺紗過吴子厚和醻楊時可壁間新句主人還往多佳客小閣逢迎不計時蘸甲一盃梅福醉揮毫半壁子雲詩題紫膏院壁院有茶山雪消谿谷已含春雷動槍旗一簇新解道人間最仙景風流無復杜陵人望湖樓示世厚樓頭滿眼是湖山瑟瑟清風燕坐間三伏長塗走塵土他年記取此時閒寄盧中甫四首霜風獵獵動旌旄月落天低錦帳髙旋放洮河三尺水洗磨十萬血腥刀九月都門風薄衣夜碪聲裏鴈南飛野人不識長安樂且趂鱸魚一棹歸朝米暮鹽何日休塵埃滿面霜滿頭草堂竹閣壓秋水幾時和月弄扁舟制勝關頭雪未融崆峒山下又春風此身不及涇川水漾絮飄花日向東寄筆墨紙兄長絶句三首最憐修貢自峨岷拜賜中天雨露新好為先生載嘉句却愁紙價湧京塵潘生地下骨應朽妙技猶藏天府中刀筆未應當好賜不如分付與詩翁刑名去取漫忉忉慚愧官家五色毫老矣弟兄無用處只應警鋭屬兒曹寸碧亭此詩據東甌詩集増入杖履尋常行樂處不論小徑與幽亭誰知蒼莽千峯外尚有仙山一㸃青
