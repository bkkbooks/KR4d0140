body:
  text: 横塘集巻一宋許景衡撰五言古詩題海山亭懷左經臣詩去年登斯亭江山照尊俎眼中十年舊一笑便爾汝今年登斯亭春風糝花絮故人渺天末雲海滯鱗羽尺素相濡沫耿耿不我與壁間指舊題珠玉暗塵土良辰豈易得陳迹空處所眷言繼髙韻寸縷慚織組嘉我二三子肴核佐玉醑歡然為傾倒落日爭起舞丈夫貴適意窮逹付出處洛陽真小兒顧慕涕如雨江流無日夜而此獨不去何須數嵗月俯仰亦今古食筍山中春物早霏紅亂桃杏霜筠固自如挺立萬夫整蟄雷走狂鞭迸地驚脫穎鮮華競時節露籜含朝景山家窘口腹擷摘盡畦町林間忽斑斑一笑脱愁境呼兒且朝飯縹緲度雲嶺海犀紛縱横荆玉燦光烱士生得所適藜藿厚五鼎膏粱誰不飽去去多僥倖康師見訪於竹閣因師臣師同賦問訊元老人道人樂巖栖泉石厭眼耳胡為一葉舟汎汎西湖水應憐老居士巾屨困塵滓相從一笑頃茗盌浮雲蘂江天正揺落秋色淡如洗宴坐俯層軒梢雲森鳯尾眷言東溪老挺立萬夫偉平生海潮音巻舌付諸子維此岑邃師道學究終始當年幾酬對萬法一彈指要當出新句特用問興止江河有餘潤今我亦隨喜贈袁州仰山簡長老簡師本吾儒學佛見閫奥開心滌塵滓囘首棄巾帽飄飄秋雲意凛凛霜柏操魚鼓屢陪衆林壑常寄傲十年棲仰山終日勤勸導欲酌清泠泉為爾沃炎燥欲揮智慧劒戒爾逞貪暴迷途自多梗法岸豈易到惟知務引抜仰不愧覆幬幽明雖難詰善否疑有報巖間湧寶塔兹事誰為造琢削寜須班挽拽誰困奡一方競奔走萬口盡諠噪守臣獻異狀天子錫嘉號鎮壓等衡嶽扶持壯大寶師乎良有得叟也無復道鄉㑹詩錢晉臣和韻謝之流落湖海間十載苦卑濕生還亦何事猶未掃餘習天葩發新句珠履追舊集和篇紛四來文采各熒熠轟鋐金石動淒楚風雨急土風自難忘豈類南冠縶英英王者後文武盛爵邑清深如古井短綆未易汲如何示同好醉墨猶我及年來窮到底屋壁徒四立此行亦何幸珠玉得屢挹騏驎委六轡萬里無險澀他年乘高車何人猶戴笠登清勝堂呈長兄幽居在山腰斯堂近山頂松竹𤨏隂翳軒窻闢光炯先生為題榜醉墨重九鼎登臨屬秋半揺落江山迥獨鳥㸃晴空斜陽亂㠶影相將舉網去鳴榔盡漁艇含情寓毫端羞澁對清景却憶初來時積雪照髙嶺餘香舞寒梅芳意萌野杏英英座中客玉樹凌風並天涯歎淪落誰使脱陷穽愴然撫陳迹曉夢驚初醒年來飽經事百念欲灰冷君恩等山嶽此意猶耿耿何當伸報効萬一免罪𤯝杖屨時往來壺觴欲酩酊樊籠戢鴻鵠末俗多蛙黽此心端不謬餘生亦何幸但恐主人瞋塵沙汙異境朱君文拉逰浄明寺因迓張宰詩火雲湧晴空矗矗盡竒巘午汗麾白雨俯仰無從遁招提據髙岡萬木森偃蹇涼飈落氷雪爽籟發絲管朱侯真好事十里過南坂憐我堕深甑相將振餘喘欄干俯屈曲巾屨容跣袒風苖翠浪翻海嶼青螺逺况兹接尊酒笑語傾懷悃浮雲識醉歌彩羽驚檀板新涼知幾日已覺秋風轉事業愧初心明時羞冗散主人勤使事暌濶心不展雙鳬歸未歸紅日林梢晚還自南邑潮過不及渡因宿江上書所見漫刺辭主人遲遲駕短轅郭外人煙晚雞犬自啾喧客事足俯仰世塗多險艱行役亦云勞未抵浪拘纒潮汐真無情歛去如絶絃解衣試槃礴旅鴈方聨翩天末線縷動鉦鼓俄闐闐稍㸔黄金盤呑吐洪濤間歘然洲渚失浩蕩連雲天平生喜江海豈但眼界寛飄流二十載齷齪百憂煎今夕復何夕玉壺俯人寰造物雖汝厄寜不略汝憐清風一㠶去鼓柂餘髙眠佳處良在兹疇昔勞永嘆成正仲水鄉秋興寄王履道惠然見示以此謝之九河赴滄溟奔放日洶洶霖霪作秋潦散漫失邱壠孤城臨絶島狂瀾驚四擁鳬鷗散凌亂蛟鰐似矜寵微茫天勢平蕩揺坤軸動田家栽一麥秋稼泥沙壅何能憂卒歲廹此朝夕恐孤生寄卑濕五斗安闒茸飽聞逹人觀未作窮途慟稍令裨危堤運土紛接踵河伯聊戱劇爾軰嗟倥偬成侯北方秀筆力千鈞重新詩試模寫氣奪洪濤湧英英幕下郎仡仡山西種何當一交鋒我亦願助勇龍華馬舖懷盧行之去年邂逅去年南邑歸春風拂征轡相從一笑頃花卉方娬媚歳月俯仰間還到經行地壁間舊詩句塵土日蒙閟老境牽俗累節物揺鄉思歸歟悵何時與子同此味浮雲有南北况乃為禄仕置之勿復論一醉了春事道樂安寄楊縣丞時可猗蘭出衆草歳晚不可採幽幽澗底松獨立色不改成都有雲昆逹識我所駭形骸判土木軒冕那能浼端懷三釡養尚贊百里宰人方笑渠聾我獨悲衆瞶經行閶闔里指述紛穉艾愛之不可見暮色生寒靄一區已有宅三徑可無待他年歸去來垂白㸔戱綵林園日成趣雞犬亦自在囘㸔是非塲蠻觸誰勝敗收身要閑健肯坐老病悔我亦釣横塘相望𣺌雲海寄左四十小左真竒才童穉已頴悟讀書一十年胷臆日充饇時時吐所有落筆不肯住長江呑巨壑白日破昏霧雄辭何縱横妙理争發露驊騮始汗血萬里猶頃歩嗟嗟駑駘軰安用苦猜妬而我何為者江海乆飄寓得子稠人中磊落真瑜璐文章豈易工識者尤難遇哀絃有三嘆要非俗所諭往還幾歳月㑹面輒忘去蕭條抱膝吟浩蕩登髙賦迷途子所憐正我欲到處我觀古人文何曽事章句至音本澹泊太羮異凡具君㸔桃李花紛紛競春莫終焉適衆口了不在紅素子兮更深探吾言亦其粗寄左與言時與家府君逰天台我公厭紛華早歳謝羈束卜居山水間山水長在目巉巉吹臺髙灔灔横塘渌興來即杖屨往往混樵牧别來二三載猨鶴悵幽獨歸心日揺揺夢繞湖山曲兒曹真罪人志養非所欲留連州縣間折腰食斗粟世途苦多礙公心亦煩蹙眷言慰公者蕭散惟林麓謝屐齒已蠟陶巾酒初漉結束山家具提擕倩童僕遥知入山去野飯乆不肉相見石橋側觸眼驚寒瀑殷勤清浄供煑茗媚乾竺琖底亦薄相聊以眩聾俗桃谿仙洞府流水花䎘䎘二子去已久蟠桃知幾熟弔古一慨然新詩定相屬英英太沖後壑壑崐山玉千言揮灑頃紙上龍蛇伏聨鑣得所適山路忘重複我亦箇中人簿領方驅逐遥望白雲飛此心尤躑躅羡子好心事愧我祇眠餗人生行樂耳險澀戒川陸千金不垂堂萬里虞脱軸歡罷念歸旋無貪華頂宿引泉示呉甥淙淙玉溪泉曲折西亭隅飛流自噴薄白石浄如鋪雖無渫井禽亦有針頭魚豈知江河寛嘘沫自相濡况此五六月萬物在洪鑪而我弄清淺𤨏碎珠玉俱泉兮且勿流止此為我娯一出澗谷去人間供百需清者鑒鬚眉濁者混泥塗江湖尚或爾而况溝與渠寄語山中人所養當何如浮屠二首浮屠有沖衍少小已雋偉身雖束異敎性實嗜書史千言揮灑頃妙語如飜水嗟嗟静閣中斯人今已矣成象有至行既冠逃浮圖與遊何其多一一士大夫毛髪不及􅚎破衲常如如軒檻已陳迹來者猶嗟吁小圓石屏微風激寒波浩浩皺紋縠連山夾修徑約略露寒木何人琢山骨拂拭溫如玉蒼蒼碧月様入手不盈掬此生隨萬物何者斯為足要須指顧間一寄千里目石屏嗟我官永寜天台祇兼驛如何三過雁未省一投屐豈無謫仙夢蕭散到泉石亦有山中詩淋漓堆醉墨當時巧酬唱二左名藉藉戴子爾何為十載名山客自言石橋下醉耳驚霹靂石橋富孫子一一粲珪璧希微小江山妙盡丹青蹟憐我逸少徒念念岷峨適持此一拳許已作千峯碧我生癡鈍殺兩眼眩白黒塵埃浪奔走簿領隨戯劇何階探道要囘首謝形役琴書載扁舟歸卧横塘側天台何必到去路饒荆棘端留石屏風種種自可識張仲共許惠吕研因成長句英雄舊割據鼎業逐流水髙臺亦已傾况及分香婢鱗鱗屋上瓦棄擲滿隣里鐫窪漫兒戯後世始稱美世人攻翰墨好古惟兩耳何曽問珉玉枉却千金市豈知疊口翁十指老泥滓追蹤千載後未易較彼此其質堅而剛其膚膩而理澄泓秋水浄慘淡暮山紫要當奴鳯咮何止友龍尾神工付黄壤人間能有㡬張侯金閨彦不特河朔偉十年走澤潞百物盡糠粃惟有篋中珍左右配書史明光惟起草此獨塵埃裏嗟我方著書瓦礫著獺髓慇懃桂籍舊許輟陶泓子學問已遺俗取舍期不詭及物何可望姦諛誅既死南監還宅野店飯童僕駐馬亦俄頃寒曰不相貸漸漸欹西嶺揮鞭上馬去驚塵䝉四境客衣已䟱薄霜風作凄冷極目去路長囘首煙村暝鳥雀飛棲定雞犬啾喧静新月當馬頭踈林亂人影去去甘逺役遲遲復深省筋力疲往來歳月磨簿領雖云竊廩禄乃是蹈機穽戰栗當吏案低囘傍公屏少年浪自重事業期台鼎棲棲裁一命泛泛慙飄梗窮通宜有在賦予定誰秉矢詩寄幽嘆寂寞寒夜永庚子歳作我本山中人中年墮紛華祠庭罷香火還㝷舊生涯墟曲分耆舊問勞仍咨嗟三徑日荒蕪歸來何晚耶亦既謝父老低頭自吟哦人生各有役倦游即還家來者祇如許往者知奈何憶昨憶昨秋風時持檄走東越棘圍𤨏深嚴蓮塘漾空闊嘉與二三子雄辯探理窟清尊日從容髙堂俯軒豁思家資善謔望逺嚴詩律海蚌割明瑩荆璞略玷缺雙瞳眩丹青萬紙疊氷雪敢辭窮日力要使駑驥别誰憐今夜裏還對中秋月當時席空堦清影數毛髪杯盤已零亂浩歌彌激烈朋從𣺌湖海嵗月苦飄忽窮閻撫往事驚夢誰與説清砧送逸響寒螿共幽咽舊逰知誰在想見賓筵設泠然廣寒宫共此白銀闕題名滿四壁世路非一轍北軒風雨多長恐銀鈎脱白沙驛弔辛氏劍溪激流湍狠石森戈殳劍山皆壁立小徑千盤紆行人雖慎擇何者為夷塗我行岳灘上短亭臨路隅詩榜紛四壁共傷辛氏姝辛公罷㑹稽歸舟挈妻孥驚濤觸巨石十掌一息殂唯公倚敝篷脱命顛沛餘泥沙汙玉質波瀾漾羅襦草木為慘淡鷗鳬亦驚呼嬌魂逐流水散漫何所如遺骸不盡獲亦有葬江魚千金不垂堂覆轍戒後車爾死今四紀曽無復淪胥是身等浮雲變滅只斯須在物茍有益寜辭死非辜沉江恥讒國人皆笑三閭殺身以成仁聖言良不誣溺死豈爾志庸知非良圖紛紛殖已利感歎獨躊躇和時可醇酎二首聖賢須千鍾我豈箇中人焦枯展餘瀝好我已十分元戎鎮河朔憐此賤與貧不羡彼瀛州已有玉膏醇小槽滴真珠霑餉無踈親但有坐上客誰問甑中塵豈學梁父吟何時見陽春勞生何擾擾百年今半塗是身等浮雲南北方自如青衫憶初仕與公父子俱邂逅話疇昔恍恍一夢餘潛清室世途溷塵土道人獨潛清隠几方丈間凜然玉壺氷湖山自拱揖風月時將迎未能役濟勝乆客媿吾纓書聽雨亭呈元老無雨我掩耳有雨我不聞我豈妄人耶心手自紛紜老人登斯亭聽否了不分前山忽震雷後山堆白雲别毛德修張公鎮關南賓客多儁偉芝蘭已秀發父子作知已聖人樂育才充庭皆濟濟仲也與計偕發軔已千里毛侯東南特清澈分潄水並驅及春風聯璧驚都市麟鳯豈無種貂蟬能有幾承家貴勲業可獨在書史自憐坐樗散所學慙簣止永懷勝已逰塵土濯清泚相從苦匆促寫别亦狂斐離庭寒日暮目斷塵沙起
