body:
  text: 横塘集巻四宋許景衡撰七言律詩平沙閣呈陳古田畫棟朱欄壓水涯稍看劍石欲平沙虹梁突兀幾千尺雲屋崚嶒一萬家衮衮公侯應日起紛紛桃李競春華雙鳬自合朝天去饒與銀河八月槎送董公權入洛蹉過名園百五期眼前穀雨未為遲好麾席上鐵如意拚醉花前金屈巵塵土毋辭乆行役簿書何計得追隨河南耆舊俱𡨕寞試問如今更有誰獻王祠有釣魚臺列國提封倚樂亭九河分處見孤城池臺釣罷人何在邱壠春來草自生遺像丹青皆舊物斯民簫鼓漫新聲誰能特表平生事祝史從官得幣牲寄新茶王聖時䝉示五詩建溪初採雪芽香病客分來敢獨嘗一盌聊為金粟供五篇不學玉川狂風雷有信猶嫌晚草木無情也著忙誰似山中老松栢不知人世有炎凉贈夏倅九華直上參雲漢秀氣由來出縉紳聞道賢良歸盛族故應文彩繼前塵春風醴酒年年好月色燈花處處新他日傳柑向雙闕還思曽醉慎江濵和左與言貧病年來謝還往交親書問可相聞如何舊好懷天末猶及新詩寄海濆吾子叔孫盡咸籍主人兄弟亦機雲羣居猶有㳺從樂官况淒涼獨廣文和酬張敏叔東嘉匕箸琢紅玉北苑枿芽模紫金野人何知敢持餉詩老發興為髙吟松江蓴鱸有家世呉宫風月無古今飯稻煑茗窮勝覽紛紛市朝塵土深再和張敏叔留連五斗未投閒獨坐窮愁有萬般多謝題詩相慰藉應憐渉世最艱難載聞諸老推工部何止神童説長官我亦半生收好句夜光偏照篋中寒再和敏叔二首弱冠曾攀桂一枝半生為國理棼絲髙吟直到古人處勇退宜為世俗師杖屨訪僧長過晚茶􅏨留客固應遲黄山逰舊今能幾詩社猶忻小子隨固知島可是詩奴何况區區杜與呉舉世徒能循覆轍先生今為翦蘩蕪淵明松菊還堪賦白傅園池亦有圖莫把五湖都占了也須留與故人俱和董適道十載江湖早得名未饒淮海獨孫登揮毫落紙才無敵傾盖論交喜不勝休問喧嘩多燕雀須知變化有鯤鵬青雲歩歩前頭去却莫低飛似我能和張子壽二首紅紫紛紛盡鬭妍逰蜂舞蝶亦翩翩一年純是愁閒事三月過來幾醉眠生怕楊花飛似雪忽驚荷葉大如錢詩人只解㝷佳句分付春愁與少年風雨朝來不甚顛殘花贏得更留連簾櫳寂寂鶯方乳桑柘隂隂蠶欲眠老杜只將詩作伴孝先偏與睡相便江湖㶑灔皆春水好在横塘舊釣船改𦵏西山延仲主簿特賜慶什次韻改卜西山痛更深新瑩松栢未成林三牲不待平時養再命何勝永慕心泉壤多應增喜氣隴雲還為結愁隂褒稱重辱新詩句拜德渾如旱嵗霖三月十九日同亨仲按樂大晟聞道鶯花滿上林㝷芳誰更畏霖霪鳴鳩乳燕春欲晚去馬來牛泥自深出火星壇方肇祀聨鑣樂府按新音溶溶九陌皆流水撩動平生江海心辰火舊無祭今創舉除夕别仲煥並轡不嫌車馬塵肯教節物惱行人殘年氣候消磨盡來日風光陡覺新我已襄陽訪耆舊君方郢國和陽春雖然不作多時别懷古知誰意氣親和唐知府宗博學省當年假佩紳誰知家世有功臣朝班長憶傾鵷鷺海角俱欣識鳯麟坐撫斯民雖有道細看此境本無塵自憐老馬猶迷路邂逅何妨一問津了無聲價繼三豪敢嘆﨑嶇世路勞綸閣文書慚潤色琳宫香火想焄蒿鯤鵬變化誰能料燕雀飛翻自不髙松竹雖無三徑在長歌歸去也如陶再用前韻得賢一語可書紳妙選由來屬世臣千里方能辨駑驥四靈安可後龜麟共看再造恢王業肯使中原雜戰塵聞有皇都近消息眉間喜氣已津津異禮多應得雋豪病夫深愧館人勞初欣秩秩陪賔席却憶呦呦賦野蒿春草池塘還得句霜天雕鶚定飛髙也知野客多閒散丹竈松風獨訪陶寄家兄斗禄驅馳驚歳晚世塗齟齬奈時何也知犬馬猶能養自恨田園苦不多兒女近來渾長浪弟兄何事尚奔波横塘卜築今應好試為頻頻理釣蓑㑹餘慶山城動是三年别古寺今陪半日閒簿領嗟余多眊矂道塗憐子亦間關並逰天上皆英俊幾箇江邊肯往還莫惜一尊相伴醉已將毛髮等丘山休師惠詩次韻也知寸木可髙岑肯負平生學古心王事曾無絲粟補鬢毛已覺雪霜侵寓留古寺聊登覽喜有髙僧與對吟更憶仙山最深處巖前小雨弄晴隂贈仁上人飽聽長蘆江水聲歸看苕霅更分明故人應嘆遽如許慈母翻愁太瘦生邂逅艤舟同一笑登臨懷古亦多情髯張好句新拈得恰好而今送子行敏叔有送僧云别後遙知倚門母老來偏憶出家兒宿靈峯贈總持大師記得曾為鳯林客髙僧住處最深幽幾千里外重擕手三十年間一轉頭霜葉乍驚風槭槭雲堂相對夜悠悠去留聚散元無著自笑多情更刻舟寄康師好在仙巖康上人從來心事許誰親品題泉石詩無敵吞吐煙霞筆有神聞道弟兄皆妙質要當談笑繼前塵箇中况有東溪老行處何妨更問津寄仙巖元上人龍穴梅潭抱嶺斜憶曾同試雨前茶稍須林壑開雲葉便倩兒童汲井花一别仙山空夢寐五年邊塞走塵沙㑹須覔片閒田地鄰舍如儂有幾家送持後過越永嘉竹閣談空相自是僧中第一流盡放衲僧來聴講也容禪子不相謀二林三峽曾經耳萬壑千巖試舉頭提取浄瓶涓滴許有時散作五湖秋聰師邀入山學道無成亦可憐紛紛膏火自熬煎似聞沽酒邀元亮故敢移書問大顛州縣徒勞輸此日雲山髙卧或他年須知二老風流在賞遍西枝月更圓虞仲訪僧正見招以詩屬亟歸不及往依韻和報兼簡康休二上人東溪自是老林師千偈瀾飜獨此時盡判百家無好句故教二子亦能詩逢迎蠟屐應班草奔走芒鞵愧采芝多謝相招故人意更慚妙韻繼前思題舒氏覽秀樓詩遶屋青山羅髻鬟小樓幽勝可躋攀不論空翠煙霏處盡在軒窻几研間眼净更無黄土眯身輕仍伴白雲閒他年定作還鄉計儻與親朋一扣關戴夫人挽詞詩書歴歴教鄉鄰甘㫖熙熙八十春盡道先生真孝子故知賢行屬夫人繐帷一訣三年後栢壠孤墳數尺新翦綵種萱今已矣多應處處有遺塵傅夫人陳氏挽詞婉娩名家早結褵伯鸞初怪嫁時衣半生已覺人間夢九死猶知俗習非日永春風漾蘋藻夜寒霜月落庭闈稽山㑹葬人歸後千古蒼官守翠微柯運判修試院當年龍閣帥閩中闢館興賢特地雄還見芝蘭修世職固知斧藻有家風堂堂劔佩瞻遺像衮衮簪紳出泮宫勸學一門真盛事西州何獨美文翁寄台守劉襲明都講二首江入章安波浪寒仙山縹緲在江干二千石是誰為守三十年前好長官聞道漁樵安里社從敎風月落杯盤新詩别後知多少更借鄰翁洗眼看薫然和氣破春寒見説専城冠越干訟牒不勞揮翰手歡謡好付採詩官獨慙聖世人三黜誰怕仙山路九盤但得白頭長健在莫辭青眼重相看送連子友守淮安二首古來江漢最風流何况分符得顯州落日淮源香泛泛含春沁水緑悠悠兩岐定有豐年瑞五袴行聞載路謳大觀督郵誰見憶蕭蕭華髪對滄洲憶昨銀袍試廣庭桂科同日拜恩榮幾千里外相逢處三十年間一夢驚隼斾光華仍逺别豸冠流落獨含情清淮東下饒雙鯉江海何妨數寄聲送何亨老出守泰州海陵人説毘陵好太守當年迥不羣新命而今分竹去歡謡何似隔江聞簿書幕下人誰任尊俎樓頭客自醺千騎固應知體國古來畎畝不忘君張敏叔守梓州風月關心自不閑詩家本領更多般千篇要繼杜陵後萬里寜辭蜀道難今日赤帷新刺史幾年錦帳舊郎官莫嫌白首功名晚松栢從來耐嵗寒䕶國寺詩未暇逺㝷廬阜遊只消䕶國也深幽種蓮惠逺誰還往得酒淵明自獻酬惡句多慙居唱首髙吟長許作遨頭請看十八人同社盡是人間第一流小詩聊記鳯山遊髣髴東林水石幽已愧髙僧與摹刻更煩諸老數賡酬簿書底事長遮眼林壑何人肯轉頭㑹待從公白蓮社杖藜來往亦風流次韻馮吉老馬蹄長厭軟紅塵欲去虚名意亦欣壯士寜為東閣客故人休誦北山文到家留語應如鶴出岫無心恐似雲我亦有田江海曲年來舎已為誰耘次韻盧彦升同場名輩敢爭鋒想見當年賦詠工苒苒星霜今欲老拳拳畎畝獨懷忠羊腸已失千重險鵬翼方看萬里風應笑長安徒粟米不知鼯鼠技將窮次韻陳季修綵衣初寄水邊村學子紛紛已滿門聞道詩書多㫖趣固知師友有淵源聲名在子那能掩志業如余豈足論應笑倦飛歸已晚結廬開徑近雲根次韻經臣見贈邊陲無故事喧争惆悵中原失太平天上風霜方鼓動人間草木已欣榮共懷前日千齡遇誰使蒙塵萬里行淚眼時時望滄海百川𣺌渺嚮東傾過敏叔次韻花縣曾聨令宰裾神都今喜沒階趨青雲羽翼看一鶚秋水精神識二鶵歴覽何如少陵集新詩便是梓州圖狂吟大膽誰知我敢向龍門捋虎須是日見東川唱和景物皆少陵陳迹和趙承之春日土牛喚起打春人休向東郊更探春未説風光十分好且看節物一畨新田園自省非無意簿領誰知尚為貧關塞塵沙長滿眼横塘氷破碧鱗鱗寄内離家不道多時别在路俄驚兩月闌漫有傳筒將委曲祇容書歴報平安文園雖得相從樂明月長思一處看早晚征鞍過天姥寄聲草草具杯盤横山閣一笑樓頭屬晚晴我曹此樂最難名玉樽浮蟻一様白青眼與山相對横箇裏風流終古在世間榮利過雲輕未應暮色催歸思天外娟娟新月生趙虞仲過仙巖以詩見寄答之十年歸夢在江湖今日南飛塞鴈孤已覺登臨多感慨固應吟詠轉荒蕪近聞仙嶺㝷先友亦有詩筒及老夫還許追隨白蓮社横塘今已結茅廬借韻焚香藍帳中酷似梅花江南臘雪不到地六出枝頭也逼真萬里塞垣從簿領五年驛使絶音塵誰知斗帳囘殘夢却有鑪煙作早春草木無情聊假合謝他知有箇中人次韻戴禹功父子逰靈隠聞道飛來太怪生薄逰聊與問山名陁羅布影於中好篤耨飄香分外清猿在僧呼雖舊事鶴鳴子和亦真情晚來歸路還瀟洒裊裊青煙十里城伽陁羅木間有至中國者再和戴堯卿遊靈隠雲房相與話浮生此樂須知未易名釋子命題良有自老人琢句得能清倚天樓殿三呉勝落日湖山萬古情詩社若容追故事未饒五字有長城甲辰春作香火祠庭即隠淪誰知未許作閒人一抛夜雨横塘宿三見東風石液春當宁照臨齊日月餘生報効絶涓塵尚寛九死憐多病乞與江湖自在身和胡繼道傷春逰車轣轣不停輪紅日遲遲展得春莫問年光催老速且看風月逐時新田園未信無來客雲水從今願卜隣預想漁村往還處野航何止兩三人上時相壽五首閒看暖律幾時囘已覺隂雲四面開萬物定知春色近三台今引嵗星來競拈彩筆題詩句端為蒼生祝壽杯師保從來周召事直須兩兩位公槐年年燕喜倍光榮蘭玉稱觴滿相庭信宿尚餘元夜月上台却是老人星包荒度量侔河嶽盖世功名在典刑一語堪為我公壽聖賢相與合千齡清淨端為物外仙經綸猶有世間縁坐令四海渾無事付與羣生大有年南極老人今日見西樓明月夜來圎吾君萬壽公同德綠髪朱顔照冕蟬槐庭三入妙經綸百度分明又一新上欲無為成至治天教難老為斯民川塗蕩蕩初消凍草木欣欣各自春誰信塵埃尚羇旅四年企首望洪鈞上帝分明憫下民挺生賢傑在斯辰蓮華葉上青髯老萱草堂前艶蘂春盡閱搢紳歸藻鑑頻教動植入陶鈞古來多少調羮手獨見緇衣有世臣寄敏叔寺簿詩海角紛紜祇簿書朅來不覺一年餘自嗟擾擾無休息猶及匆匆問起居前日先生官獨冷而今主簿意何如應憐小女猶癡在只喜腰間已佩魚敏叔時為太常簿新改服色賀生日詩慶系來從沁水園勲門婦德衆稱難舊聞孟母無欺語新得嫦娥不老丹行見綵衣添衮繡更饒文砌擁芝蘭却須剩種黄金菊留待年年獻壽看德起惠酒横塘今作小塘居齋几蕭然一巻書心事蹉跎嗟老矣天涯流落念歸歟尚煩親好頻擕酒多謝園人日餉蔬此境從來無逺近祇應在處是吾廬韋尉畫孫倅寶冠山圖問著蠟屐到何處直在寶冠山上頭碧澗坐來元洒落彩毫畫得便風流公方得志人間世我亦長思物外逰一幅須㝷好東絹閒人亭畔倩韋侯送仲煥入潁詩好箇石城無分到問君此去意如何一江春水竹葉酒萬㸃青山佛髻螺聞道楚宫俱泯滅祇應郢邑亦疑訛直須索取圖經看莫只聽他白雪歌送西京宗博林茂南赴烏程才名自昔等三張閲駿無人似九方金谷園中辭綺席水晶宫裏奏清商割雞正好師言偃歌鳯多應笑楚狂未信江湖留得住凌雲頭角老昻藏敏叔浮梁詩有放教明月上扁舟之句因成小詩幾年浪作紅塵客明月扁舟不自隨忽得浮梁好詩句却思望柱舊家時煙蓑雨笠多應在利逕名塲兩不知㑹有功成身退日不煩猿鶴怨歸遲望柱在横塘之側亦地名也與言叙已卯之别放逐歸來梅子真江邊無限送行人千鍾桑落開新釀十里梅花正早春邂逅喜君方筮仕經過嗟我倍思親驚囘十二年前夢陳迹依然淚滿巾兄長省試下第還鄉以不及顧拊景衡于此情見于詩謹次韻江邊送我赴瀛洲風物蕭蕭又見秋百嵗能禁幾回别此生已是十年愁塞鴻自覺東南逺汴水誰教日夜流淚濕西風知有寄塵沙漠漠漫囘頭送剛巽還鄉問君謁告還鄉曲來往塗程得幾時莫怪杯盤能草草只縁行李弗遲遲路從鴈蕩靈山好秋入鴒原草樹衰京國艱難同旅食而今莫遣老人知剛巽舊與兄包蒙同在京師今剛巽歸為其葬耳次韻戴禹功㳺浄梵退居泮宫人物最清修杖履時㝷水石幽已聴老僧談出處更邀逐客共賡酬浮雲過眼空千古巨浸觀身袛一漚風彼舞雩宜有得聖門更欲與公㳺天寜節上壽紫宸退詣相國寺祝壽宴尚書省霜天宫闕九門開共獻君王萬壽杯善祝歘來傾寶刹賜筵還許燕中臺樂連百戯鴛鴦集花覆千官錦繡堆説與伶倫逢此日年年長賦醉蓬萊和陳文仲嘲夢文仲已罷科舉忽夢預秋薦天公真箇解撩人不獨虛名老搢紳聞道髙眠閒白日也教幽夢落紅塵此生出處元無意平日文章漫有神百嵗都來如一覺却須嘲取自由身乙已八月二十九日宿内府夢過村落循溪而行問路旁人家此云何曰士村也渉溪入山崦謂同行曰此可賦詩因得鳩燕二句既覺足之以為異日之觀杖䇿徐行山水間天然新句得非難鳴鳩報雨天欲曉紫燕哺雛春尚寒物外勝逰方自適枕邊幽夢忽驚殘士村他日尋陳迹却記曽為内府官紀夢詩郭荀卿見和次韻溪水泠泠溪上軒登臨誰道四并難當年髣髴夢仙塢今日分明在廣寒還憶鳩鳴雲色重似聞鷄唱漏聲殘刻舟已有新詩句流落何妨作外官秋冬思家鈎簾危坐思悠悠踈雨知人特地收明月清風孤館夜寒砧短笛異鄉秋我生志氣誰相許何日身心得自由極目長天山隔斷吾家不見白雲浮
