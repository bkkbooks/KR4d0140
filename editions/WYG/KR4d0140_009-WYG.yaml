body:
  text: 横塘集巻九宋許景衡撰劄子論宗澤劄子臣竊聞議者多指開封尹宗澤過失事未知是否如何澤之為人及其為政固不能上逃聖鑒苐未知果指何事而言也若只縁拘留金國使人此誠澤之失也然其本心只縁忠義所激出於輕發未盡識國家事體耳又未知别有何等罪犯也然臣自浙度淮以至行在得之来自京師者皆言澤之為尹威名政術卓然過人誅鉏強梗撫循善良都城帖然莫敢犯者又方脩守禦之備歴歴可觀臣雖不識其人竊用歎慕以為去冬京城之内不能固守良由大臣無謀尹正不才之故使當時有如澤等數輩赤心許國相與維持則其禍變亦未至如此其酷也徃者不可咎来者猶可追今来只校其末節小疵便以為罪而不顧其盡忠報國之大節則臣雖至愚竊以為過矣況澤昔在河朔遭遇陛下遮留拱衛繼㕘幕府宣力為多今尹天府其績效又彰彰如此則其所為終始亦可考矣而議者獨不能少優容之其不恕亦甚矣乎且開封宗廟社稷之所在其擇人居守尤非他州别路之比今若罷逐澤則當别選留守不識今之搢紳其威名政績亦有加於澤者乎若有其人則除授交割尚費日月兵民亦未信服防秋是時計將奈何若未有其人則澤未宜遽然更易也人材難全久矣惟聖人以天地為度包容長養兼收而並用之庶幾其有濟也其宗澤伏望聖慈上為宗廟社稷下為京師億萬生靈特賜主張厚加委任使成禦亂治民之功天下幸甚臣無任懇切拳拳之至取進止臣所論宗澤事本欲請對敷奏縁臣所患未安所以先次封進上勤聖覽伏望獨斷力賜主張其留中及付外廷並取聖裁論郭仲荀畫一劄子臣伏見郭仲荀制置東南招捉盜賊畫一申請除東南按撫發運監司並聽節制一項昨奉聖訓已行正外所有乞體究當職官失職選官承替尤為非宜何則戎事民政初不相干官吏失職或有騷擾監司都守職當按劾今仲荀只縁招捉盜賊乃欲按治州縣既紊常制顯屬侵官凡今監司廵歴所部或受牒訴或按刑獄茍非本職於法並牒送所屬監司施行盖不敢専也如此今仲荀乃欲盡總東南之事以重己權殊不知侵官違法亦已甚矣又畫一項内乞支降銀絹以為犒設激賞又别乞給度牒一百道朝廷並已應付乃恐銀絹用盡乞於所至州府據合用數取索限一日應副臣契勘東南州郡昨縁調發勤王人兵府庫所有為之一空今若依仲荀所請凡有不時之須限一日應副深恐東南州郡猝然無以供之既迫限期又畏按治勢必強取於民其為騷擾抑又甚矣是則招捉盜賊未見其利而良民先被其害也方當艱難之時民心動揺之際豈可不為之顧卹哉臣愚伏望聖慈特賜詳酌其郭仲荀所謂體究當職官失職選官承替一項伏乞寢罷不行所乞激賞銀絹令牒逐路轉運司那融應副稍寛期限庶使東南州軍無意外之擾吏民幸甚取進止論罷童貫宣撫河東劄子臣聞天下之事言之於未然則若狂率而無根言之於已然則又緩後而無及矣近者中外喧傳皆云朝廷將起童貫宣撫河東若果無此議則是傳者之妄而臣有採聽不審之罪若果有此議則臣願言之於未然也謹按貫頃在陜西專務誑誕以為事功夤縁軍須攘竊邊計重以賄賂至千萬億奏功第賞皆由請屬胥吏厮僕皆位侯伯狎昵士卒隳壊軍政此皆陛下所洞知固不待臣之縷數者也前日燕山之役不能上遵宸畫漫無紀律洊致敗衂徘徊境上師老氣索遂使新軍悍帥妄為已功邀求無厭傷威倍費貫之誤國豈不灼然臣昨論列劉延慶不當量移事親奉徳音以為皆由宣撫司號令不一以致白溝之敗為其引年謝事故議者不復及之今若起自廢閒重領兵柄則不獨誕謾貪墨有甚於前日也且貫既無功於河朔尚能有為於河東乎方其壯時罪惡固已貫盈今老且病矣尚能革心自新乎古者國有大議謀及卿士謀及庶人今陛下命將興師以靖疆場此政事之大者亦甞謀諸衆人乎士民駭惑論議紛然夫豈妄意以為不可哉誠見其已試而無效也臣累被聖訓彈擊官邪毋憚大吏然則今之官邪亦有甚於貫者乎今之為吏亦有大於貫者乎故敢昧死獻先甲之言庶不貽朝廷後日之悔也伏望睿斷亟罷所以命貫者别謀良帥以濟萬全之舉實天下之幸取進止論王安中自便劄子臣伏覩近降指揮象州安置王安中放令逐便臣僚累有章疏論列安中罪狀若令自便公論未允至今未䝉施行謹按安中昔帥燕山親見郭藥師之䟦扈常勝軍之縻費金人之侵侮邀索並不曽奏報朝廷措置守禦固寵畏禍左右彌縫以茍延嵗月故議者咸謂縁燕山之役成中原之禍者童貫等倡之而安中實成之也貫等已正典刑而安中止竄遐裔巳為寛恩今若引赦例得逐便則當用武之時無以懲守邊之吏矣或者以為曠蕩之恩罪垢咸滌而安中乃前執政獨不得預濡澤乎是大不然赦書明載蔡京童貫梁師成誤國之罪雖其子孫猶不得預収叙之例孰謂安中與之同罪乃遽得自便哉伏望睿明檢㑹臣僚章疏特出宸斷所有放令逐便指揮更不施行取進止論揚州駐蹕事宜劄子訪聞揚州近日市井買賣大叚不類應天府市人畏縮關閉店肆近境商販柴炭之屬不敢入城以此日用之物頗覺乏絶成熟飲食軍民無從收買人心不寧臣愚欲望聖慈詳酌特降睿㫖應揚州米麵魚肉柴炭屬此冬寒販者希少可與權免稅錢其商販津盤官司及門頭並不得阻抑市井交易務在兩平不得輒有喧爭仍以牓文速行告諭不獨慰安軍民之心亦所以示仁聖臨幸撫存徳意取進止論般取東京縑帛劄子臣竊聞巳降指揮差官前去東京般取縑帛既有此舉惜不早令津般從駕而行也今若後時而取則有可慮者二一則恐都人憂疑以為車駕既東復取此絹則是未有還京之期且虚帑藏不為都城防守計也下民至愚豈能盡知國家藏蓄但見般取此物便敢妄議也一則絹數億萬經涉長塗部押官吏有幾何人安知盜賊不生心乎只如前日後軍皆前進户部金帛獨殿其後議者尚以為憂而況汴堤千里所在廵防闕人可不為之逺憂耶臣愚欲望裁配且留此絹京師為最便或恐向後闕用乞候春煖般取則不致駭都人耳目或候當番衛士諸軍赴行在日因令防䕶東下亦為甚便伏望聖慈裁擇取進止論後軍行船失序劄子臣契勘本臺昨准御營使司劄子并降到行船次序内後軍在侍從百官及户部金帛船之後今月初三日午時以来忽見後軍衆船一併越次前進擁塞河道並不容百官依次行船戸部金帛萬數浩大理合後軍同共防䕶今来本臺竟不依次序後軍曽無被受指揮許令越次前進若盡令人馬先行則非所謂後軍也萬乗順動獨可忘殿後之備哉兼恐户部金帛或至疎虞則為害非細不獨紊亂次序而已欲望睿明特賜詳酌施行取進止乞罷黜張公庠劄子臣訪聞通判福州張公庠在任貪汙不法自知公議不容乃扇揺軍情歸怨監司帥臣監司帥臣日不自安而提㸃刑獄司已具劾奏即未聞朝廷施行契勘福州去年兵變縶殺帥臣柳廷俊朝廷失于究治今餘黨尚存而公庠職為倅貳不能撫循乃縁已私扇惑諸軍竊慮禍變近在旦暮去年巳是覆轍而近日建州軍賊猶未就擒不可不戒也其張公庠欲望聖慈檢會福建提刑司所奏速賜罷黜施行以解一方危急仍乞下本路牒鄰州鞫治罷犯明正典憲取進止奏免賜楊惟忠田宅劄子臣伏覩近降指揮捕獲方臘赴闕統制官楊惟忠于京兆府賜官田十頃官宅一所臣竊惟蕩平浙㓂生獲渠魁肇自聖謨授成將帥其間偏裨佐屬各有勤勞凱旋之初第功行賞高爵厚禄皆以為意外之獲也彼惟忠者巳賅賞典超轉五官今来宣撫司保明再有陳請度越衆人賜以田宅竊謂一夫僥倖雖未足信誠恐同時立功之人各懐觖望之意蓋朝廷既開此例則無以杜絶後来若偏裨皆冒橫恩則在官田宅將不勝其求矣古者惟有大勲勞則錫田賜第而祖宗以来將相大臣功徳卓越者亦止于賜宅而已今睦賊就擒豈獨惟忠之力奈何特異諸將冒此踰分之賞哉前日王師撫定燕山近者勦絶奚賊將佐皆立竒功慶賞亦既行矣彼視惟忠所獲豈不慊然皆有不滿之意耶臣愚以為破諸屬之姦革濫賞之弊使後来者不敢攀援妄有僥求宜自惟忠始所有賜田宅指揮伏乞睿斷特賜寢罷取進止奏罷辟張恕等為諸州通判劄子臣竊惟州置通判雖曰佐貳守臣然自祖宗以来選擇畀付目為監郡使州將有所畏憚則任屬之意深矣故雖遐方小壘皆自朝廷命之伏自近年帥臣監司偶縁一時申請例得辟置陛下獨智逺覽以為寖失祖宗之意乃于政和丁酉特降御筆以戒在服今纔幾何時而冒法觸禁者復作矣若河北轉運司奏辟張恕通判莫州河東經畧使乞辟彭作通判平陽府是也然此特其所部之支郡耳至若知河間府詹度奏辟張公濟通判本府則又甚者也夫漕臣許辟其屬三路帥臣許辟幕府若州縣城寨之官則各有著令至于通判則無明文若為守臣而得辟置則是門下私恩之士也尚能舉監郡之職乎且為奏辟之言者必曰選才集事乃若他州通判拘于吏部資格容有老病昏懦者今三路並邊之倅悉自朝廷選除豈有朝廷選除之人皆以為不可用而巳之親昵黨友乃以為才耶夫徇私引類侵紊祖宗成憲且違專降詔㫖皆近年翫習之弊不可不懲也所有張恕彭作張公濟伏望睿斷特賜改正施行其詹度等亦乞戒飭以警慢令之吏取進止辭給事中劄子臣先准尚書省劄子奉聖㫖除臣給事中罪悔頻煩重以多病早衰自知決無可用敢圖天造未忍棄捐收之閒廢之餘置之論駁之地竊省非據已罄忱辭伏望睿明檢會臣前奏特賜許令辭免俾稍安于私義庶不致于煩言辭免右丞劄子今月十一日准尚書省劄子三省同奉聖㫖許某除右丞日下供職者聞命震恐罔知所措伏念臣智能蹇淺學術荒疎自叨使令積有罪戾比䝉奬擢備位言責日月滋久無所建明方以曠官失職為懼敢圖誤恩躐進丞轄雖天地之賜父母之命所不當辭而臣自度迂愚非所當得深恐上辜任屬自速顛隮伏望聖慈洞照誠悃出於迫切收還成命以穆師言臣無任祈天俟命激切屏營之至所有恩命未敢祗受謹録奏聞取進止辭免御史中丞劄子准尚書省帖子奉聖㫖除臣御史中丞不候授告日下供職者聞命震恐不知所措竊以執邦憲糾官邪自昔以為要官近世尤所慎選矧當國家艱難之時中外憂疑之際儻或言路推擇得人則於時政庶幾有補伏念某頃為臺屬嘗冒言責徒縻嵗月莫効毫分乃以瘝曠自貽譴逐雖䝉湔洗旋復顛隮比者䝉恩收之江湖流落之中疾病衰殘之後曽未瞻於宸扆已洊叨於寵命天地之恩何以報稱苐惟已試無效豈敢復玷選除伏望睿明察其迂陋收還成命改付真賢上以全朝廷為官擇人之體下以伸臣子量力度徳之志臣無任祈天俟命激切屏營之至所有勅命未敢祗受謹録奏聞伏候勅㫖薦張守劄子臣伏見奉議郎前監察御史張守博學能文好直有守頃為臺屬蔚有士望銜恤去位今將造朝契勘監察御史盧臣中巳除左正言欲望聖慈詳酌特除張守填闕如不稱所舉臣甘伏典憲取進止乞除尚書省長貳與並除樞密貳臣劄子臣聞謀之貴衆斷之貴獨今天下大政一歸于陛下宸斷惟是贊㐮彌綸同徳協謀者則不厭其衆且多也竊見尚書省比闕長貳而同知樞密院事亦久闕而不除雖用近制三公通治三省然文昌政事之本樞筦總兵之地各有任屬安宜久虚其位哉況近年財用匱乏民力困弊賞罰僣濫官吏猥多姦贓害民請屬成俗軍政不立邊防未完陜西並邊諸州地震彌月壓傷軍民京東淮南浙西積水被野有害秋稼此正陛下敷求輔佐振舉紀綱之時也臣愚伏望睿明博考天下之公議慎選當世之忠賢以補政府之闕使之上贊聖治以亮天工而熈庶績於海内幸甚取進止上十事劄子臣自䝉誤恩備位執法閲日滋久了無建明不獨智慮短淺言辭澀訥之故亦以陛下方圖東幸纎悉措置上關宸慮竊謂與其狂易之黷寧負不敏之罪今者駐蹕淮甸上下安寧此正講明治道興滯補廢之時也故不揆迂愚輒以見聞昧死上獻庶幾有補聖政之萬一臣竊觀方今人才未備而政事不立法度未脩而宿弊尚存浮費不節而國用空虚賦役煩重而民力困弊命令不行而事多壅滯賞罰未明而人無懲勸賊盜繼作而吏民被害邊境危急而武備弗嚴姦贓未逐而貪暴滋多公議未伸而親黨害政凡此十事之利病實繫國家之安危安危所在變故難測以陛下之神武英斷必能成中興之業以陛下之誠心孝友必能迎二聖之歸其事雖曰多端其要不過十者而巳惟是十事之利其講之則不可不熟十事之害其去之則不可不速講之熟則是非明白去之速則立見治效欲望睿㫖下三省樞密院公共討論脩復祖宗之成憲稽㕘士大夫之公議下從民欲上取聖裁于以致中國之安榮于以釋異域之窺伺在陛下果斷力行之而巳取進止
