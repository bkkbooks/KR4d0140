body:
  text: 横塘集卷十六宋許景衡撰小簡與晁無咎伏自去違牆閫缺然巾履之役積年于此永惟平昔采拾眷記之重夙夜頌詠不知自已而身賤迹逺修敬姓名乆不聞將命自取譴絶殆不知所以丐察於門下者恭惟至仁大度漫無疎昵之擇若某之鄙實倚終始存全之雖負荆前請勢未易前拳拳私誠輒布于此伏惟恩門有以諒之而已伏審比以盛德偉望入冠三館十年舊物誠未足為門下賀然天方假此以為台柄之階是以四方士民鼓舞訢戴自幸康濟之澤朝夕我及矧夙被品目者願頌之私宜如何哉伏惟頫循氣叙眠食加練為廟朝自重以慰海内之望某竊惟先生直道雄文取孚當世揆日滋乆比偶時變凶人得路公肆姦巧使䕫契偉業歛寄湖海而嗷嗷赤子無以自生然祅氛戾氣豈能掩日星之焯然者哉幸聖政一新屬意人物汲汲如弗及比觀除目少契士論然總而論之莫先我公則發揮蘊積収功太平宜無爽此時矣某伏自幢節屈臨亳社嘗數奏記左右其後困躓海隅僻左少還往竟不知使從寓留何地以是不獲時往問牘但拳拳念德之悃不能自置耳兹者恭審鋒車已達闕下輒勤叙嚮往仰逹執侍者竊幸矜貸某向者竊尉黄巖偶管庫失察應答踰年比少定而不孝得罪天地先子棄世孤露待盡苫塊偶未死猶及見老成舊德進陟朝右摧裂餘息於是自慰然迷塞叙誠言多闊略冀有以諒此與張帥庚伏炎畏恭惟精練生經休有神相及物之報如川方增更乞俯為士民益綏福履卑情無任祝頌之至某迺者伏審進職延閣申命帥垣寵數至優任屬彌重除目傳播識者慰愜顧列門下士之末此情良可知屬以在逺不獲奔走左右而行役擾擾得報後時修慶因亦不早悚慄無限尚冀照察某違逖恩席俯仰三年奔走南北乆疎馳問左右每自愧訟今春至京師恭審去冬台候少不康繼得藥喜逺隔聞知最後又不得以尺紙少寓繫念拳拳之意慚汗殆無以處尚倚門下愛撫素渥有以照其匪懈爾比得之往來竊知氣體完復勝常此心欣爽恨不鼔翼一拜幕履以寫縷懇北向耿悵惟祈厚自䕶持以副中外之願某去年謁告還鄉涉履艱棘往返萬里今春方抵唐州未幾猥䝉誤恩以職事召自惟疎賤不才非所當得政自門下奬借之出知感知幸夏仲到京即欲上狀少謝萬一屬碎累感病忽忽早暮比少定方得契此願而筆語拙訥敷叙又止於此惟爾悚惕伏冀情恕與樓試可阻侍座幄閱日滋乆備數卑冗屬以文禁無由一拜幕履以備頥㫖惟是懷仰不知所喻初寒恭惟尊候動止萬福更乞上為廟社善保崇重下情無任比觀除目承有遷秩之慶雖未足為左右賀而盛德偉望進陟亨塗實肇自兹顧在眄睞之末苐劇忻抃無縁操刺贊喜左右尚冀神明有以諒之夏間恭審起居愆和嘗走門下繼聞即得藥喜下情欣釋比來想惟尊候益康豫旦夕别上狀次昨者邂逅承教匆促不欵區區慰幸不無慊者賤役拘文無縁奔走門下少叙欣戴之意惟爾慙怍尚冀有以賜諒與張稽仲違離侍席寖易時序夏間抵闕下嘗走門屏恭審從者留河朔比聞旋馭屬賤役拘文無縁㕘省嚮往殆不勝兹承銜命聘遼大斾啟行有日方冬寒澀台候何似敢乞䟦履自重以副朝廷遴選之意且須還使之寵焉某幸甚比以河間吏屬夤縁趨走風下迂踈無堪猥荷存撫而備數于此復自輝潤之出此心銘佩何可忘徒以浼凟為懼不敢率爾叙感遽聞陛辭即路方爾綴繫又不獲請廻館帳惟增慚恐謹上啟尚冀神明諒之與永嘉郭守某比不審台候何似伏惟鎮撫多暇神相諸福某䝉恩幸甚賤役拘綴尚稽㕘省伏乞善加調御少副中外屬望之意乃者伏審榮奉恩言寵復法從多士稱慶殆不容口洪惟德義之重海内傾屬雖屈臨逺郡而天眷滋渥清名峻秩洊被褒嘉行須召還徑陟顯重顧被遇厚者尤拳拳於此時也違侍賓閎俯仰踰歳奔走修阻所至滯濡旅𤨏益復不聊上問因亦疎闊然念念眷撫之私誠不能早暮忘也自爾有東去便饑渇之素尚冀時得以自達於將命者益以忻快春間還任唐州猥䝉誤恩以職事召涼薄何以得此政自翦拂之出不勝感戴饕禄無補或僥倖未從汰逐尚及左右還朝少謝輝潤之萬一何勝千萬願言與晉臣戴伯揮晩路得禄一官勅局忽將終更補考易秩尚須半年許渠頗自嘆其艱棘而諸公亦每深憐其職事京師不得改官反從後任干與者則其勢益落落難合竊以為伯揮之榮悴乃在晉臣赴官遲速之頃耳在晉臣豈有意乎某以為此事不可望於世俗子正可以望吾晉臣蓋疇昔周旋洞識高誼固當優為之也然為貧須禄我曹通患若䝉留念當勉處之稍遲數月而來則清議翕然是遲也乃所以為速不識以為如何蓋諸公之意如此而某以雅眷輒爾喋喋可罪可罪與人畸拙無似欽戴恩紀之重非一日積進望幕履祗役灑掃宜不可後屬以冗賤無階効其區區徒爾愧恨尚幸神明諒其匪懈爾天眷滋渥行有超拜之慶以滿士論更乞順時寢餗自重瞻望丈席下情無任祝頌之至某比者䝉恩備數勑局政自翦拂之賜祗服眷錄感刻無以為喻然猥陋不學於法令尤非素習俾之刪潤大懼無以仰稱推擇之意尚冀門下曲賜庇存不斥以僥倖朝夕孤悴跧伏窮陋坐恨親承不繼而叙問啟居亦復曠缺何取為眷撫最厚者慙㥏不可言亦聞從御比復往還天台鴈蕩其徜徉山水之勝有足自適亦市朝擾擾者所未易得也未逮傃風但益耿耿謹上啟參訊比得之往還竊審游刃事外益求其所在我者神觀深曠了無罣礙此正汨没塵垢者願聞一二猥俗挽人不能自前為恨如何尚冀他日侍坐以究所請慰薦上聞已乆除拜當在昕夕盛才超進以享祉物之福正其時矣何勝拳拳頌願或聞代者來期尚遷延不識誠然否某比得畢葬待盡墳廬追思已往祇切摧迫耳無緣靣訴萬一愴咽莫既于此惟望神明有以察其下悃爾湖海疵賤竊服盛德之望揆日滋久疎逺自引敢萌親近之念比何幸乃得以吏屬祗役門闌而襟度豁然収接甚寵其周旋之眷殆非頑鄙所應得區區銘佩牢在寸臆猥職綴繫坐遙軒墀惟是欽誨輒爾僣寓以書伏惟神明賜諒竊以世德才望清議所屬屈臨便郡聞者為之嘆惜豈天姑徇一方所欲使有歳月之幸耶徒御䟦履屬此寒澀不審尊候何似旌斾壓境老稚迎拜巳相屬于道矣矧在眄睞之末親承有日所懐良可知前兹更乞以時保重某以部吏趨拜下風乃禮之常伏䝉特屈崇重噓拂窮陋存撫之渥正自大君子厚德所存然施非其宜不任悚慄屬以拜違不敢躬伏門下以謝寵賜徒知刻畫以為不忘而巳京師久客日益擾擾參省不時得遽復請違下情不任眷眷某承學不敏又涉世淺吏事尤非所習仰禄州縣雖知為貧苐未知果免曠瘝之責否尚須左右臨照掩覆保全之也唐州風物不惡惟今秋小稔經費為他州所侵見請於漕臺計亦不至闕絶其他疇昔採聞良審更不一一上覆與陸中丞某竊審使舲東泛已過揚子即日秋氣漸爽江山照人寢味當益勝某官雄文直氣著聞中外忠義大節見于言責均逸得請晝錦鄉邦雖足以適歸榮之願副老稚饑渇政恐已在道曾未暖席即還廟堂均福海内蓋搢紳所期者如此非小吏私祝也某頃䝉恩備數佐吏之末私竊喜幸不獨以為罪戾之餘趨走下風幸託大庇而淺陋不競遂窺道德高致聞論議之緒餘庶幾滌去塵滓少償願學之初心焉非造物憫其窮躓特以見畀耶侍座行有日欣戴之誠欲云不盡某向留都城數走門下訖不獲一望熒座缺然願懷東下惘惘蓋無時不在左右行役擾擾念欲叙致此懇屬乏去僕又爾不力逋慢之罪宜無以自恕惟寛大有以諒之與吕幕掃跡屏閫於是數月洪惟眷德所被凜然寸臆未易替忘身世擾擾無縁脫釋日屬後塵傃風耿悵而已謹奉狀敬問興止不次乃者旌斾西指錢塘雖寒澀䟦履良勤而天倫愛義積年契闊於是慰愜恭惟從容幄席粲然一笑人間之樂宜無大於此者凡與聞知舉增手足之愛甚善别後當時時嗣音柄用之召想在旦暮矣自聞還轍即欲修敬左右俗事訶逐不覺後時仰負高誼罪愧不知自釋當賜矜宥某哀荒尚延殘息猥自輝潤之及下懇感甚早者特拜車馬之寵而著誨亹亹備形慰藉之意忻慕慚畏不任此懷迷荒竟未獲祗詣館下為左右謝重使惶悚尚倚眷遇有以照此謹上啟旌斾往還邑境自應奔走以綴賓謁之末衰塊不符此悃徒抱悵惘誠不自意首勤榮拂眷遇稠重無以況喻雖仁人厚施漫無賢否之擇顧孤露餘息獨何幸而得此耶無從親承叙感揺筆耿耿暑伏滋劇雖揮箑高爽猶不自堪而將事此時䟦履重複其勞如何然使幽圄灑然均被平反寛釋之賜亦大君子勤已裕物之意也斯民幸甚前日遂幸瞻欵窮寂得以自慰間侍信宿高風凜然欽揖不替稍寒浮涉良艱恭惟尊候萬福某孱弱不競屢被眷錫兹幸未易言冗𤨏仰稱缺然愧畏愧畏謹啟走問興居旌斾還自南邑以私居乏人探伺不早比知省而齋舫前泛滋逺不獲恭叩將命惶懼無地尚幸通照匆促序致不詳縷早暮别拜狀前者旋斾馳候不敏慨然攀詣弗前有愧眷數重被教帖之寵辭致颯爽如奉周旋猥陋何幸密邇未即瞻欵馳情几席不知自已頃聞南渡舟師不力有驚悸之虞竊用懸念重聞足疾小梗不審數日來服藥何似當已痊復斯民倚德惟眠食保厚進慶顯用代志逺與吕推言逺几杖之侍倐倐累月沉汨塵垢每思誨言如在天外坐拘末局無縁祗奉座隅少符願悃悵惘不知所裁恭以慶門盛業載在天下而明公才德兼茂謂宜騰驤要路與伯仲相先後顧猶淹泊郡國從事簿書士論所以為之憤然也除拜之喜不早暮間即有馳慶之便矣孤苦待盡日無生意以是修伺起居曠疎累日然嚮往之誠實不如是怠惰也恭惟愛撫有日當未以訊問疎昵為言但鄙陋自不知所處耳惶恐惶恐兹者猥䝉府座誤賜采録孱𤨏不應得此蓋出執事剪拂之眷銜荷重遇闔門以之拘纒未即謁謝門下但有悚息與吕守季秋霜冷恭惟鎮撫多暇福履日新郡國承宣朝廷眷矚伏乞俯循時令精御興居下情不勝瞻禱之切伏念講服德義之重有年于此轉徙南北惟是眷眷一拜之幸缺然未獲何勝愧恨比承出鎮侯服師帥一方而疎謬無堪實槩編籍之末以均大君子涵育之賜凜然欽戴倍百倫等顧以從禄逺去無階趨走下風瞻望門牆滋劇向往疇昔浪跡士友間共聞先正直節勁氣見於議論位不侔德有志者所同惜竊以為忠義之報當在後人恭惟文學政事世濟其美宜在朝廷以攄及物之澤俯為一州政非其處豈天以海旁嗷嗷之俗為可憫姑以豈弟厚德畀之耶報政有日當遂右擢以副士大夫望顧在疵賤願言尤切昔者備數河朔受代來歸㑹聞使斾東去有期竊以為當獲㕘拜以釋積年願見之懇比至闕下而齋舫前泛乆矣失所素料徒爾怏悵日欲敷叙萬一致勤左右而京居乆客事境紛亂訖貽不早之愧尚倚神明有以諒之耳與處中伏念一去誨幄俯仰六七年眷言撫愛之私念念此懷蓋無時不在門下獨以困頓湖海待盡旦暮不時申問宴起自取背誼之咎抱愧此身不敢自貸然盛德有容不替始終雖斧鉞森植竊自審其或逭也下情良惓上石守伏自疇昔祗拜庭下荷䝉至仁畧去崇重俯加顧揖而慰藉之意溢於言色仰識厚賜感刻不敢忘違去軒戺乃爾累月永言恩覆之及未易縷數而賤事拘纒無縁早暮左右少效巾屨之役徒頌詠德義以盡依歸之誠而已謹具啟上尊候某以孱陋生長都邑自能言時已得盛名於士大夫間比謂經綸偉業已在廊廟美政善俗矣乃今尚以逺郡曲留麾節此輿議所以嗟惜於前日也然發露毫末以振枯槁亦一方之幸顧恐召節東下不夙則暮進陞要近均斯幸於天下雖斯民眷眷攀轅願借宜不可得矣纍然殘息遽脫撫育預切悁悵某竊以永嘉名郡江山秀發甲於東南自昔顔謝相繼出守率以登臨吟詠為事考之載籍則晉宋風流多出於此陳迹依然不知幾寒暑寥寥後來誰復繼之比何幸乃有大君子此來恩威所臨歌頌載路又得以詩酒行樂覽古詔今江山自是增氣矣乃者竊觀酬唱篇軸辭嚴義豐逺追前人殆非庸庸刻琢者所敢窺尋其髣髴也匪佞某得性慵疎幸先人不鄙使從學問雖不能洞釋淵粹然志所欲到亦不敢不勉比以貧甚猥從禄仕簿書米鹽并困心力舊學既以蕪廢而職事又不能無弛曠者上頼恩造保全覆䕶以及今日仰惟大賜比重山嶽此生祗載何日忘之某重念先人清尚好學厚朋友樂施予平時俸入未聚已散伏自捐館諸孤索然無以繼朝夕而某小官薄禄不能自支茍不勉圖寸進以活老稚則食啄倍十不知死所矣中夜嘆息念惟仁人君子有以恤此故不揆量喋喋仰冒嚴聽儻䝉惠然重以先子平昔獲侍都講學士投好最厚特形薦墨之賜則門下之德槩及存没而某所以為報塞者宜如何耶某無任願望激切之至頃者率爾承稟將命方抱僣冒之咎伏䝉異眷特賜教翰捧緘祗誦舉族傾聽所以慰勞孤苦之意勤數有加上荷恩遇非孱弱寒賤所能報稱萬一輒什襲祕留永惟重寶蓋其他不足以為謝也江海斯民幸㑹自天乃得巨賢照臨于此扶殖善良鋤去宄猾熙熙千里猶一室然竊惟才德之重宜列禁從上承顧問淹回逺守士論謂何除拜之喜當有日矣此有志斯世者所以尤勤勤於祝願也某孤苦不敏分甘委棄無復僥望於此時比不自揆輒敢屑猥投聽重䝉仁厚俯矜所請恭惟采拾之私侔重覆幬自非至仁大度忘其鄙陋而憫其無告疇肯假借及此哉圖報之悃環視無以自效顧未死尚冀異日奔走門壼少伸一二也此生幸甚幸甚昔者先人獲私於都講學士愛契最深往還手澤尚存敝笥今某幸以迂拙仰附門下之士則泉壤慶謝之意宜與此一致也顧恩撫夤縁所自豈不逺哉存没感慕感慕某祗荷異眷自應趨伏庭下以究謝懇而縻職筦庫未易如所願滋用惶恐短啟叙感不竟萬分上汙神明益重僣越併乞恕諒海隅猥陋敬頌德義積有歲序牽綴南北永言瞻拜下風邈未易契此心慊然豈意旌斾辱臨此方恩威所懷千里鼔舞獨是不競方苦私故弗獲奔走麾屛仰備驅使豈禀賦賤薄所以願侍大君子之幸者尤非孤苦所應得耶下情惘怏恭以慶門盛屬為東南望家聲世業載在天下皆士大夫所願道以為矜式者而閣下又以文學行治激昻要路取重此時尚稽柄任委以逺守輿議大以為不然夫豈知海隅億萬之衆生造提拊槩有望於左右耶竊計廟堂之議宜亦不能出此賤子詎敢云伏自下車掃滌塵壅使民物灑然一新明而不苛寛而不弛實古循吏事吾屬何自得此非天有以憫其僻陋無堪疇肯畀以今日之幸耶報政滋乆召書東下揆日以須斯民獨何人乃欲私我公使不以均澤海内為念宜其未易得也昔者道舊治仙居而父老藉藉具言利澤之在物者孤陋竊用嘆仰身賤迹逺居恨艱於親承少窺高逺企首悵然幸今託庇部封謂可以進侍幕履矣又以衰塊不能自前何勝恨恨尚須異日符此懇悃與孫簽違離侍席兹有日矣願言承請何勝早暮之悃屬者旌斾按臨敝邑㑹臥病在告不獲望塵道左悵惘增甚末局坐縻無從時拜座隅謹叙嚮往伏幸照念春半晴燠不審候履何似此方幸甚仰辱大君子拊育之澤日月未幾而歌頌載路苐恐除召之命近在寅夕斯民不終盛賜之及預以為恨耳鄙塞無堪竊食筦庫猥被眷庇之私未即譴斥實闔户孤弱之幸尚稽進謝門屏感慕無限前日府座過聽特形薦墨之賜自揆淺薄何以堪此蓋出門下賁拂之素遂階寸進以活孤露此生感戴何日忘之與俞叔通言逺几杖之侍於是累月念積勤頌仰非筆語可既而病故侵汨踰時弗獲有獻左右雖門下了察非懈未究詰斥顧内省當如何耶負荆未遑尚冀濯去已往使獲繼此以勤執事者不勝幸甚幸甚
