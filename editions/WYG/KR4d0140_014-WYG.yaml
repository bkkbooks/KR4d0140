body:
  text: 横塘集卷十四宋許景衡撰啟賀呉吏部啟伏審光膺帝制入冠省曹高才躐遷多士推服伏惟歡慶恭以某官英彀先達聖時偉人高明蓋本於天資彊敏遂出為世用繡衣出使上裨六府之修錦帳為郎妙極中臺之選既伸清議益奮亨途顧以拙疎嘗叨游舊職守所系慶謁未前惟是欣愉未易敷寫代賀鄭尚書啟伏審顯膺制詔榮拜秩宗省座惟賢海㝢相慶伏惟歡抃恭以某官學優聖域名重賢關論議獨擅於當時文章矜式於後學聯榮伯仲被遇聖神禮實優賢􅀞日常加於三接爵以配德一歲乃至於九遷自判五花於掖垣洊更六尚於殿省藹然休譽厭于輿言說禮樂而敦詩書為世所慕治神人而和上下非公其誰載聞曵履之聲曲成推轂之美皆慶門之故事獨今日為有傳方將對越在天之靈協輔繼志述事之孝挈繩墨以正國宏襄贊而奏功夙夜惟寅已見帝虞之咨命朝夕訥誨行期傅說之欽承代賀侯戸書啟伏審光膺帝制榮拜地官大賢序遷多士誠服伏惟慶慰恭以某官才周盛世名重妙齡彼東魯之儒生固知所畏雖北方之學者疇敢或先早躐賢科寖更膴仕頃由簡㧞進被寵榮正色抗言凜霜威於五院分職率屬俄鴻漸於六卿惟是司徒舊兼教職暨神考之釐正惟國用之是專為官擇人自昔以為重任生財有道於今乃屬真賢賦歛惟得其中上下可使兼足矧廊廟之虛席須公謀猷期君臣之賡歌措民仁壽某叨塵法從逺守塞垣悵展慶之莫前徒懷風而增抃代賀徐戸書啟伏審顯膺帝制榮拜地官除目喧傳輿情欣屬伏惟歡慶恭以某官天資爽㧞經術深淳執簡南臺凜乎有不可犯之色批勅東省燦然皆大過人之言休功愈隆德名日起宜天眷之滋渥俾國用之是專為官擇人方深委任之意生財有道遂無匱乏之憂行謝民曹入贊聖政某備數外寄竊沾餘光念展慶之莫前徒向風而增企賀宫使待制啟伏審榮拜命書進職延閣法從屬諸賢者士論為之翕然伏惟歡慶恭以某官陳義甚高樂善不倦佩青庠序朋友已頼於琢磨戱綵庭闈父子不疑於可否屬龍飛之上治慶鳳覽于德輝是謂千載之一時乃獨十年于三館公朝舉善豈嫌祐甫之用所親宰府撝謙庶幾仲尼之逺其子稽參載籍紬繹新書上嘗嘆其乆淹人亦疑其用晚偉兹異數斷自淵衷雖持橐已峻於西清而秉筆尚仍於東觀千金弗容增字一簣要在成功轢古切今論次蓋周於四海銜訓嗣事匡濟當出于一門輿議所期斯言可必某猥沿孱薄宿荷奬知邈無撰履之夤縁徒愧升堂之遲暮敢陪燕雀之賀少傾犬馬之誠代賀左尚書啟伏審光膺帝制榮拜秋官省座惟賢海㝢相祝伏惟歡慶恭以某官天才卓絶學術精明比躬際於休明能自奮於忠義一被識擢寖階寵榮憲府宣風肅本朝之綱紀中臺典選作多士之權衡淹時于兹惟上有眷遽承明命遂總祥刑仍進讀於金華日親承於玉色仁聖典學坐綏九月之師卿士讞疑自絶一人之獄懋兹偉績簡在淵衷倚須夢卜之求遂膺鈞軸之拜多士屬意斯言不誣原夲缺代賀林吏書啟伏審拜恩帝制進位天官除目始傳輿議惟允伏惟慶慰恭以某官早以盛德簡在上心翺翔禁塗發揮賢業夏卿掌伐已坐攝於戎羌天府剸煩遂一空於囹圄茂對非常之遇上裨致治之功乃眷文昌莫先冢宰分職率屬總百為之紀綱激濁揚清作羣材之衡度惟帝時舉非公其誰方聖賢協契於千齡而父子聯榮於斯日謹庭闈之定省豈限晨昏贊廊廟之謀謨當在朝夕某猥沿宿昔嘗荷眷知雖云拙技之無他竊喜英游之得志繫官于此馳慶莫前惟是依歸不勝忻願代賀劉察院啟伏審光被朝恩榮升臺察除書四播士論一辭恭以某官所造既深自信尤篤少年庠序聲稱固已卓然一時英髦欣慕以為賢者比繇宸選擢寘師儒惟天下之樂有三方崇於撫育而君子所敎者五實頼于作成果膺鳳詔之褒亟踐烏臺之峻矧惟三院實糾百工雖未能究於逺猷亦足以行其所學服豸正色既一振於紀綱持橐從游諒不踰於朝夕某屬縻逺守展慶未前欣愜之私敷致難盡賀盧司成啟伏審光被渙恩峻更新命專論說于東序自昔有聞流道德于西廱于今乃見朝廷屬望師儒得人傳聞四方鼓舞多士伏惟歡慶恭以某官學通聖閫名重賢關羣居講磨不獨發明于經術一時操履固已矜式于朋游頃自諫垣揚于殿省休有譽處簡在聖神方璧水之崇儒顧絳帳之虛席敷求其可宜屬諸誰矧復三代里選之文而革千載科舉之弊天子樂育德音見於日新海宇欽承賢能舉皆雲集自非學校之先進烏可模範于後來三年有成尚竊遲之一變至道庶幾可也惟懋非常之績上神至治之功言謝諸生入贊大政原本缺賀時相生辰啟北陸薦寒南斗躔日當律近大吕之半乃天生賢佐之辰蕃錫大烹降絲綸於星使歡聲善頌萃簪笏於台屏凡預見聞孰不鼓舞恭惟某官威儀式於百辟文武憲于萬邦以甘盤舊學之臣為成湯一德之相遐荒率服年穀順成風俗為之還淳刑罰幾乎不用歴年于此四海晏然乃眷嚴冬載臨誕日斗旁柄輔冠列宿以騰輝南極老人為三台而作瑞凡慶門之燕喜備聖主之匪頒受祉既多永錫難老方愛日舒於化國而和氣轉於洪鈞播九功惟叙之歌為千載難逢之㑹雍容論道上承堯舜之君清淨延年何止喬松之壽某江湖賤質陶冶㣲生雖奔走難强於駑駘而贊賀每先於燕雀顧叨受業輒廢蓼莪之篇尚喜寓言能數大椿之歲以兹為獻亦足見誠賀轉運判官啟伏審渙號中宸擢使劇部訓詞甚寵輿議交孚伏惟歡慶恭以某官文采承家聰明絶俗分竹于此憩棠肅然庠序畢修蓋賢太守之事獄市不擾有古循吏之風報政甫及於三時總漕亟臨於一路錦囊彩筆謝春草之池塘霜節繡衣凜秋天之鵰鶚軺車即路故老塞塗攀轅彌切去思抗斧行復來止九重丹扆固已公知萬里青雲請從此始某天涯流落門下依歸方同五袴之民謡復幸二天之我有尚稽慶謁徒切瞻依清秋向闌霜風作冷願為廟社善保寢興賀轉運判官柯朝奉啟伏審光奉制書出使劇部漕事屬諸賢者輿論為之翕然某官天才高明人望烜赫他日獨立嘗聞過庭之趨三年一鳴遂奮沖天之翼果被出綸之命式昭衣錦之榮進劇要塗益攄逺業原本缺代賀强舍人淵明啟伏審拜恩中禁進職西垣伏惟歡慶恭以某官行高于人世濟其美庠序妙選文彩爛然兄弟並馳聲名籍甚比繇眷奬寖歴要塗擢寘師筵賢能興于三舍總臨袐府竹帛備于羣書俄被詔圅超升詞掖參預政本不獨判機務于五花紬繹王言蓋將追誥命于三代即膺大用以副具瞻顧在庸疎方依庇頼某屬留塞閫阻慶賓軒惟是欣愉未易敷寫賀劉舍人啟上下辭同前某官德厚天資經傳家學自昔羣居之日屢以文鳴擅名多士之間舉皆誠服聨榮伯仲被遇聖神蘭省校文已極俊髦之選螭坳執簡遂傳言動之司代賀葉起居舍人夢得啟伏審被命中宸進職左史伏惟歡慶恭以某官庠序名士東南偉材以文章决名科以儒雅被殊選刋書禮局崛居諸彦之先為郎文昌妙極一時之選俄膺鳳詔徑陟螭坳副仁聖之明揚宜言動之必記操筆伏簡暫煩對立于丹墀掌制代言佇慶峻遷于詞禁顧惟蕪陋之質漫叨氣類之同側聞新除增喜私臆屬帥垣之有守扣賓席以無階惟是瞻依未易展盡代賀起居霍舍人啟伏審被命中宸進職右史伏惟歡慶恭以某官東南之傑庠序所稱高論雄文嘗魁天下之士清名茂實率由主上之知召對燕閒超升撰著俄膺鳳詔入侍螭坳下辭同前賀廉訪舍人啟伏審選擢中宸按廉南國輝潤所及欣戴惟均恭惟某官天資高明學術淵粹廣庭摛藻已厠巍科上閤通班復聨邇職文武歸乎一揆忠孝于是兩全除目播騰輿言僉允日期及境庶獲望風苐恐使節之甫臨即有召環之踵至歘然高舉愚者何依春序已闌炎威漸熾願慎履涉以時寢興賀運使鄭學士啟伏審榮被詔圅寵持漕節儼然臨乎屬部允矣協于僉言某官天資高明風幹彊濟以才能而自奮為仁聖之所知贊六路之貢輸居多顯績職中袐之清切遂冠英游眷此南閩實為舊治登車攬轡皆已歴之山川持斧繡衣有歡迎之父老諒無淹乆即遂召還進陟要除益攄妙蘊代賀康運使啟伏審光被渙恩超升華序綸言優渥士論欣榮伏惟歡慶恭以某官聰明過人利澤在物分中宸之憂寄惟日奏功藹朔部之歡謡舉皆歸德惟肇新於泉府實總領於使臺利源既豐國用滋殖兵民兼足豈惟轉漕於關中郡國所儲行見流錢於地上故於經始之日特疏增秩之榮矧逺業之難量而亨衢之寖闢即期柄用以副民瞻顧以拙疎方依覆䕶屬帥垣之有守慶賓席以無階欣爽之私敷宣難盡代賀盧殿監啟伏審祗奉制書榮陞殿省欽哉帝舉協此師言伏惟歡慶恭以某官德蘊天資學深經術當元豐之敎養展也大成助大觀之緝熙豈曰小補時論推重天眷益隆爰從諫列之七人改臨御府之六尚英聲茂實方輝映於士林大册高文行發揮於詞禁屬帥垣之有守慶賓廡以無階惟是頌瞻實倍倫品代賀許殿監啟伏審祗奉制書榮陞殿省搢紳相慶中外一辭伏惟歡抃恭以某官早以過人之才允為成德之彦兄弟並立嘗半八龍霄漢雄飛獨先一鶚論議確乎其不茍聲稱於是而益隆載判五花當西垣機要之命改臨六尚直中朝供奉之班方日近於清光宜眷深於丹扆成命誕頒私心欣慰拘繫方爾慶謁邈然嚮往之勤敷陳罔既代賀陳殿監啟伏審光被制書擢臨殿省除音始布輿議交欣伏惟歡慶恭以某官名重妙齡仕當盛世受知仁聖歴位要華三衛建官嘗居中宸清切之地六尚率屬復冠内朝供奉之班矧逺業之難量宜要途之更踐益攄妙蘊增重治朝某假守逺藩恭聞新拜雖欣愉之彌切顧稱慶之無縁永言瞻依未易敷叙謝婁守薦舉啟備員下邑敢希聲氣之同剡奏中宸猥玷齒牙之論得非所望幸不勝言竊以報國莫如薦人惟善故能舉類方平居竊嘆惜沉英俊於下寮及得志有為或致不仁於高位由勢緩急因人重輕故垂頭䘮氣者未嘗過而問焉而炙手可熱者則亦失之鮮矣兹風一扇古道寖隳自非有大過人之資未免為姑徇俗之語豈期今日獲奉緒言以為激揚簡汰之間尤重邪正臧否之實惟才是與豈以貴賤而容心所舉不遺蓋為朝廷而行法茍或異此彼其謂何將為近世所未嘗且革一時之甚弊宜有瑰奇之士仰當遴選之公如某者賦才不敏明涉世多齟齬投身州縣從事簿書白雪陽春屢見嗤於俗聽夜光明月終不免於人疑既拙自謀又將誰咎當其驚風駭浪已分不容然而槁木死灰豈能無待夫何厚幸獲事大賢躬操千里之重權不忍一夫之失所周旋覆䕶終始保全収衆人已棄之餘為終身莫大之賜此蓋某官受天粹質為世寶臣曩游翰墨之場早冠英雄之彀奇文絶俗偉望在人桂籍書名著風流於三世芝庭挺秀盛文采於諸郎荐膺眷倚之隆出奉藩宣之寄風俗有諳知之舊敎條適寛猛之中陳義甚高樂善不倦故雖謭𤨏亦出薦揚某敢不灑濯其心激昂所守但𤓰期之已及懷棠蔭以難忘報德之龜雖鑄印而三顧被恩之駟猶戀軒而一嘶謝張帥啟慰薦溢言拜嘉甚寵漂零弱質撫已增慚伏念某稟生多艱涉世寡與垂髫挾册獨承敎於父兄徒步褁糧偶挂名於庠序既叨士類粗聞師言謂君子烏可以小知而古人務明其大體學自囘亡而蔑有好者道因軻死而遂無傳焉永惟盡性以知天率自正心而誠意有志于此倐已十年所趣茫然了無一得每安壠畝之賤而無田園之歸蓋抱關擊柝之為貧雖飯疏飲水而亦樂然而器非適用才不逮人日抱瘝官之憂常恐投劾而去䝉恩寛貸為幸已多剡奏薦論豈愚所覬兹蓋伏遇某官至仁成物大度包荒非求備於一夫務曲全於多士惟是孱薄猶未棄捐特枉片辭俾邀寸進某敢不勉尋舊學仰跂前修惟其擴而充之則或進於是矣何言報德庶不辱知過此以還未知所措代人謝賜及第啟籍名璧水浪綴諸生錫第天庭猥叨異等幸非意及榮與慚并永惟致治之原尤以取人為急聽其一日而自售則有倉猝見黜之嗟較其平生之所長又有請屬徇私之弊顧時事偏倚之若此則人材隆替為可知惟熙寧之永圖繼商周之絶業崇五經而造士使知道德之歸建三舍而育材申嚴庠序之敎待之以月書季考之持乆付之以糊名較藝之至公於昭盛時之作新一掃前世之通患多士之幸有年于兹迨上聖之纂承舉宏綱而潤色謂首善太學者固已畢舉而嘉惠四方者尚或未遑必欲納英俊于彀中莫若廣學校于天下厚錫廩食遴簡師儒焯然賢能之書㑹乎升貢之選西廱肄業日聞絃誦之洋洋南宫試言雲集布韋之濟濟及乎裁擇得者幾希而况鼎足之升科特出天心之籲俊宜得瑰偉異能之士助成緝熙先帝之功如某者白屋寒儒青衿小子九齡而書大字慚非脫頴之才三年而通一經粗知務本之意徒被父兄之誨誘重以師友之琢磨自顧鄙鈍之資亦叨教養之澤敢憚焚膏而繼晷自甘嗛腹而寒膚誦音琅琅固常燥吻筆端亹亹了不驚人弗圖鄉老之誤知旋被春官之甄録比趨帝所伏讀天題野鳥何知方駭咸池之奏河伯望嘆莫量北海之涯勉竭所聞以承清問仰凟蓋高之聽深虞不韙之誅豈意渙恩俾居前列勉學為已乃賤士之所知致禄及親在人子為可喜退循僥倖良有夤縁兹蓋伏遇某官有王佐之才任天下之重介圭入覲父老歡誦於道塗公衮言歸天子喜見於顔色方將圖任以副具瞻遂令孱𤨏之餘亦預陶鎔之末某敢不祗勤吏檢益勵身修忠孝兩全清白一節上報生成之造次酬奬㧞之私過此以還未知所措又法坐天臨儒冠雲集自慚駑下亦預臚傳曳服有初撫躬知懼洪惟元聖紹休裕陵作成人材仰跂熙豐之盛際緝熙治具無愧商周之哲王惟三舍之賓興偕萬方之計上紛然雜沓共須禹鑿之雷存者幾希如觀矍相之射雖曰下列豈容鄙人如某者三江賤生七閩舊族江湖流寓者再世詩禮相承者百年暨諸父之决科幸貧家之得禄方雲津之凌厲悵世路之艱難故雖賢傑之並游訖嘆功名之莫就惟時童稚實託緒餘猥聞善誘於庭闈浪綴上庠之弦誦中叨一鶚之荐何以堪之退從六鷁之飛乃其分也棲遲里閈荏苒歲時人皆笑其無奇已獨安於有待屬恢儒於廱泮紛入彀之英雄不量樗櫟之㣲妄意彈畫之用六藝六行敢當考察之科三沐三薫亦陶敎養之澤充貢不遺於鄉老奏名旋辱於春官顧末學之何知愧諸公之過聽作氣勇於再鼓驚人期於一鳴比趨嚴宸恭承清問苐以草茅之賤仰瞻天日之威雖勉力于見聞終自慚其鄙訥方虞退黜上辜奬借之私豈意甄収曲被生成之造蓋聖時寛大自無棄物故賤子夤縁叨繼後塵竊桂籍以承家顧蓽門之何幸兹蓋伏遇某官為仁由已以道事君永惟致治之原尤以育材為急兼収並畜曾無妍醜之或遺補短絶長故均尺寸而皆用致兹孱陋亦被品題某敢不上體寵嘉益勤問學貂續以狗徒自愧於斯時牛後於鷄或有成於異日庶幾埃露上報邱山代謝生日啟門弧之慶雖有志於四方庭闈之勞豈敢忘於斯日方伸燕喜以祐壽康猥荷眷存特紆榮問情文備至尚記熊羆之占感怍徒深略無瓊玖之報維兹叙懇莫究願言又撫遲暮之年苒苒固嗟於老至留劬勞之日遑遑自笑於何之重貽黄絹之辭滋動蓼莪之感贈之丸藥敢妄冀於長生報以英瑶實難忘於厚意謝轉官啟庇身大厦曾未淹時拜命明庭遽叨易秩雖品題之有自顧綿薄以何堪祗服寵靈俯增慚悚伏念某人流至下學術尤疎偶縁家世之緒餘竊慕搢紳之施設雖曰簿書之役敢忘早夜之思重念先人被遇神考更踐中外畢力事功帥路棄歸嗟壯猷之已矣官糧糶盡覺生事之蕭然藐爾諸孤仰兹薄禄矧惟不肖所向多艱縁木求魚豈萌心於妄作守株待兎徒自笑其顓愚蹉跎州縣者幾二十年奔走南北者餘一萬里惟粗知于持已庶不廢于承家不圖顛頓之餘獲在使令之末五技之鼠人憫其窮一割之刀自知可勉俾少逃于罪戾固已出于存全豈意挂名于薦書遂使脫身于銓筦永惟天幸夫豈人謀兹蓋伏遇原夲缺謝政府啟罪戾餘生自甘窮顇矜憐異數不忍棄捐俾貳逺藩即叨薄禄荷陶鎔之及此撫疵賤而惕然竊以毁瓦畫墁以其無功之可食抱關擊柝顧或有時而為貧蓋庇身不在於農商而游手莫供於伏臘恭惟有道之世豈容無職之民而某也猥沿餘訓於父兄濫綴諸生於庠序敢言干禄偶爾得官尋以迂疎誤䝉奬擢豫書局之選曾莫効於編摩備内府之員又不任於冗劇悵四壁之徒立無五技之可窮拙於自謀何者為得屬以死䘮之故藐然穉㓜之孤露懇有言䝉恩得請佐留都於朔部攝卿屬於大農不善救焚遽從報罷孽雖天作戚實自詒一麗刑書三移歲籥已分江湖之流落敢祈廊廟之矜憐萬物由儀方著大儒之效一夫不獲亦非君子之心仰荷洪鈞俯從私欲維兹閩越密邇鄉邦風俗在所諳知簿書可以奔走矧出周旋之賜稍紓饑凍之憂自惟何人而有斯幸兹蓋伏遇某官以伊周之業輔堯舜之仁儀刑四方品題多士缻大罌小各適其宜尺短寸長曾不偏廢致令疎賤亦被采収某敢不祗畏簡書服勤職業思無重於後悔唯篤信於所聞安鷦鷯之一枝䇿駑馬於十駕豈能報德庶不辱知答周之翰啟比縁漕檄備數𤨏闈方虞裁鑒之非才何幸英豪之在上先輩能彊為善非小有才自昔賢關已擅一時之譽迨兹鄉賦果偕羣俊之升方將脫迹塵埃振翼霄漢豈惟較藝英雄已入於彀中行見登名風采想聞於天下愧慶書之未上辱華翰以相先自惟公選之得人敢謂私恩之在已永言欣佩莫罄敷宣與李倅彦思啟猥以冗材獲𨽻使部職是賤役僻在外郊既失望塵以躬僕僕之拜又稽馳牘少伸欵欵之愚雖重干僣黷之誅而復得逋慢之咎夙夜内訟啟處靡遑屬冬序之云初颯霜飊而增凜伏惟關决之暇茂集神明之休恭以某官天資高明德度宏逺肆雄辯而不屈信所守而直前人之難能士皆稱服陜右總計深究平市之權衡關南貳藩固已折衝於尊俎既懋嘉績行陟要塗豈意孱㣲亦叨覆育斗升之禄幸粗免於饑寒門闌之恩終不忘於報稱未即祗趨軒所惟冀善保寢興與邵稽仲啟伏審肅驅大斾出按列城千里吏民望行塵而奔走孤生簿領限積潦之間關悵不拜於下風顧難逃於嚴譴尚倚寛大曲賜矜憐屬金序之向闌颯霜飊而增凜洪惟按拊之暇茂集神明之休恭以某官絶世聲名承家文采桂堂發册早從金馬之遊玉府授經逺繼銅龍之直俄膺天眷洊歴使華玉節再臨眷星霜之未易繡衣一出有父老之歡迎關河夙被於澄清士民益傾於風采諒無煖席之頃即聞召節之來進陟要塗發揮妙蘊某猥以譾薄槩於庇庥未即趨㕘彌深依戀伏乞上為廟社善保寢興囘福州王敎授啟䝉恩貳郡竊禄便私夫何流落之餘乃有親承之幸恭惟某官樂善不倦陳義甚高絳帳談經雖暫淹於泮水金閨引籍行進直於蓬山前據要塗益攄逺業顧惟草芥棄擲江湖葵藿傾陽方切慕君之意蒹葭倚玉更欣聨職之良瞻欵有期爽忺無盡
