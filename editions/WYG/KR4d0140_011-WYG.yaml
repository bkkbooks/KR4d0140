body:
  text: 横塘集巻十一宋許景衡撰劄子上修徳劄子臣聞堯以天下為憂不以位為樂也今中國勢弱二聖播遷而陛下纂臨大寳適當此時非止堯之所以為憂也思所以强本圖思所以禦外患其説雖多然其大要則在陛下修徳而已記曰為人君止於仁為人子止於孝書曰孝乎惟孝友于兄弟此皆修徳之要也而以至誠不息為本故在陛下一話一言念必在兹一號一令念必在兹一賞一罰念必在兹以至於出入起居雖斯須之念未嘗不在兹也孔子曰言忠信行篤敬雖蠻貊之邦行矣夫如是則中國之安强可冀而二聖之来歸有日矣不然則念不在兹而誠意怠矣是以位為樂也故在言動則未必慎在號令則未必信在賞罰則未必當盜賊未消而邊鄙未服如是則中國之安强未可冀而二聖之來歸未有期也天下之愚夫愚婦尚不忍聞此言而况于陛下乎然則今日中國之安危二聖歸期之淹速乃在陛下一念之間耳臣愚伏望陛下戒之慎之始終不倦則何為而不成何求而不獲耶自古帝王憂深責重未有甚於陛下者則為陛下計宜如何哉天下願望如此而臣愚不敢不盡言惟睿明采擇取進止乞令江寧府修城營繕劄子臣伏見諸路州軍各修城壁涉時未乆已有畢事奏功者獨江寧府最為要切守禦去處其修城役徒不多工程遲緩若不速行措置深恐後時猝難辦集又本府昨備巡幸創置宫室比雖詔罷而議者以為因陋就簡亦宜緝而成之况在祖宗盛時若河南大名修治宫室亦未嘗廢何獨於艱難之際而不為緩急之備哉其江寧府伏乞睿明詳酌精擇帥守或専委有風力漕臣悉心措置修築城壁掇移棟宇要在不擾而事辦朝廷仍加賜錢糧度牒以助其費量立近限以責其必成庶幾有備無患取進止乞罷汪叔詹知太平州事劄子臣伏聞徽州昨經方冦焚刼欲遷州城于近郊而其地褊淺且有版築之勞邦人大不便之今新知太平州事汪叔詹適有地介其間冒哀投牒必欲遷之以為已利後為臣僚論列遂罷太常博士既而除提舉官復為言者所擊尋亦報罷謹按叔詹人物凡下無他才能且多過失頃除太平守超躐資級公論弗與也前日議者以沿江諸州皆控扼之地請精擇守臣太平既罷沈思宜得有能捍禦者代之彼叔詹者豈其人哉誠恐他日有闕誤良由今日推擇之不早也其汪叔詹欲望聖慈特賜放罷别選能吏以補其闕取進止乞罷招降建州軍賊劄子臣聞建州兵變事昨日急於奏稟思慮未審其言有所未盡須至再具敷奏以備采擇臣乞更不招降只令捉殺所召募槍仗手預合犒賞其勇於入賊有功者亦合量借官資以俟奏功正授獲級者第賞仍令先次告報脅從之人喻以朝廷寛貸之意以上並乞令帥臣監司公共措置仍許便宜施行契勘閉城今已一月比及指揮到彼則又須一月不惟玩冦長姦而一城生齒日遭擄刼設或遲乆則盡為賊誘其勢益張未易制也伏望睿慈詳酌速降指揮令差来人星夜齎持前去以究仁聖軫恤逺民之意取進止乞置揚州城外巡檢劄子臣訪聞揚州城外累有盜賊剽刼殺傷人多憂患方車駕駐蹕天威所臨豈宜有此欲乞指揮相度城外權暫添置巡檢一二員使之部領兵級不住警察其巡檢或難得人只乞選差諸軍下隊將使臣之類取進止乞㳙日講讀劄子臣竊覩三代之王所以治天下國家者必本於正心誠意其次莫如多聞故𫝊說之告髙宗曰王人求多聞時惟建事事不師古以永世匪說攸聞然則學問稽古者實帝王之先務也恭惟陛下紹隆祖宗之業屬兹艱難所以施於天下國家者尤在聖學蓋至誠以格物據古以鑒今使盛徳日新聰明日廣則事至能應物來敢名以圖天下之治而成中興之業舉在於此矣祖宗舊制講筵多在便殿故官稱有崇政殿說書伏見已除講讀官欲望明詔涓日開筵俾之勸講取進止乞别定扈從臣僚劄子臣契勘本臺准東上閤門關車駕巡幸禮儀内一項依景徳元年故事隨駕臣僚逐日都一班起居伏縁景徳故事係是出陸以所至官府亭驛為行宫扈從臣僚一班起居於禮為宜今來東幸係乘御船而汴河堤岸最為狹小又有衛士甲馬擁集其間深恐臣僚逐日起居班列不肅若不預行申明則臣僚失禮枉被彈糾臣愚欲望特降睿㫖下東上閤門看詳參酌起居之儀務從簡易仰副仁聖御下以寛之意取進止乞放京西路夏稅劄子臣伏覩今年五月一日覃恩赦書節文應今來因金人所至州縣刼掠逃避人户與免今年夏稅本臺近據淮寧府宛邱縣人户蔣伯達等狀稱今年夏稅已係本縣引赦除放訖今來本縣承凖轉運司指揮却令送納竊謂曠蕩之恩矜憫下民為因刼掠有妨農業遂蠲租賦寛其財力而漕臣不能上體陛下愛民之意尚復追征雖有司窘於財用而窮民在於矜卹豈可使朝廷失信於天下哉欲望睿㫖下京西路轉運司應今年夏稅已引赦除放者不得輒有拘催以究仁聖及物之澤一方幸甚取進止乞令宰執入内殿侍藥劄子臣日來恭聞聖體㣲似不快臣為在外廷無由瞻望清光入問起居及未見得醫官所進是何藥餌若聖體今已全安只乞于内殿稍避風冷衛養和氣或尚須藥餌欲望聖慈詳酌許令宰臣執政官常留一員在内殿看視藥物及御膳所進飲食因得常侍左右奉承聖訓或有所咨訪亦可從容敷奏取進止乞展省試劄子臣竊見去冬赴省試舉人來自逺方值京城圍滯留道塗不敢前進乆旅狼狽實可憐憫昨准指揮許令明年正月鏁院就試今來車駕巡幸駐蹕之所貢院窄小什物不備竊慮引試或致闕事欲乞詳酌特降睿㫖喻以國家艱難乘輿東巡之意所有尚書禮部引試天下舉人並仰别聼指揮庶使四方多士知朝廷㫖意不致逺行勞費取進止再臣竊聞議者欲就行在先引試東南諸路進士如此則是遂棄西北多士矣天下一體豈容偏舉理實未安伏乞聖察乞罷後苑工匠劄子臣聞天下之事有緩急其治之也有先後聖人常先其所急而後其所緩故治得其序而治功成矣今敵勢縱横盜賊間作陛下宵衣旰食圖刷國耻節省浮費以應軍須可謂先其所急者矣至於工技之末作掖庭之所須此其事為至緩宜在所後而有司不知大體乃欲以承平靡麗之事而修復於艱難之時若賈翊所領後苑作准備造作生活工匠是也書曰不作無益害有益功乃成兹事雖小其於聖朝致治之功則為害甚大此臣所以昧死須至上浼天聽也伏况東南製作甲於四方或掖庭有須臨時置買應手可辦正不必専置吏卒徒為此紛紛也平日耕桑之民死傷流亡之餘尚能竭力以供租賦者彼誠知國家之艱難而上體陛下之憂勤欲足兵食以安中原也故雖極勞瘁而不敢辭今若聞置官司破禄食以營技巧彼必歎息憤懣有不平之氣矣臣愚伏望聖慈深念賦入之耗減軍須之糜費凡不急之務悉詔罷去掖庭所尚宜示敦朴以革近世豪侈之習以成中興節儉之化夫豈不美哉所有八月二十一日後苑作差人吏工匠二指揮伏乞特賜寢罷取進止乞根究法運司出榜劄子臣訪聞京師汴河北岸有榜文曉示係江淮荆浙制置法運司劄子申請為京城富豪之家并無差遣文武官散江淮荆浙乞差官下諸州縣抄劄到人户各令歸業其文武官取㫖逺竄仍籍没家資八月二日奉聖㫖依奏上件榜示流傳四出實駭觀聼臣以所聞未審昨日䝉恩賜對未敢論列只畧具奏知退而取㑹所屬官司及進奏官並不曽被受上件指揮今將傳到草本録白頭連在前伏望睿慈特賜檢㑹如委有法運申請則乞詳酌速賜改正以安士民之心如是偽冒亦乞指揮下開封府速收榜文仍賜究治施行取進止乞復轉對劄子臣伏覩建隆詔書臣僚轉對並須指陳時政得失朝廷急務或刑獄寃濫百姓疾苦近制每遇文徳殿視朝許侍從官二員轉對雖放朝亦許封進比縁朝廷多事輒廢不講方當國步艱難修舉政事之時而論思獻納裨益國家乃侍臣之職也欲乞詳酌遵祖宗故事每月朔前後殿起居並許侍從官轉對或放朝亦令封進以副陛下虛已求言復祖宗成憲之意如䝉開納即乞降睿㫖自十一月朔為始取進止乞備兩京糧草劄子臣訪聞東京近日所管糧草不多守禦之計所宜預備伏望睿㫖下宗澤契勘合用人馬之數毎月約支若干今來倉場見在可支㡬箇月其未足之數伏乞下户部速與那撥綱運應副其應天府人馬全然數少理合増置其糧草亦乞依此施行庶使向後不致闕事凡此皆今日之急務伏乞聖慈特賜留神臣不勝懇切之至取進止乞備兩京糧草第二劄子臣今月初五日曽具劄子為東京所管軍糧不多乞令宗澤契勘合用之數下户部疾速那撥綱運應副及應天府所管人馬數少若䝉分兵防守亦合措置約支芻糧二事最為急切至今多日未䝉指揮契勘去年東京和糴實助經費今來汴水向淺竊恐綱運漸艱欲乞詳酌令兩京措置和糴或只坐倉支錢則公私兩便及戸部那撥綱運應副並望睿㫖下所屬疾速施行或稍後時則不及事矣取進止乞催促修汴河劄子臣伏見汴河近日頓淺徃來舟楫悉皆阻滯竊聞魏樓等處決口已䝉朝廷差都水使者安自求前去閉塞至今多日未見工役次第若已就緒則河流自當通快今既淺澀如此當是所差官吏怠惰不力全不上體朝廷急難之意况隆祐太后朝夕東下而糧運綱船盡在下流未能前進顯屬闕事伏望聖慈詳酌特降指揮督責限在旦夕了當尚敢怠惰則乞嚴正典刑或恐兵夫不足則乞於鄰近有役兵去處就便那撥應夫或令和雇人夫多方措置要在速辦此事最為急切伏乞睿明留神取進止乞罷詹度赴行在劄子伏覩昨降指揮前資政殿學士詹度發來赴行在中外聞之莫不駭愕謹按度自為小官交結近侍夤縁僥倖馴致顯途假應奉享上之名為竊攘豐已之事違法種種士民類能言之一昨附㑹姦魁首開邊隙既帥定武尋易燕山當新邊草創之時殘虐燕人搜求寳玉織組縑帛以為苞苴車馳肩負絡繹道路既而新軍暴横糜費不貲蕃將驕矜已有異意而度恬然若不聞知帥閫乃朝廷之重寄而所任如此安得無禍哉未㡬金人大舉藥師叛命中原擾攘生靈塗炭皆度輩所致也言之可為流涕雖元惡已就刑誅而度輩祇從竄逐永禦魑魅已為寛恩今若入覲行在稍加任使則傳聞四方孰不憤嘆恭惟陛下性資清明賞罰升黜蓋欲上全國體下當民心以成中興之業今度何人獨䝉召還是開邪枉之門而植憸佞之路也伏望陛下正心誠意斥逺奸欺以示好惡於天下請自度始則海内莫不忻然稱頌聖徳矣所有詹度赴行在指揮伏乞特賜寢罷取進止乞差張瑱知和州劄子臣訪聞和州境上數為盜賊侵擾有本州通判張瑱者亷明有吏幹郡人愛戴之遂設方畧嚴守禦敵不敢犯比瑱罷去敵遂破城縱火官府民居一日而燼瑱雖以年格并知州資叙得請宫祠聞其精力未衰尚可為郡若朝廷以和州兵火之餘欲擇守臣宜莫如瑱夫用人在乎因任而已試得其成効斯可以無疑矣臣與瑱未嘗相識得諸士論如此故輒以聞願賜裁擇取進止乞應副兩浙漕司劄子臣訪聞杭州軍賊未殄所屯諸軍保甲計日已乆糜費不資而兩浙漕司盡所有以供億今已匱竭至于借貸民間以應軍須若更闕絶必致廢事本司曽奏朝廷乞那鹽鈔錢濟如此窘急雖䝉朝廷應副其數未多欲望詳酌更下發運及兩浙鹽事司那融應副庶免假貸民間之擾其錢仍令本司他日撥還于鹽鈔錢實無虧折取進止乞罷錢伯言知抗州劄子臣聞自吳越錢氏納國至今一百六十餘年其子孫顯貴甲於搢紳然未嘗有出守杭州者於此以見祖宗防㣲之意深矣杭州近闕守臣朝廷差吏部侍郎錢伯言伯言有風幹若守他路無不可者惟杭州則非所宜且違祖宗故事臣愚伏望聖慈特賜詳酌别選有才畧重臣以守杭州或須人馬亦乞就便差撥仍令星夜兼程前去以拯一方危急取進止疏論救李光程瑀疏臣竊見近年以來臣下阿比務為壅蔽凡政事之闕失生民之疾苦皆不得聞于朝廷所以養成前日之禍伏自陛下即位首開言路以通下情故侍從臺諫官獻忠請對者無日無之而陛下優容開納見于玉色此誠二帝三王之用心也天下幸甚近者李光言事上忤威顔已降指揮落職與小郡昨日又聞李光程瑀並送小處監當臣竊惟李光程瑀皆以忠鯁敢言陛下擢置在言路先後建白皆䝉施行識者方慶陛下得人以為宗社之福今日偶縁思慮不審所論未契聖心陛下憐其愚直諒其無他故李光與郡而程瑀為郎既正典刑斯亦足矣忽有後命竄之遐方聞者愕然莫不震駭以為陛下初政乃是求言納諫之時孜孜詢訪委曲涵容猶恐人不敢言若一旦震怒併逐言者則是杜絶忠義之口今後雖有見聞誰復敢言耶况今元元困悴未被膏澤敵勢縦横太原圍閉政事尚多闕失小人敢肆欺罔正頼臺諫敢言指其姦謀以杜禍亂之萌奈何偶因論議過差遽投諸荒裔耶記曰舜好問而好察邇言隠惡而揚善蓋言舜於聽納之際善則揚之惡則隠之不加罪也至於鯁亮有守見于已試者不獨不加罪深宜為朝廷惜之今李光程瑀一介小臣似不足惜而臣所惜者在於朝綱之不振忠義之難得言路之梗塞也伏望聖慈上念祖宗優容言者之意深鑒近年壅蔽之失三復帝舜隠惡揚善之言曲賜開宥二人者特免逺竄之罪李光乞只依近降與郡指揮而程瑀亦乞與郡於以養忠臣義士敢言之氣以為宗社無窮之計天下幸甚臣不勝惓惓祈天俟命激切屏營之至臣職在論思茍有所見不敢隠黙然僣瀆之罪臣當萬死惟陛下赦之取進止狀辭給事中狀准尚書省劄子奉聖㫖除臣給事中乘遞馬發來赴行在者聞命震惕無所容措伏念臣頃玷從班自取罪戾祗役祠館屏迹江湖方二聖北狩既不能竭節自効洎陛下中興又未嘗奔走稱慶愛君雖切抱病何為敢圖省録首賜召還而况論駁之職朝廷妙選若付畀得人則命令惟允豈臣迂陋所宜冒處伏望睿明洞照誠悃收還成命以協羣言臣無任祈天俟命激切屏營之至臣見已起發前去淮南沿路州軍聴候指揮謹録奏聞伏候勅㫖策問試士䇿問問昔者夫子以大聖人事業不克有為於當時乃以其緒餘傳諸學者其徹䝉解蔽成就其器業者多矣載諸方冊班班然可考也若言孝友則曽閔言政事則由求言文學則游夏以至子貢宰我公西赤原憲之徒皆卓然見稱於聖門者至於顔氏子其所以學於聖人與夫見於行事者蓋不可得而詳考也其平居黙然無異於衆人宜若愚無能為者而聖人獨稱其賢稱其學與其用舍行藏獨異於彼諸子者何也豈言行見于外者為可考而求諸内者為難言歟抑亦因其材而成就之者有異歟問昔吾夫子抱大聖人之事業不克有為於當時乃以其緒餘授諸學者其難疑答問具載方冊今考其言若不相似然蓋言孝者多矣豈孝之道大不可一端而言歟抑亦各有所當歟雖然此特因二三子之問故聖人答之云爾至於曽子則不待其問而語之夫疑而問焉學者之事也不請而教宜聖人有所不為然則孔子之於曽子其亦有意歟抑亦出於偶然者歟孟子曰事親若曽子可也又不知孟子之言與孔子遇曽子果有異乎否也試考諸子所以問與孔孟所以言詳著于篇問古者英雄之君當草昧之時其所以建功立業未嘗不本於得士然後可以有為於天下夫秦漢尚矣學者勿復道至後世亦間有人焉劉備得南陽一書生遂據巴蜀拒吳魏苻堅亦得嵩山一匹夫而遂都長安滅燕涼雖其施設措置未能盡合於先王之道然功髙一時名垂後世蓋亦有大過人者後之君子或鮮儷焉諸君子試考二子之所以告其君與當時之君所以任二子者其要安在其材略孰短孰長其行事孰得孰失優劣之辨必有一言以折之者願預聞焉問迺者朝廷罷科舉闢學校以養士迪之以經術而别之以三舍其月書嵗貢之法委曲詳盡繇秦漢以來未之聞也固足以繼志神考而比隆成周矣然嘗考諸周官凡士之欽敏任䘏孝悌睦婣與夫徳行道藝皆閭胥族黨之所書其科目備矣其所以書則後世未能盡曉也故將徇其名耶則有三日不食人皆以為亷士者將徇其實耶則又有出妻屏子人皆以為不孝者然則閭胥族黨果何從而書之乎今月書行藝行于學校得人之效固已著見而無疑矣必欲舉成周取士之法行於鄉閭之間則其所書名實之際能無惑乎二者諸君講之舊矣盍以見告
