body:
  text: 横塘集巻十宋許景衡撰劄子乞速遣李芘福建提刑劄子契勘昨奉指揮差李芘充福建提刑陳桷别與差遣今訪聞得李芘尚未到任陳桷歴任館職省郎不習捉殺欲契勘李芘差遣如别不曾改移即乞降指揮令疾速交割職事措置捕賊不得稽違措置捉殺如朝廷巳降指揮附遞深恐淹遲不救急切欲乞檢舉再降指揮付差來人庶幾不致稽緩誤事取進止乞速措置捉殺建州賊劄子臣訪聞建州及本路提刑司各為本州軍賊閉城擄劫殺人再有奏報當是閉門日乆事勢危急臣昨曽具事宜奏禀後即未聞朝廷措置施行伏望聖慈俯念逺方吏民危急早賜指揮只付本州及本路差來急脚子星夜齎去庶得速逹免致遞鋪濡滯取進止乞捉殺浙西軍賊劄子臣聞辛道宗部兵浙西軍前潰散初在秀州平江府之間未甚作過自離常州至鎮江方肆焚刧殺人浙西士民大叚驚擾奔迸四出即未聞朝廷措置指揮臣初料此軍既殺主將之子則已是負罪之人其勢必致猖獗今則張大已難制矣契勘知鎮江府趙子崧見帯安撫而郭仲荀見領招捉浙東盜賊事欲望特降睿㫖令其速領兵分頭捉殺或其徒多是脅從則止誅首惡倡謀之人其餘令便宜措置以聖恩寛貸不可一槩招降以長姦也取進止再乞捉殺鎮江軍賊劄子臣訪聞鎮江居民大為軍賊剽劫官私舍宇盡為煨燼臣昨乞令郭仲荀趙子崧捉殺蓋欲就便乗其未甚張大易為撲滅今子崧棄城而逃聞仲荀又欲招降是無意於殺賊也招降之弊臣累曽奏禀以為導民為冦莫此為甚且自今後官吏惟恐不得士卒之意而日虞見殺此豈治世所宜有耶今來羣賊聞車駕將至淮南必奔迸四出則旁近州縣又可憂也欲望睿㫖選差將卒便道疾馳前去捉殺其間或委是後來脅從之人則乞令随宜措置以聖恩貸罪惟乞速賜施行以救彼民塗炭則一方幸甚取進止論捉殺鎮江賊劄子臣訪聞鎮江府羣賊聞官軍且至頗有遁逃之計其一路係本府下熟驛前此巳曽抄掠今來官軍若繇真州渡江以徃則此路無虞矣其一路東走常州昨者巳曽厚以金帛犒設其無備為可知若更前進則不獨浙西諸州為可慮深恐與杭賊合謀如臣前日所䇿也契勘揚州管下柴墟鎮亦名口岸渡江後四十里可至常州最為㨗徑如䝉裁酌别遣人馬繇此路以徃遏其奔衝則賊勢亦窘矣如前日官軍方事奮擊則今所遣者亦可夾攻庶幾朝夕殄滅今車駕駐蹕于此而賊在毗境非所以振國威也伏乞速降指揮即行措置使兇徒就擒江渡通快誠今日之急務也取進止再乞捉殺杭州軍賊劄子臣契勘杭州軍賊初縁本路提刑髙士瞳建議招安仍申朝廷乞更不發兵捉殺臣平昔雖憤招降之弊然以朝廷巳降指揮不當失信更不敢奏乞捉殺詎賊既拜恩命却不解甲復閉城門既而掩擊官軍拘殺提刑周格秀州守臣趙叔近繼徃招安復被拘留今又二十餘日矣是用朝廷招安之恩為欵王師之計也兇徒變詐反覆一至於此可不痛治之哉竊聞髙士瞳脱身賊營及趙叔近為其廹脅皆有奏請欲乞招安放罪是又墮其姦計也尚可信哉又聞兩浙漕司財用已竭無以應軍前所須既决於捉殺則理當濟其窘急臣愚欲望睿斷特降指揮令前後所遣將兵疾速前去捉殺并乞依漕臣顧彦成所乞下發運司及兩浙東西鹽事司各以鹽錢逐急應副軍須却令向後用本司錢撥還所貴勦除兇㓂以伸國威他郡自爾不敢效尤取進止論捉殺杭州鎮江軍賊劄子臣昨論奏杭州鎮江府軍賊事乞朝廷措置施行臣曉夕思之若二賊止於閉城自守官軍疾速掩殺可無他虞蓋杭為二浙之腹心而鎮江為咽喉今二賊同惡皆據要地若不措置閲日滋久姦計愈多萬一交通消息一日合謀而起則浙西諸州皆為賊所據矣此在朝廷不可不深慮而早為之區䖏也兼訪聞辛道宗下軍賊自到平江府吳江即肆焚刧比至本府城下守臣初欲犒設既而徇郡人之請必欲撃賊初戰雖敗繼能乗城夫石交擊晝夜不息賊遂遁去使他郡皆如平江則無可慮者聞所過常秀州皆厚斂金帛以為犒設而已設有緩急果何頼哉今錢伯言巳除鎮江府守及遣將兵前去外惟杭州閉關八十日一城生齒若不從賊則皆垂死之命也而招降捉殺二説至今未决欲望朝廷擇其一而䖏之母使合謀而起為意外之變也其平江府官吏能堅壁拒賊伏乞聖慈行下核實褒賞不獨養其後来銳氣亦所以為列郡之勸也取進止乞寛恤東南劄子臣竊見三路及京東西州縣或為盜賊侵擾或為金人殘破戶口減耗賦入無幾今朝廷經費彌廣軍須亦復不貲當悉仰於東南但東南之民比縁府庫匱乏横斂頻煩官吏貪殘侵剥尤甚今来若非盡革舊弊復加存卹則必破産流亡或盜賊羣起意外驚擾則無復耕桑之民以應公上所須矣豈不誤朝廷之大計哉前日赦令徳音寛大而斯民未被惠澤選易守臣増置尚未就緒今来巳是秋深所宜早見辦集臣愚復望睿明深念國家計用之根本加惠東南之元元應赦書所罷後来上供採買及違法租賦之類並仰有司疾速報應結絶使實惠及民申戒監司郡守按劾姦贓寛其徭役使得安居盡力耕織以供常賦仍乞時降指揮督責守禦之備限在日近了當凡東南諸路監司郡守尚有闕員去䖏並乞精加選擇限日赴官其沿江近要害控扼䖏縣令巡檢縣尉見闕未曽注差去處並乞令監司守臣公共選擇差辟及見任人内有不可倚仗者亦乞令選擇逐急對移務在盡公不得偏徇其被移人仍不理為過犯庶使儲糧練卒各務防守如此則東南可以無虞而朝廷之財用可以無匱乏之憂矣取進止乞救援順安劄子臣伏覩順安軍為金人圍城危急奏乞差軍兵救援并乞糴買本錢未聞朝廷措置施行又二狀為久闕正官亦䝉批送部依條差注竊謂邊奏告急乞兵救援及乞糴買糧草正在朝廷疾速應副豈可頃刻濡滯極邊州郡方當軍興係是重難去處今闕正官亦須破格立賞然後人肯注擬若令吏部依條差注亦恐人不願就也竊聞河北並邊州軍若安肅廣信皆巳陷沒惟有順安尚能固守不屈此宜朝廷特加奬勵若有申請尤當疾速施行今来二事或如常程文字或只付之有司不䝉特與措置豈朝廷果欲棄河北耶又本軍所奏城中芻糧向盡只可支持一月度至今日恐已不能固守兼得諸道路之言順安近巳殘破若果如所聞則亦巳矣不然更望睿明詳覽本軍所奏下三省樞宻院疾速應副人馬糴買本錢及措置破格差官填闕免令一城官吏生靈盡為强敵殺戮驅逼也再若議和糴當以本錢為先契勘發運司舊有樁管糴本錢及出賣蔡京朱勔籍沒物産錢近併罷常平市舶二司在䖏各有見管錢除樁留免役雇錢外其餘及諸色並可撥充糴本取進止奏核劉喜張士英强勒人投軍劄子臣訪聞開封府祥符縣百姓朱謹被京西廵檢司兵士劉喜等四人擒拽强令投軍朱謹不從而四人雜毆之既而巡檢張士英仍令執縛拷掠至累百且誣以嘗買賊人衣物於是刺𨽻軍籍其母阿王訴其事而祥符縣推治證左甚明臣竊惟招軍著令一切取人情願昨者有司奉行失指市井騷然陛下嘗賜戒飭矣故近日不聞招刺之擾今阿王年六十九嵗朱謹無兼侍此正母子相為命者豈樂應募充軍哉而張士英乃敢違法箠掠而强刺之其困虐無告亦甚矣近在赤邑耳目所及若不懲誡則四方之逺慢令之吏可勝治耶臣愚伏望睿斷特賜施行取進止奏核令昷劄子右臣伏覩近降聖㫖下河北東路提刑司取勘通判永靜軍令昷受贓不法事本司檄徳州究治訪聞本州獄吏頗受請屬所鞫失實而追捕滋蔓擾及平民胥吏劉奕乃昷之肘腋用事者就逮信宿輒得罷遣而賣紗帛被科敷者凡二百餘人越境就獄踰月弗釋此等皆無罪㕘對得情半月可辦何至繫留如許久耶是永靜之民始則貪吏漁奪之繼則猾吏拘囚之其困於無告豈不甚哉縱釋有罪而虐無辜仁政所不容也臣愚伏望睿慈特賜申飭應勾到干繫照證無罪之人並仰取狀畫即時釋放仍令所屬督促疾速依公結絶毋致出入人罪及暑月淹延刑禁則一方幸甚謹録奏聞伏候勅㫖乞措置杭州軍賊劄子臣契勘杭州軍賊比巳招降今訪聞逐人雖巳拜命尚閉城門未曽解甲仍稱薛昻巳有申請須候朝廷回降指揮方肯開門即未知薛昻如何奏請朝廷曽未報應也竊原仁聖之意不欲進兵討賊正恐濫及無辜所以招降仍加爵命者蓋為一城生齒也而羣賊反側未安却以待報為名故作遷延今閉門已五十餘日一城生齒饑餓狼狽日俟朝廷之報若不速賜撫循不惟失招降之初指竊恐淹久别致生事杭為東南重地而土風輕脱易於從亂不可不慮也臣愚欲望睿明檢㑹薛昻所奏若只是乞放羣賊之罪招降之後有司不得殺戮則乞詳酌依其所請再降勅榜專差使臣星夜前去開諭羣賊速令開門以救一城垂死之命實天慈終始之賜也訪聞鎮江府兵士王貴兩曽入杭州城内下招安文字朝廷見議推賞若䝉速行賞典則所降勅榜或别有指揮只乞令貴再徃杭州所貴疾速更無濡滯乞招捉杭州軍賊劄子臣契勘杭州軍賊䝉詔書招降巳拜恩命而不解甲復閉城門間縁隂霧輒出城戰破官軍拘執提㸃刑獄官訪聞秀州守臣復入招降即未見得後来如何奏報逆黨反覆如此神人所不容今来若巳招安開城門在朝廷不欲失信當一切赦其罪惡不然所宜痛治以戒將来也提㸃刑獄官屯守城外乃為賊所刼則其才畧可知矣豈可復倚仗耶今杭州閉門已七十五日殺傷之外饑餓而死者已不勝其多生靈無辜誠可憐憫如秀州守臣不曽奏到招降次第伏望聖慈明詔三省樞宻院即行措置如合捉殺亦乞精選將卒疾速前去杭為東南都㑹其俗輕脱易於從亂今城門久閉援兵不至若被誘脅則皆從賊其勢益張為害大矣豈獨殺傷餓殍為可憐哉如拯溺救焚不可時刻濡滯也臣以言責既有所聞不免喋喋浼聖聽蓋事有不得已者伏乞裁擇速降指揮再契勘翟汝文昨曽提兵渡江意在滅賊後聞朝廷招安不敢進兵竊慮本官已還越州若尚在杭州城外乞降睿㫖依前降指揮審度捉殺或别遣將兵亦可令夾攻庶幾必於殄滅論杭州賊劄子臣今月初六日入對便朝嘗以杭州軍賊為言伏䝉宣諭已係趙叔近招安賊巳開門出城訖臣遂不敢更有奏禀今訪聞軍賊十月二十日間每日開城門一兩時辰容人出入買賣自叔近入城髙士瞳脱身出後賊遂閉門不復容人出入城中日為守禦之備至二十八日猶未開門如是則未從招降審矣苐未知前日聖訓果得諸何人奏報係是何月日申發耶若係二十八日以後申發則降否猶未可知也契勘軍賊初變係高士瞳建議招安仍申朝廷不須遣兵深恐士瞳被刼入城今得出来尚復遂非只以招安了當奏聞不然亦恐叔近在賊營中為其迫脅有此奏報其實未嘗招安徒以此欺罔朝廷耳杭州閉城今將百日招討二説朝廷未能自决是使賊徒用招安之恩為欵王師之計也杭州去行在四五百里其奏報虚實皆不可考而羣兇猖獗一至於此中外孰不憤然今朝廷重於失信則乞速降指揮限日招安解甲開門不然則速遣將兵前去捉殺彼前者已拜恩命却敢掩擊王師仍殺提刑周格是師出為有名也伏乞睿明深念東南為朝廷之根本而杭州為兩浙之腹心若復淹遲不即措置則鄰郡視傚乗釁而起未易制也伏乞速賜施行取進止臣昨曽具奏兩浙轉運司財用匱乏無以應軍須雖䝉朝廷應副其數未多欲乞速降指揮下發運及兩浙監事司更賜支借應副窘急免致闕事及有借貸民間之擾臣契勘鮑貽遜領鎗仗手二千人在杭州城外雖未能捉殺而賊徒頗畏之不敢出城作過近聞江南東西路制置司却欲拘收貽遜所部鎗仗手還司深恐賊遂跳梁難制欲乞朝廷速降指揮令鮑貽遜之兵且在城外劄寨聽候指揮乞不招安建州軍賊劄子訪聞建州兵變殺傷漕臣及二三命官見閉城門抄勍居民本州奏請招降自非出於迫脅當是循襲近例蓋招降之説乃一時之便宜非止冦之良䇿也前日杭州之事勢非獲巳今若踵而行之則是搢紳横被殺傷而逆賊反受爵命賞罰顛倒莫甚於此蓋自去秋福州兵變朝廷不曽窮治遂致江寧杭州相繼而作今日建州設更招安則習以成俗此禍未易息也况福建鎗仗手自是勁兵可以殄滅顧朝廷用之如何耳臣愚欲乞聖慈詳酌不須别遣兵將只乞指揮本路鈐轄提刑司令糾集將兵及鄰州鎗仗手許以厚賞疾速措置捉殺除首惡同謀之外其餘脅從更不究治庶幾革招降之弊他州不敢視傚取進止勘福建路見今全闕漕臣既當軍需便合應副錢糧有本路提舉常平林遹最有風幹近方減罷欲乞就便差本官權領漕事以俟朝廷選差正官前去仍乞速降指揮付差来人庶幾不致闕事契勘新差建州通判梁澤民向曽從軍頗有謀畧或未到任欲乞指揮催促赴任共同措置捉殺論罷李景雲等除寺監丞簿劄子臣仰惟神考肇新官制凡省臺寺監之官無有大小閒劇皆極一時之選比年以来其選寖輕間有躐等濫進未足以副仁聖繼述之意者此不可不論也伏覩近降指揮廸功郎李景雲孫恕江大一或以應奉有勞或以擬進御題試䇿各與改合入官特除監丞主簿驟從初等選人入為寺監之屬命下之日聞者惑焉今士大夫服勤州縣積累考任無慮二三十年僅得為郡守貳而睥睨寺監丞佐有終身不可得者孰謂初等選人姓名藝能素未有聞考第薦舉猶未應格而遽得為之哉且應奉有勞近例止于改秩未嘗有為職事官者而擬試御題乃是在外著撰就使文字稍工亦非多士造廷親奉清問之比也而改官除職度越累朝恩例其夤縁僥倖遷進之速皆前此所未有也乃者卿監尚書郎或出于戚里勢家或係監當資序皆自宸筆簡汰冗濫且詔繼自今非歴寺監丞以上不除郎官少監名器増重士論悦服夫省曹監貳選格之嚴如彼而寺監丞簿冒進之易如此則是今日之冒進又將為他日之當得者矣澄源正本實在今日其李景雲孫恕江大一與寺監丞簿指揮伏望聖明詳酌特賜詔罷改用真才以待卿監省郎之選且契前日手詔丁寧之意取進止論常朝官不到劄子臣伏見今月初七日行在常朝官起居班内有刑部尚書郭三益吏部侍郎周武仲錢伯言禮部侍郎朱勝非給事中王陶中書舍人劉觀劉珏諫議大夫王賔俱不曽到雖汴流多風舟楫進却參差不齊然奉朝謁不可不謹也況今艱難之時禮儀初創侍從之臣與國同體尤宜守禮以示四方脱或不然是不可以無罰也伏望睿斷明正典憲以為在服者之戒取進止乞選差鄧州守臣劄子臣竊見鄧州守臣兼帥京西南路自罷范致虚後未聞除人兼訪聞京西州縣累經殘破所在多闕正官並是權攝類非其人瘡痍之民寃抑無所訴且日虞抄奪誠可憐憫今若謀帥得人則可以經理一路選辟官吏撫循兵民屏除盜賊且遏敵騎况巳是防秋之時豈可復爾稽緩不為一路生靈計哉其鄧州守臣伏望睿㫖下三省速行選除限日之官取進止
