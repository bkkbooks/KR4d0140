body:
  text: 横塘集巻二宋許景衡撰五言古詩贈人山陽隠君子少有髙世名終身慕父母事之如平生青衫老一命儒宫談六經經行必造門懷如遇公卿虚往而實返授業多豪英衣冠塵土闇辯論江河傾吟哦千萬篇迥與六藝并鮑謝寒蟬噪郊島蒼蠅聲先生兼衆體渾然獨天成贈朱深明十年走南北委跡甘蠢蠢舊學已茫然䟱慵長自哂豈知江漢旁名士有標準髙名久傾屬王事得親近可是臭味同一笑脱畦畛華堂照犀玉覺我蝸舍窘風流跂前輩要當攄妙藴胡為飯藜藿黙坐師粲忍微生縻簿領與俗益矛盾蹉跎谷口志慚愧鹿門隠百念已灰冷積習掃未盡緒餘君勿靳迷途須汲引次韻江民表寄王聖時六首先生脱塵屣酉室八十年物態日紛紜此境長湛然問道滿函丈孰云無世縁茫茫天地間所樂乃一㕓燕坐亦何為柏子炷爐煙前輩不可見吾猶及此老洒然忘鄙吝豈復嘆枯槁微言破聾瞽從之恨不早况有樗櫟年庶㡬松栢操先生為首肯人人有吾道我亦斯人徒鳥獸可同羣隠居豈我意裋褐老海門物理有悟㑹明鏡無塵痕似聞釣臺老勸飽千里蓴豈為飲啜興端念父子親諫省坐何事南遷臨嶺嶠天命已在我誰能賦鵩鳥苐懷平生友坐隔湖海杳生還桐水上尺素寓襟抱鷄黍儻可期千載有同調居士不溷俗已判此生間釣臺經世志諤諤在朝端出處固不同相對即歡顔乖違限南北奮迅無羽翰此心日相見未應勞永嘆天地吾一氣萬物吾一身紛紛梏形體末學蔽多聞二老獨超然早以德為鄰昭昭此心理千古無故新寄聲發妙蘊一視世間人次韻王經國人生皆有役我亦事川塗﨑嶇蕩兀中此境常晏如永懷賢令尹出處與道俱起予亦多矣詩句乃其餘次韻鄭希仲周詩三百篇强半出憤激少陵嗣真作千載無匹敵嗟我亦何為苦心等蓮菂平時一千首棄擲隨瓦礫朝隮不成雨安用横天霓吾僚一何妙筆下飛霹靂青天與白日奴𨽻皆知覿况是箇中人固應厭飢惄入幕盛紅蓮不才慚散櫟勉哉攄婉畫稚弱安紡績次韻姚伯遇從事慚非才日覺有不如丐閒得祠館囘首謝榮途古來陋巷人飲水樂有餘利勢與名節二者常難俱無題功名等戯劇俗眼自驚詫詩酒有真味多應知者寡甞聞歐陽子風月本無價今我貧到骨懸磬比居舎就使一錢直在我已不暇故知造化意特用相慰藉李伯時畵陶淵明其猶子遺余作此謝之斯人今何在古冢號寒木簡編漫遺言風采不可復龍眠真偉人千載識髙躅神交入心匠醉墨爛盈幅蕭然出塵意豈獨舊眉目仲容還好事收拾珍笥櫝世人渾未見惠然投我欲乘田元不恥折腰亦何辱行藏固有在今昔豈余獨新詩第甲乙三徑森松菊少陵曽未知浪疑公避俗我生癡鈍殺野性等麋鹿長恐探道淺輕比抵鵲玉人生適意耳何苦自羈束低頭拜公像塵土方碌碌過新息新息臨通衢赤白紛棟宇古息渺村墟相望十里許我行屬馳驛枉道不可去弔古獨踟躇指以示田父傷哉彼美人國破為𨽻圉驚魂懔風葉暗泣泫花露一死重太山亦或輕一羽猶能子元辯獨爾悄無語舊物空頽垣草木日繁蕪悠悠清淮水千古亦東注東郊東郊過新雨野色何氛氲嘉苖起萎病萬頃堆寒雲田父揖行客苦訴村墟貧年年夏旱時赤地流黄塵小兒困鋤耘烈日背欲皴大兒斡水車手足無完筋官租且不供矧欲養吾身東隣乆無煙㡬口能生存西隣逐熟去今作何鄉人行客謝老農艱難困勞塵而今新官家寛大布深仁大臣亦端良乗時轉鴻鈞汝豈不自覺新歳雨澤勻寰區日寜靖百物方訢訢爾曹死亦足及為太平民次韻酬胡元賓天地一逆旅此行適同塗等是驅馳人何者為不如一念有忻厭慊然顧贏餘安得如吾子不與世俗俱和楊時可贈呉子厚呉子守西河彊敵能逺遁功名豈不偉事親有遺恨雲孫亦何為總髪能自奮論兵得家法絶域屢得雋三釡乃吾志九遷何足論一朝棄官去悍卒亦驚歎官長欲挽留歸塗已强半皇天照忠孝爵䘵亦如願彼師乃曽子棄絶等仇怨子從何人逰卓爾有獨見父子今一處甘㫖應手辦垂垂對黄髮衎衎日歡宴客來為從容觴豆無早晏古今入商畧亦有一笑粲人皆贈渠詩素壁供揮翰吾丞豈真聾尚缺此一叚君親恩彌重報効不可緩始終能自勉髙義薄雲漢冬至日雪烈風鼓青㝠隂雲布崢嶸不待珠霰集忽驚玉花傾一陽動黄宫萬物如有萌豐年頒上瑞我獨欣發生永夜不能寐耿耿書窻明仲煥雪中見過因留小酌陽復日雖長歳暮氣猶慘馬曹縻管庫兀坐長戰頷豈無紅罏炭欲取終不敢亦有兵厨酒隻指弗容染蹉跎為禄仕黽勉從吏檢晨趨析毫分暮色俄黯黮天公復衒巧六出紛如糝自慚非安道誰肯泛清剡慇懃絳帳客竹輿甘頓撼可是乗興來正坐憐壈坎駝褐㸃白玉烏帽從風颭長衢得廻駕寒光照肝膽濕薪嘘白煙孤燈裊紅燄荒齋聊一笑俗境洗瑕黶江梅寫春意粉面誰粧㸃疎影落清尊勸人傾㶑灔念君齊魯秀文字垂琬琰俛首江漢間為人作模範府中多豪雋渌水浮菡萏珍烹窮水陸何獨嗜昌歜仁聖今在御威柄方親攬君㸔盈尺瑞端自天心感太平容冗㪚萬一逃汰貶追隨有餘日相與樂閑淡人生隨所遇何者為夷險要當反自味豈特甞橄欖去年冬至過閩清再至有感憶昨初寓宿黄宫萌一陽今我復來思節物老春光濃隂付梅杏青實乆已甞翳翳軒窻日幾線如許長蜂兒飽儲蜜燕子已巢梁吏役秖擾擾何術補民瘡學古要施設及時當自强光隂俯仰過老矣徒慨慷挺挺彼蒼官生來傲氷霜端然閲榮謝未覺歳月忙七言古詩和王魯公掌中太華五嶽獨説太華雄屹嶫千仭撐青穹何人收巻入掌握要使肉眼驚神通懸巖絶壑濺飛瀑玉牕翠壁開深宫先生捧玩豈徒爾崇卑真妄歸圓融我生江海曽未識幽邃﨑嶔煩指蹤堪笑騎驢老潘閬却要三峯在眼中次韻楊時可戯髙潛翁青衫白馬佳公子山東豪俊知名氏平生青雲期自至倉庾一官聊復爾丞公家風繼伯起笑渠颺糠兩眼眯乘田委吏古不恥端恐前言戱之耳送僧之石梁萬卉流芳不知春力巖畔澗下蹙紅皺碧乗興復誰同孤蹤逺讎敵君不見五百聖者道雄機靈峰晦盲深無極寒山老寒山老隨沉迹迢迢此去須㝷覓花落花開獨望時記取白雲抱幽石江邊行江邊煑鹽女日墾沙中土聞道潮乾土有花肩負争先汗如雨經年鬻鹽赴官市屋裏藜羮淡如水誰家滋味盡八珍猫狗食餘隨帚塵和長門怨長門沉沉人悄悄滿庭紅葉驚秋早窻底銀釭祗自明却聞别院按歌聲飛花滿地君恩去覆水返瓶君或悟人生離合自有時多應不在相如賦調同舎播榖子播榖子爾休苦苦催春耕勸農使者無一語嗟爾聒聒知誰聽提葫蘆提葫蘆荒年有酒無人酤先生年來亦不飲花前愧爾情渠渠杜鵑流血思歸去百舌從來巧言語紛紛隨意作春聲夢入鈞天聽韶濩先生避俗厭煩喧竹底誅茆甞閉户蒼苔滿徑人迹稀嗟子胡為肯同住聲名盡道男子事窻下誰知讀書苦燈花落也作罷休早取商量君聽取故人惠馬生筆聞説江南多筆工馬生所作尤瓌異十年江海得妙㫖一日聲名傾衆技故人憐我有書癖數管不辭千里寄齊鋒出頴雖不殊灑墨虚心皆已智當年退之傳毛頴假辭託説終傷偽我今草草又百載矯首相望空兩地文房四子迭有無商没參横似相避鼠須栗尾乃見嫌强欲用之隨棄置馬筆端如故人面眼瞥見時心已記跳龍卧虎非世習綰虵縈蚓皆兒戯豈知逺適在加鞭却傚良工先利器何當拂衣隠林麓約史著書從素志敢言名姓垂竹帛自甘生死惟文字敬謝故人因及馬梳毫截管惟精緻而今勁健已不售要須軟熟隨人意靜堂為弼上人題浮屠西來如轉郵方袍紛紛劇東甌上人維弼志獨優翛然髙舉異凡儔從師度淮泝隋溝神都歳月俄十周燕坐縹緲雲中樓明窻翰墨氷繭柔貴人旁午擁軒騶問汝亦有所欲不此身南北真浮浮黄金白璧誰能收乃獨汲汲從英逰乞書覽字無時休千年金石窮雕鎪上劇鍾王下虞歐糢糊墨本如山邱精神散漫不可求俗人貴耳賤兩眸今人古意豈不侔森然玉筯垂銀鈎怒猊渇驥蟠靈湫錦嚢象軸光油油自笑長物猶見留幡然忽憶江湖秋瓶錫東下如輕鷗誅茆伐木寒巖陬名堂以靜葢有由坐觀蠢蠢遍九州長空浮雲水中漚眼前何曽無應酬嵐光波影相夷猶别來書札屢相投問我何時泛扁舟西峯玊泉深且幽杖藜來往亦風流紅塵道路方悠悠囘首東南天盡頭渡淮我觀淮之源東行已千里扁舟一日下長淮似與故人相見喜不知渡越㡬澗谷清澈尚爾無泥滓澹然端肯與我俱試問故人能有幾蕩雲沃日窮眼界茫茫直與天相似萬艘絡繹鼓風蒲翳翳塵飛明鏡裏况聞水伯時惡劇雷擊風掀浪山起豈知生處極幽深清淺溳溳一泓爾吾聞古來養心者擴而充之亦如此自慚學問太迂踈十載不離蛙井底潢汙斷港何足道所得未能充口耳忽驚浩浩東傾海㑹令百川皆遶指君㸔厚地一撮土本來也是無多子人間萬事須自强嗟我蹉跎今老矣和左與言謝寄酒君不見梅子真當年狂歌呉市門神仙隠逸兩何有耿介感激空千言我今幸生太平日千載相望同禄秩閒㸔世事渾不知一心祇願饑腸實有誰解與魯公米無田也釀淵明秫甕間細酌新潑醅既醉歡娯亦蕭瑟江湖誰肯便相望一尊猶及詩人甞榴花竹葉應撥去落琖且看鵝兒黄髙齋肆筵盡嘉客長鯨一吸無餘瀝座上杯盤未狼藉愁見長瓶卧東壁新詩飄飄寫胷臆青天白日飛霹靂休言李杜門限牢到底輸我巧鑽刺我詩杉鷄竹兎耳未見虎狼先辟易異時更敢説較量縮手從今作降敵謝韓用可和記夢詩嘗聞歐陽子自許一世豪及得梅老蟠桃詩畏彼松栢臨蓬蒿歘然欲以怪自戯新句逺繼愈與郊嗟我後來亦何為敬誦遺墨徒嘈嘈有時援筆學模寫矯首但覺嵩衡髙宣城無人頴尾空百年風月何寥寥那知吏部有孫子年少力學精風騷前日記夢屬我韻筆墨奔放欲與二子爭秋毫秦盆楚筑未覺陋鏘然入耳驚咸韶昔我一官向天台春風洞府生碧桃簡書坐束寸歩不能到落花流水空迢迢羡君幽夢得所適一飽便覺忘葷臊要㝷蘇后評濟漯豈學劉阮迷妖嬈百年擾擾亦夢耳更較長短論昏朝不如吟詩飲美酒從他世事如牛毛按田南鄉夜過翁嶺斗禄折腰方自勉敢嘆塵沙長滿眼平田細路苦縈紆盡日肩輿在香篆簿書告辦裁知返落日在山山路逺荆榛蔽塞虎縱横僮僕相呼無處遯山下人家早閉門踈籬燈火自黄昏杯盤四座還相語猶有行人過别村贈五台妙空師山僧棲在山之巔胡為振錫來市㕓且言自得相形術願與多士談媸妍津塗窮通可逆數名分巨細潛開先龎眉合享壽考福鼎角堪持丞弼權人生肖貌雖若爾天理應效非皆然條侯餓死始難必裴度果相終何縁亨衢苐以直道致吉祉多為隂功延操脩向善或向惡感召凶吉如蹄筌予觀傳記考物理謂師語議非無傳出言少偷信不免受玊茍堕知難全况乎素行未中積敢以虚表要諸天富哉荀卿騁雄辯推本心術深磨研九州功崇夏禹跳三面德至成湯偏仲尼何長子弓短古今無害為聖賢林宗知人出明性清澈鑒裁猶澄淵大端亦貴器與識規矩安可私方圓君平卜筮逹至理探索造化窮推遷與臣言忠子言孝利害之際尤拳拳古人術學務原本寜將浮説相拘攣羡師通論近名教為師條列終吾篇康師贈臣闍黎次韻樂天西湖誇竹閣寂寞百年風隕籜師今燕坐最勝處翛然日誦山中樂富貴易致閒難得造物畀渠良不薄老康㳺戱作偈言使我怊悵心茫然趙持志出先公文炳所藏蘆鴈當年公子身通侯錦衣玊食天上游騎龍日日朝北斗豈識萬里江湖秋但聞人説蘆葦傍枯荷翻倒風颼颼四天墨黒雪欲落羣鴈上下聲咿呦坐嗟上界足官府十年髙閣空雙眸豈無詩句强模寫曉夢不到寒江頭何人筆墨得能巧活脱所見來神州髙堂素壁試披拂已覺身在蘆花洲嗟嗟江海人兀兀一葉舟煙蓑雨笠不自好風雪横來翻百憂豈知公子曽未見縑素髣髴千金酬人生萬事適意耳過眼起滅皆浮漚玉函置璧誇謹宻流落道路知誰收公子好畫豈云爾要使萬物供㝠搜至今好句在人口㤗華突兀黄河流嗟我後來亦作詩辭慳意鄙勞雕鎪願起公子已死中論詩觀畫一洗千古愁
