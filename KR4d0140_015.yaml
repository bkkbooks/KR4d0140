body:
  text: 橫塘集卷十五宋許景衡撰書上戶部邵大受侍郎書某近準省符令將本州諸色錢並行裝發見錢不得買銀已具因依申稟竊念本州在崇山峻嶺之間婺源到州二百餘里有五嶺之限難於登天黟縣績溪皆是陸路祁門水路乃通饒州自有郡以來不可漕運所以秋苗却折納絹帛發往諸處逐縣苗米各行據數催科雖本州有小溪遇春夏水漲始可通行客人作排筏隔年伺候梅雨方趂勢發下才晴便阻又灘勢險惡載物舟船所不敢行竊念本州買銀係依省則即不虧損省部用度每貫却又有回收頭子錢今若必欲令本州發錢則諸縣錢物無水可以行舟及雨退水落城下小溪亦通舟不得必致稽留省限又有灘險不測之患雖使官吏坐罪何益於事欲望矜察特賜憐免代人上邑宰書某嘗泛觀百家而得醫者之説蓋盧扁之術非治人之疾為難也能致其治疾之具者難也夫視形而察色切脈而得證曰是為寒是為熱是為虛是為實此盧扁所能也至於寒者有以烜之熱者有以平之虛者補之實者下之此盧扁所不能也是故盧扁不難於治人之疾而特難於所以治疾之具是以黃金丹砂明珠空青珊瑚琅玕鍾乳石英與夫江南之术江北之枳商山之芝南海之薏苡下至於貍骨虎顱馬乳熊脂枯蜂之房敗鼓之皮莫不畢在其灼爍如星日其崷萃如山嶽其瓌麗如人物其積如囷廩其散如雲煙蓋其力致厚富也如此而庸醫誚之曰有是病則須是藥耳烏用是多為哉嗟夫彼庸醫者知有是病則須是藥而不知盧扁蓄是藥所以待是病也嗚呼豈獨醫者之説如此哉天下之人抱不病之病吁嗟其勤瘁而呻吟其愁苦者宜亦多矣為之長者安坐其旁而不知所以治之非不治也無其具也間有其具則積之不多用之無序亦猶醫者之攻疾實者補之虛者下之縱橫顛倒失其所宜名曰治之其實禍之也以故承平百年之間而致治之實猶有愧於三代將毋由是也夫某自少講學四方與士大夫遊聞閣下之盛名皆曰閣下之治民猶盧扁之治人不惟得其術而已而又得其所以治之之具其積彌多其用才一二也伏自下車以來所以設施措置之方蓋嘗竊窺之矣砭石炷艾所以破其毒也酒醴粱肉所以養其氣也薑桂之辛秋荼之苦所以宣其鬱滯也擷其溫涼之品而等以多寡之數朝夕飼之所以致其和平也故能振僵仆疲憊之餘而置之康強安樂之地易其辛苦愁嘆之聲而為鼓舞歌頌之音蓋數月于此矣或者常疑閣下何施而至此殊不知閣下所以為治之具蓋有以異乎人也夫致之也力故其積之也厚其積之也厚故其用之也常從容而有餘此天下之至理也而昧者忽之嗚呼是庸醫之所以誚盧扁也又安得閣下所以為治者告之哉某得於此時列編氓之末以邀閣下黃金良藥之賜固已甚幸而又不幸得罪天地先子死焉孤露之指凡二百餘而待盡餘生所以吁嘆呻吟之聲蓋非徒如衆人之病而已也然人之有病盧扁所能療也不病之病閣下所能療也若某所以病非凡人之病也是不病之病也故今日之來也豈有望於盧扁哉誠有望於閣下也上韋明州書昔者侍座而先生孜孜焉常以人物為意其後先生被命使蜀京師士大夫語藉藉咸曰韋侯行哉在朝廷為可惜在蜀人為可慶何者韋侯樂善喜士不媚上不傲下今使於蜀也吾將見蜀之士大夫賢者進不肖者退善者安不善者亦相師而為善夫使賢不肖善惡各得其所則為蜀人慶也亦宜哉雖然韋侯賢而有文章立朝有風節其在朝廷則天下望其賜其使一路則所施者狹此又可為朝廷惜也後二年某再至京師問蜀人以先生安否而蜀人道盛德不容口大略與向之士大夫所料不異某竊嘆曰惟賢者無施不可輕重大小惟所遇耳今先生使一路其績效章章如是然天下任有大於一路者舍先生其誰哉今既力請為一州守則其所施者愈狹矣其所施者愈狹則激揚簡汰者愈詳此又可為鄞人慶也然鄞為東南善地朝廷慎所付與雖錢穀小吏調於吏部者非有優最不預也彼其雄豪賢俊之士豈少哉雖然某所未知也今特舉其所知者蓋有二人焉鄞縣主簿林覃定海尉駱閎覃遊太學與某同舍其後同出門下其為人清慎有守而敏於從事其聚食二十口皆孤遺覃善撫養無一間言者其未葬者七喪而家貧不能舉故覃於祿仕猶不敢不勉閎遊太學士交稱之其風度磊落疏財好義有可嘉者其尉定海邑民安樂之此二人者皆麾下之佳士也凡人之情莫易於自知菒難於自薦竊計二人者其見察於下執事固有日矣而某猶區區一言者誠恐其重於自薦而表暴或不得盡白於左右也然先生昔使蜀而蜀之士大夫皆德其賜今儻以其使蜀者治鄞則二人者宜有以處之矣昔韓愈李翺窮而在下道不行於時至於薦所知於王公大人則不敢自默何者義有不得默焉故也今某愚不肖何敢比數韓李間特以先生常以人物為意而鄙劣之迹辱愛最深又與二人者相知之深故敢不避僣越之罪伏惟幸察代趙征上太守書某嘗聞南人之歌南人聞之則喜北人聞之則悲北人之嘻嘆北人聞之則悲南人聞之則漠然而已矣夫歌者所以發其歡欣而嘻嘆者所以泄其憂憤也然或聞之而喜或聞之而悲或聞之而莫之悲喜非人情固不同也其所居者然也今閣下以高才重德出鎮此方此方之人無逺近無小大莫不歡呼鼓舞以為已歸則是南人之歌固已飫聞之矣獨未知閣下亦嘗聞北人之嘻嘆者乎伏念某家世雖宗籍而先人獨喜儒術樂教子弟其所與遊皆一時賢士大夫故若某輩皆得講學其間然賦豫不競年加長而道不加進雖鞭蹇䇿駑訖未有所進猥從下吏叨斗粟以自活焉然備員于此踰二年矣食貧指衆蓋亦未嘗飽也俄罪逆不天先子早世破暑星奔往還萬里盡室南來孤露皆稚幼所以衣食之奉畢仰此身而抱釁餘息竊恐忽先朝露則闔户溝壑是以哀號夙夜不知所為嗚呼此豈特百倍於北人嘻嘆者哉不識閣下將為南人之漠然耶將為北人之惻然耶然閣下君子人也君子以仁存心以義存心仁則有所不忍義則有所不茍意其所聞可喜則喜可悲則悲夫豈限其南北哉某之困躓至是亦極矣閣下將聞之而已乎代人上知縣書某聞易於安土而難於去國者人之至情也蓋去國之樂十未足為安土之樂一也安土之憂十未足為去國之憂一也自非不幸有不可不去則古之人未嘗輒去是以顧慕悽愴遲遲而行曰吾何為而至於是也既而曰吾去國久矣吾墳墓尚存在耶先人之樹尚存否耶宗族上下其安健者誰耶鄰里鄉黨其不去者誰耶與其託異國而樂也孰若處其故國而樂也與其知友往還共樂於此也孰若吾宗族鄉黨共樂於彼也嗚呼古之人重其去國也如此而今之人何獨不然伏念某自高曾以下皆占籍永嘉而某之生亦永嘉也至先子始以貧謀生他郡計其當時必有所謂不可不去者夫豈得已也哉而某眷眷之意惡其所難思其所易蓋三十年于兹矣特以僑寄海隅貧不能舉每企首北望未嘗不慨然也今者伏遇明公出宰是邑其知術之明政事之敏南北之人稱頌奔走莫不欲一拜堂廡望顔色以自慰焉况某墳墓所在而先人之樹尚存焉宗族上下尚無恙也鄰里鄉黨尚未去也則某去其不得已者就其得已者將不在今日乎古之人有猛虎無苛政則不去今有善政無猛虎而不歸是豈惟有愧於古之人又將有愧於今之人矣傳曰居是邦也事其大夫之賢者某雖不肖竊有意焉答義仲書所示退之别傳且欲質之某某何人敢當此耶然反復觀别傳誠非退之語也好事者為之耳夫載籍之在天下其是非舛異固多矣然考其言不若考其事考其事又不若考其理其事如此其理如此而其言則如彼也學者將從其言乎其言如此其理如此而其事則如彼也學者將從其事乎退之排異端有功於吾聖人孟氏後一人而已雖從下遷憤悶甚亦何至是耶此理之必不然者也方其北遷且歸也傳者固已謂少奉釋氏而退之見於文字剴切至千餘言亦足以見其意矣曾不知自伍於異端之流也且使孟簡果賢耶則得退之書固已曉然矣使其果不賢耶則退之尚肯與語先王之道斥異端之害教者哉然簡立朝多竒節其識趣宜有過人者尚復傳此乎此又理之必不然者也夫前日以為是今日以為非今日以為不可而明日以為可此喪心失志之人之所為也古之人有以割烹要湯者孟子以為不然有主侍人瘠環者孟子以為不然有食牛以要秦穆公者孟子亦以為不然夫孟子與是數子其世之先後蓋千餘歲近者數百歲其是非漫不可考也何自知其必不然耶嗚呼以孟子知是數子不為彼也則知某知退之之不為此也章章然明矣然世之人一得别傳便以為退之竟奉佛更唱迭和同然一辭獨吾叔疑焉非喜辨是非誰肯勤勤如此此某所以不敢自默以虛來教也尚有未安願更疏示又答仲義書還示甚悉然無固疑也傳曰祠神海上遇大顛其改刺袁州又詣大顛獻衣二襲皆與答孟簡書不同蓋退之與顛還往已熟暨至海上遂造其廬其改刺袁州則不復造其廬也留衣服為别而已又傳所載多托退之所常語者此某所謂好事者為之也昔汲人發冢得古書以為皆周孔所著也其後乃有伊尹自立及太甲殺伊尹之説學者亦將從之乎屬頭風筆此不一代上何相書某生長永嘉方未冠時辭親遊學浮舟慎江泝流而上見兩山連延奔伏而爭先長川北來介山之間望之幽然蓋蛟龍之淵即之清徹可數毛髮激石怒號飛泉噴薄如雷霆如河漢徜徉其上心目眩亂久之乃進橰焉連日繼夕窮深極逺卒欲求其所自出而不可得于是喟然嘆曰大哉處之水乎真天下之偉觀也蓋所謂源深而流長者也今夫秋潦稽天朝滿夕除雨集溝澮立見其涸無本者然也古人豈欺我哉自爾益與四方士大夫遊矣發于岷山萃于涪萬歷瞿塘灧澦三峽袤延于千里然後放于荆州之野此江之水也而其險如此源于崑崙道于積石東折于洛汭而肆于大伾􅔿淪摧射橫貫中國此河之水也而其悍如此自昭稽至桐柏而伏焉稍出而寖廣東行三千里而大會泗沂之間其渾浩流轉茫無際涯驚湍橫溢見于瞬息此淮之水也而其暴如此出于溫溢為滎橫截河流直達于海此濟之水也而其徑如此非特是也有渙散無力不能負芥者其名曰弱水有幽黝若漆彌望無極者其名曰黑水有混濁汚泥穢惡不治者其名曰涇水以至百川衆流支分派别參差淆亂不可槩舉然其大且尤蓋不出此數者也夫善利萬物者莫若水彼為弱為黑為涇者固不足道而所謂四瀆者又有四病焉雖曰利萬物烏知其不害萬物耶今處之水也禹貢之所不載酈元之所未詳故其源不可得而推尋然匪亟匪徐匪縱匪拘窮澗深谷而不為厄也長灘漫流則安而行之凡舟楫之所經恍焉如通乎坦塗而已矣故無江之險河之悍為可虞也以為溢也而常虛以為委折而不迂蓋所謂因地而為方圓避礙而通諸海者也故無淮之暴濟之徑為可駭其所以止于沚鍾于澤放于四海灌溉滲漉以為天下利者蓋未易一二數也孟子曰觀水有術必觀其瀾然則某以為是天下之偉觀者顧不信然恭惟閣下以名世之才相聖天子其德大矣學士大夫雖知所以稱頌或不能形容其髣佛而某也不佞以為相公之德業其猶處之水乎其抑亦山川之所稟而獨得其秀氣之全乎不然何其清明汪洋不可窺校也如此夫水出于處而其波之所及莫近于溫也方今動植之微畢被沾溉之澤况某枯稿之質家于下流者耶故其疇昔嘗被慰薦之賜則餘波見及政其所也惟相公矜憐之與丁剛巽書某向數以先丈葬地事聞左右而誠意不至辨論不精不蒙留聽然亦以為剛巽必以某言質諸識者則改卜必矣近左經臣見過云剛巽襄奉已有日秖用舊地不識誠然否凡世俗所謂地理陰陽禍福之説無所考據者皆不足論今特論其有考據吾徒所當守者孔子曰卜其宅兆而安厝之卜者卜其地之美惡也地之美惡雖不可一概言然地之美者不過土肉深厚無砂石無水泉不近溝澮陂澤故無卑濕之虞不近道路市井故無意外之患地之惡者不過土肉淺薄有砂石有水泉近溝澮陂澤故不能無卑濕之虞近道路市井故不能無意外之患故凡人子之葬其親慎之重之不敢臆決而聖人亦教之以為必卜焉然後葬也故地之美者葬之則死者安地之惡者葬之則死者不安死者安矣生者其有不安者乎死者不安矣生者其獨能安乎此非禍福之説而理有如此者今夫人子之養其親必使之居處之安然後甘旨定省不失其所謂養茍居處之不安則為人子者能泰然自安乎古之人事死如事生未聞獨詳於未死而輒略於已死也今先丈葬地倚巖而冗巖腹泉出汨汨不休春夏尤甚壙底皆狠石此地之美者耶地之惡者耶且聖人所以教人卜者以汰吾人之疑也若耳目所聞見思慮所能及則利害較然矣尚何疑哉竊聞剛巽將濬溝墳旁以却水害某以謂就能却此水而壙有石亦不可葬何者石能生水故也今天欲雨礎必先潤濱江倚山之礎往往水出今雖能去冢上可見之水實未能去壙中不可見之水也可見者其害小不可見者其害大又况可見之害未必去而不可見之害有必至之理耶或者曰剛巽開此地其費不資業已成是未能遽易也某以為不然尋常稍有知識者則不敢較葬親之費孰謂剛巽兄弟之賢獨惜此費乎又曰剛巽必用此地無他亦欲享祀便耳是又不然卜地葬親以為萬世之安此人子本心也若夫異時享祀之便否特其末耳豈有舍其本而徒徇其末哉其使君家子孫果賢耶雖千里亦能致享使君家子孫不賢耶雖跬步不能致享固當問其子孫賢與不賢不當計其墳墓近與不近也孟子曰養生者不足以當大事唯送死可以當大事是知三牲之養不如不失一壞土之利為愈也今無故舉先丈神柩置之有害不美之地雖能斥世俗地理之説卒違聖人所以教後世者竊為剛巽不取也然此地不可葬凡剛巽親戚朋友舉知之然未聞有歷歷盡言以止剛巽者豈以剛巽為不足語哉誠以不可止而不止也某以為剛巽平昔最疏通不蔽或者有所未喻耳故敢盡言之實覬剛巽幡然而即吉卜也若剛巽又不聽健決不回則亦末如之何矣竊計剛巽他日親見水害則必追咎親識朋友無能盡言者則某之言雖不蒙見聽於今日亦庶幾見思於他日也
