body:
  text: 横塘集巻二十宋許景衡撰墓誌銘蔣君墓誌銘蔣氏自君之大父以文行望於鄉而伯父宁亦以力學稱擢慶厯六年進士第故其後子孫皆業儒世其家獨君早孤而窶方營衣食不遑學校然其為人謹飭有常度家居肅然不聞人聲其言厯厯可聽而不及人過差其教子必本於孝悌是雖未嘗學而識者以為猶學也常曰吾不天弗究犬馬之養顧何以致吾力乎故凡嵗時祀事必躬辦而薦獻之處凛然如在雖老不怠焉娶孟氏生二男曰敦叙敦臨著籍郡學三女其婿曰王儒卿石礪沈迅皆士人而適王氏者早死初君以同產獨女兄奉侍之尤篤儒卿其出也故妻以子俾事其姑猶巳也其恭愛如此政和改元正月丁亥君以疾卒於家其孤將以明年十月巳酉葬於所居瞿溪之原於是儒卿為太學生狀君行致敦臨之言請銘其墓余固未嘗識君而習其平生者葢得諸鄉人之善者為多也是不可以無銘大父諱絳父諱宓母陳氏銘曰禀君名忱甫字也系出樂安永嘉其里也維善宜夀七十而止也維躬宜有以貽其子也沈君墓誌銘某兒時先夫人語以沈君事曰沈吾外弟也䘮其父時母猶在稍長能自省孤苦不煩訓飭所以奉母者無不盡母死持䘮又如禮其可尚也比余從人事嵗時往還其閨門肅然夫婦熈熈雖婢僕亦訢如也其撫余良厚其後君死藁葬母夫人墓次余方游學哭之過時而悲比舉葬有日其孤尚行速余為銘嗟乎余不見君久矣然其平生猶朗然吾心也然則孰宜銘君諱藻字子文曽祖廷珍祖坦以多貲為温之瑞安著姓父惟卿既死族人異籍而其貲無幾母夫人杜門弗出日冀君壯大嗣其家而君以能謹儉力於為生家以是足其為人多智謀人有疑必咨之其言厯厯可聽喜浮屠法讀其書所謂大藏者凡再過又摭其可為勸戒者手抄以示人七月壬午病於家崇寧四年某月某日葬於邑之芳山鄉龍就山之東原徐夫人祔子二人曰尚行義行皆業儒女長適某其次在室皆早死次嫁某孫三人女孫五人銘曰族望吴興以亂而遷有家於温蕃蕃子孫延及子文載世一人孤童自持祀以不隳凡我後人其是之思沈耕道妻某氏墓誌銘某氏溫州瑞安人年若干嫁同邑沈某耕道耕道少習進士累從有司舉輒弗利乃棄去徙居江上日與所往還隨所遇娱嬉酣飲極談浮沉里閭或乘輕舟夷猶中流舉席鼓枻𣺌然天末混迹漁者笑語歌呼夜或忘返視其肆放若不知世之有榮辱貴富可以為欣戚也而某氏能勤儉力於為生家以是足且斥其食飲賓客費以奉耕道而耕道初不知其有無多寡也曰吾天之幸民也放浪江湖間有以自適者葢有賴焉某氏生子男曰某某自始學某氏課督之甚力今為郡學生將謀婦氏曰我聞吴氏女許出也許有賢行其伯仲儒者是必以告其女子者矣趣所親訪之吴氏辭焉某氏曰我屬疾茍失吴氏好且死不瞑其為我哀告之而吴氏無以却也許之某氏喜甚疾愈比再作遂不起某年某月日也年若干耕道以某年某月日葬於某所且遣某以書來請曰吾辱子游而吾妻嘗聞子之賢請婚甥室既得所願欲今死矣豈不欲子之銘乎余聞某氏有婦道宜銘也銘曰猗歟某氏某人之子令妻賢母銘則不朽丁昌期妻蔣氏墓誌銘永嘉丁先生墓在郡東南二十五里大羅山之西原崇寧改元四月丁酉竁其旁夫人蔣氏祔焉夫人郡人諱宇之女生十八年歸丁氏逮事先生大父以孝謹聞生三男子曰惇夫㢘夫志夫皆儒學而惇夫早卒一女子嫁同里沈希臯男孫六人女孫七人以疾終於家享年六十四自周後䘮祭禮廢學士大夫概仍俗漫弗省非是先生父子獨革去純用古法式聞者多竊笑而夫人率行之無難色溫人惑浮屠說諸子常從容道其必不然者夫人頷可之誡諸婦毋違夫子令嵗時宗戚趨寺廟以嬉或請夫人夫人曰彼豈我屬游止處耶不喜祈禳禁忌曰死生禍福天也自少至老其言多類此景衡與夫人諸子游而志夫同年舉進士同官於台比屬銘不敢辭先生諱昌期林石介夫誌其墓云銘曰不惑於佛不牽於俗夫人行之而我銘之鄧南夫墓誌君諱孝先字希舜平陽人也襟度豁然遇人無少長䟱暱皆得其歡心鄰有彊占其地者君好謂之曰汝所欲不多吾與汝或以其廢田為屬諸官乞給佃如令君示以劵曰若以貧為是也吾先疇不可以與人要當相周急爾客或謂君彼不逞邀求何厭盍從官得曲直以窒其後來君曰吾豈不知此耶顧俗好訟凡争尺寸地賕賄常不貲甚者至破産無以生吾誠怯懦然足不履公閾再世於此矣願守遺訓俾吾子孫弗忘也客乃謝之嵗饑盡斥所贏以賑閭里居當往來有小商貨滯弗售輒以善價市之或問何用此不急為君笑而不答喜賓客有過門則具肴酒相與娱樂以為常政和元年夏得疾屛巫醫弗用日與所厚笑語如平時以六月戊午終於家享年五十二娶同里黄氏生二男曰廷曰邦二女嫁徐佐林森初君力進邦於學且戒之曰若曹讀書亦知夫所謂不自欺者乎嗚呼觀君之行事與君之所以訓子者誠非茍而巳也故特敘之以書其墓石云行狀故宗室環州防禦使行狀公諱令鼒字文炳藝祖之幾代孫而莊懿公之長子也生某嵗授某官幾遷至某官治平熈寜元豐間以覃霈授某官再遷岷州團練使爵某邑元符三年今天子即位覃霈遷環州防禦使四月十三日以疾薨於京師某坊之别第享年四十三公生穎悟方為兒則巳端重不妄舉動見輩行羣戲其旁未嘗輒隨以往莊懿公雖履貴富劇喜問學操行端方名重宗籍其所與游皆一時賢士大夫公總髪倚立常指問其誰何又問其為人曰吾長大庶幾為斯人乎莊懿由是器之既而刻苦從事經史率以夜分為常或曰貴公子雖酣宴不過是君何自苦如此公曰我以君親恩得安居飽食奉朝請外無毛髪勞苦事舎是將何用吾心且酣宴之樂孰與據几案探聖賢為樂哉喜翰墨字畫清勁蕭然有出塵意其為歌詩稱是性寡合非其好未嘗許以親近至其所往還必知名士笑語從容訖無倦色間有斥逐或䘮服婚嫁必盡力周之惟恐不及故士大夫多徳之常戒其子曰人不學徒然此世率與草木同腐是大可惜而等勉之故其子皆志於學公事父母孝莊懿之薨執䘮如禮見者慘惻平居奉巳清約常嫉夫侈縻過度者葢公之行巳類多過人者而族屬上下自以為不及也未嘗病比啓手足猶如平時家人輩不知而醫療皆不及也終之日無問識否皆嗟惜之公母某氏某官之女封某郡君子男三人曰某某女幾人未及嫁七月某日䕶從先帝葬某縣某鄉某原公帝者後爵禄崇重而操履甚似寒士其學術該博識度髙逺使用於時從事於功名之際則其所施設葢未易量也奈何止此而巳惜夫某辱公游最舊故知公為尤詳葬有日子特請狀其事因次第之俾告於有司云述陳孺人述陳氏越州山隂人父某以守法不徇權貴知名元豐中卒官朝奉郎大理寺丞陳氏年二十二歸余逮事先公宣敎奉侍無違先公以為能盡婦道其事余有禮朝夕不少懈余疑其始嫁然也久之亦然至於終身莫不然也余官州縣貧甚食指衆陳氏能痛自抑損甘淡薄勉余以安義命厲名節常曰男子當期於逺大余失察黄巖帑吏之姦坐免官頗疑其不懌問之陳氏曰昔吾父坐事就逮詔獄謫官逺去吾母不憂也曰職事當爾今我亦何憂苐恐君氣未平爾其後余尉樂夀官舎在京城大河洲渚中風濤無時居民日虞衝潰陳氏曰此雖岑寂而無送迎奔走之勞政宜讀書近筆硯耳間具肴酒顧兒女子相笑語觀其意惟恐余有所不樂也性警頴遇事輒能記誦於物無所靳惜其始嫁也㑹家弟少雄欲游太學無以為道路費為斥奩具以資其行遇族姻恩意惟厚内外稱焉大觀二年正月甲子以疾卒於河間官舎年三十四生一男曰世厚四女其二早死政和二年余為詳定重修勑令所删定官以元圭恩贈孺人五年嵗在乙未十月巳酉葬於永嘉西山瑞鹿寺之西原悲夫陳氏從余於憂患艱難中相與為辛苦亦庶幾夀考安寜之報而制命不淑得年不永然其平生葢有女子所難能者欲誌其事於墓石而哀不能文乃為敘而銘之豈惟陳氏幸而得傳不朽亦使聞者不悼其不幸而勉於為善夫豈小補哉雜說本草宣連微寒味苦無毒凡嬰兒始生必以飼之曰是能去其腸胃間積毒者居頃始乳之既而復飼以宣連則弗食之矣嗟夫嬰兒方其食宣連也是未知所以為苦也迨知乳之為甘然後知彼之為苦故甘者在所取而苦者在所去矣豈惟嬰兒為然凡人莫不然也食藜藿者不知粱肉之為美也居貧賤者不知富貴之為樂也及其舎藜藿而食粱肉然後知其不為美也去貧賤而即富貴然後知其為不樂也如使終身未嘗食粱肉則雖不美者美矣使其終身未嘗即富貴則雖貧賤豈有不樂哉惟知其為不美也故窮天下之美猶有所不足焉惟知其為不樂也故窮天下之樂猶有所不足焉向之藜藿足以為美今也窮天下而不足以為美向之貧賤足以為樂今也窮天下而不足以為樂也是豈人之本心然耶是豈有以使之然耶凡人之所愛宜莫如愛其身之甚也然有時而不知所愛然者今人不幸以横逆之加諸己也則必持梃刃而鬬焉持梃刃而鬬是負亦死勝亦死也為其不能自已也故雖其所甚愛有不顧焉士之仕於上其職之所守理之所爭有從之則生違之則死者為其不可茍也故雖其所甚愛有不顧焉被鬬而死死則巳矣而吾之所謂死則有不死者存焉又况夫鬬者其勢必至於死而君子之所為則未必至於死耶然趨其必死者常如彼之多所謂未必至於死者則如此之寡為君子者因悲其愚而至於是也而君子自以為不愚也耶君子之所為有衆人所能知者有衆人所不能知者惟其有所不能知則或以為無君子也其所可為者義也其所不可為者利也君子於此將奚趣趣其義也雖衆人亦以為然其所可為者善也其所不可為者惡也君子於此將奚趣趣其善也雖衆人亦以為然乃有時焉其所為者義也而有似乎不義其所為者善矣而有似乎不善君子固自若也衆人斯惑矣然而君子之所為固不期人之必知也豈若衆人然將有為也則曰人果以為然否其有所不為也則又曰人果以為不然否不知其為可亦不知其為不可也惴惴焉唯恐其議巳也昔者孔子不復蒲人之盟人皆以為不信也孟子不朝齊王人皆以為不敬也然則為孔孟者宜如何哉或曰古之人恥没世而名不稱然則君子之所為果不期人之知耶夫知其為君子者固有在也如衆人焉則是無君子也久矣跋郭璋畫跋太原郭璋及其子晦皆善畫尤精於人物元符三年余將西游京師璋父子遺余西域像世俗所謂觀音者徙倚巖石間端嚴冲靖凛然如生其用筆意與吴張相上下余平生不喜佛特少年嘗好觀畫耳嗟夫璋以余之所好遂忘余之所惡殊不知余之所惡葢有甚於所好也逸少之於鵝衞子之於驢皆以其所好卒被惡名葢予每以為戒今璋之畫豈惟予之所惡亦予所不復好也然璋畫妙絶富人以金繒購之未易得今乃獨以遺予是未易詰其所以然者予友某純孝人也將歸寜臨海謂予曰敢輟子之所惡以奉吾母之所好可乎余曰已所不欲勿施於人君母所好果何如哉然余亦豈有靳焉虚其請者葢非所以遺某人母也跋陳君章所藏諸公帖范文正公唘齒弄筆不忘忠義此帖有終日為善以報已知之語凡謝人不當如是耶前輩風流日逺使人嘆息歐陽公以文章伏一世初不以字畫自名也而遺墨爛然殆不愧當時工書者於以槩公之往烈亦豈易量耶杜祁公書清勁不俗如其為人君章寳藏雖寸紙數字不棄也其好古樂善如此誠可尚云舒王筆墨瀾翻其得意處不減古人而議者以為酷類楊凝式果然否耶某年月日同左與言登八詠樓覽觀溪山之勝慨然想見古人㑹陳君章擕諸公筆蹟見過相與舒巻終日而文富小帖葢其一也昭陵遺老無復人矣見其似者喜况手澤乎跋遺直碑某嘗得清獻公奏藁見其誠心體國知無不言墓碑所著乃其一二大者耳日月滋久斯文不傳後生無復前輩之風流幼安每出以示人其意逺矣跋公復來詞右公復來詞詞雖樸拙然邑民愛戴之意似得一二聖時先生何從得之以書見問竊恐流傳漏誤謹録浼呈子方雅從先生游固不待文字然後知其政事而樂善無厭眷眷如此宜乎鄙人不敢隠也跋龍眠淵明圖余既得伯時所畫陶靖節乃屬元中書歸去來辭以副之二者為吾寳録葢不獨其筆蹟也跋恵雲詩世傳九釋詩多佳句而吾鄉恵雲復與之同時正其輩流也又其所與游多聞人若魏野林逋輩而其名獨不傳惜哉妙悟從諫其曽孫也以其遺墨傳諸士大夫間當有巨公顯人為之品題則復為不朽矣跋方湖詩昔韓子作虢州園亭諸篇妙絶無對今吾盧公方湖十詠其庶幾乎始公以髙才不肯自售見於小詩名聞一時受知裕陵卒位通顯葢其所大過人者不獨篇翰而巳也大觀四年十二月中澣書所觀於似齋跋節物詩右節物詩一首余初官黄巖禄薄食指衆秋冬之間褐絮未具陳氏屢趣置絹乃賦此詩陳氏曰有無常事何足愧因授小兒女相與誦之自爾每當初寒必誦之以為笑樂陳氏捐室今九年矣偶閱故書得此稿為之愴然惜不忍棄乃録之以遺甥姪輩俾知吾貧如此而陳氏能安吾之貧也政和六年夏日
