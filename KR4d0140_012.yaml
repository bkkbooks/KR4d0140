body:
  text: 橫塘集卷十二宋許景衡撰啓賀崔少卿直躬啓伏審拜命宸廷司刑卿寺除書四布輿議交孚伏惟歡慶恭以某官髙誼絶人清名肅物展也後來之矜式凜然先世之風流抗斧兩河已著澄清之效賜環九棘益隆奬任之私二職以來期年于此上廣聖人好生之大德下俾斯民不犯于有司兹用峻遷以昭丕績矧清衷之妙簡豈丹筆之能淹行謝刑官徑躋法從某猥沿遊舊夙被眷存雖慶謁之未前苐欣愈之無盡又代賀崔少卿啓伏審被命中宸執憲大理盛矣聖心之欽恤屬乎賢德之平反四方交欣萬古一嚮伏惟歡慶恭以某官學優詩禮望重搢紳赫然家聲為天下之所慕繼其世業宜主上之深知比由列棘之班特峻按刑之寄清威逺暨風行朔部之山川和氣所薰喜動塞垣之草木兵農見于兼濟囹圄至于屢空乘軺列城澄清已效推轂多士奬拔尤精渙新渥以賜環豈時淹而俟駕再濡丹筆不失青氊在昔蘇公嘗列用于中罰于今定國當益大于髙門清議所同愚言匪佞某猥沿冗陋嘗被甄收側聞除音額手增抃屬官有日崇慶無階愧畏之私敷陳罔既賀新守啓伏審光被制綸榮紆郡紱涓日之吉開府云初凡在庇存惟胥鼓舞伏惟歡慶恭以某官學繇清訓名重妙齡彼東魯之儒生固知所畏雖北方之學者疇敢或先夙簡清衷寖更煩使吳門父老悵熊軾之不留慎水士民喜虎符之來鎮苐恐追鋒之召弗容暖席之安進即要塗益攄逺業某猥沿孱陋早辱顧憐逖聞下車偶在外邑屬以負薪之疾阻修維梓之恭愧悚之忱敷宣莫罄賀郡守啓伏審升華祕殿作牧近藩涓日之剛視事云始勝遊未逺夢尋天上之圖書和氣所薰喜動濟南之草木伏惟歡慶恭以某官髙才絶俗偉望在人讀書何止于五車落筆獨驚于四座豈久淹于州縣果見擢于朝廷錦帳為郎早冠六卿之屬繡衣持節遂分八使之權賢關總蒞于諸儒册府擅榮于三至少年同志駸駸已著于先鞭回首榮塗櫛櫛皆為其後輩獨安靜退孰測髙明而况論撰職清藩宣任重深憫里閭之愁嘆一蠲郡國之煩苛爰當暇時厯覽陳迹古來多士爭事業于青雲我獨得朋對聖賢于黃卷較其所得孰與彼多養之既完蓄之必發嵗聿云暮霜風作寒願良食以自頥俾斯民之有望某猥沿末契早荷眷知愧慶牘之未前辱飛箋之首及其為感懼未易敷宣賀永嘉郭守啓伏審榮拜詔函進職廷閣清衷妙簡侍從固已得人除目播傳搢紳為之相慶伏惟歡抃恭以某官雄文絶俗偉望在人曩由奬知亟踐清切援毫螭陛亶惟言動之書掌制鳳池光踐絲綸之美方挺挺以自立彼紛紛而謂何萬里扶搖聊為六月之息一麾出守詎使三年之淹果疏持橐之榮庸示賜環之意眷池塘之春草行謝醉吟指階砌之蒼苔即迎步武益攄逺業下副僉言某奔走塵埃侵尋嵗月當休澤均于千里而編籍叨在一㕓道阻且長莫從燕雀之賀書不盡意徒傾狗馬之心冬序云初氣候方凜願為宗社善保寢興代鍾震謝石守啓父為子隱雖聞往載之詳治本人情終賴至仁之造拜恩甚重刻感不忘伏念某賦才弗強得性尤拙偶釋鋤犂于畎畝輒參韋布于校庠蕞爾何知欲造聖門之閫奧終焉無得莫探學海之淵源上負義方居懷戰惕屬私庭之詿誤繄公府以羈留交舊滿前誰是解驂之客謗讒交作居多下石之人足感動于旁觀况愛鍾于天性遂形尺牘仰布寸誠雖納罟擭而弗知已非善避然蹈水火而求免惟在疾呼豈意矜憐特垂寬貸兹蓋某官聰明照物忠厚存心簡在朝廷出臨郡國坐敷美政蓋嘗五月而報成留養斯民不忍一夫之失所惇崇風教樂育人材凡有所原實勸為善遂令寒賤猥被保全敢不頌詠鴻私祗戴厚德邈矣緹縈之孝幸繼前修惻然楊寶之心敢忘後報賀監司啓伏審拜命中宸出使南國政事屬諸賢者輿議為之翕然伏惟某官陳義甚髙樂善不倦妙齡秀發已優翰墨之場偉譽歡騰遂入英雄之彀翺翔學省更踐師儒絳帳談經析疑言於多士繡衣持節作師表於一方天眷滋隆物望益重諒無暖席之頃即聞召節之來入據要塗發揮逺業某江湖流落簿領侵尋趨賀未遑歡悰罔既賀江南安撫啓伏審誕敷帝制易鎮帥垣涓辰之剛開府云始截然一面據江海之上遊隱若長城寬朝廷之東顧歡傳四出清議一辭伏惟歡慶恭以某官挺然髙明見于施設兼吉甫之文武足以憲邦惇郤穀之詩書果膺謀帥頃繇烏府得請虎符豈誇晝錦之歸來正以夜衣而勤事潤澤在物千里固已妥安精神折衝鄰冦為之逺遁惟其有備而無患是謂不戰而屈人維建業之名藩總江東之屬郡兵民任重守將才難僉言必惟其人請觀已試之效恭惟成命斷自清衷而况獻替謀謨有古人之遺直進退出處為多士之美談授鉞諒不淹時賜環即聞嚴召雲霄専席豈惟耳目之官廊廟賡歌即豫股肱之喜某蒙恩舊矣聞命躍然屬猥役之拘縻悵崇閎之綿邈莫遑參慶苐劇馳情賀鄧樞密啓伏審渙號在廷茂恩進律密毗三事之貴峻登一品之崇傳聞邇遐聳動觀聽伏惟慶慰恭以某官致知格物以道事君父子擅名於縉紳世濟其美弟兄接踵於廊廟人以為榮擢自聖神進總樞管包干戈而不試置海宇於太寧維彼西戎尚勤逺略偏師順動醜類掃平節制曲盡於毫釐報捷不淹乎晷刻維持久大之業輔成道德之威逮此酬功濃於慶賞豈唯制勝運籌帷幄之間行見登庸躋民仁夀之域中外屬望朝夕為期某流落江湖侵尋嵗月仰恩憐之甚厚聞播告而躍然屬以拘縻莫陪燕雀之賀永言嚮頌何勝犬馬之心賀何門下執中啓伏審顯被除書榮升左省聞者相慶翕然一辭知廟堂之得賢洵士民之被澤維時帝簡實幸寰區伏惟歡抃恭以某官有王佐之才任天下之重擢自舊學揚于要塗仰合天心咸有一德進斷國論于今三年以清慎律搢紳以寬大厚風俗懋昭偉業丕建太平比轄文昌之綱亟二西臺之政曽未乾於詔墨已洊拜於恩綸惟其從容以和故能出納惟允贊元斗極實參喉舌之司正席台躔佇有鈞衡之命坐令動植盡出陶鎔某猥以孤生承兹寵庇雖塵埃州縣居恨迹踈而貧賤姓名每蒙齒記側聞峻擢實抃鄙悰莫伸展慶之區區徒極望風而眷眷代賀何門下啓伏審光奉制書洊加恩數睿哲念舊雖久而益隆搢紳僉言前此所未有伏惟歡慶恭以某官潛心道本為時儒宗華問早藉於先朝素學進裨於元聖觀伐木之作蓋未嘗不須友焉暨命説之初其已有大過人者為上為德非公其誰比繇天官入贊國論日常勤於三接嵗或至於九遷禮意夫復何加宸極猶以為未載升峻秩用示眷懷仰惟終始之恩必極任屬之重攀鱗附翼是為千載之逢當軸秉鈞行頒百揆之拜天下幸甚人心同然某比荷奬知叨升侍從嘉與動植均被陶鎔屬逺守於帥垣阻稱慶於鈞屏惟是欣誦未易名言又伏審肅侍鑾輿載臨龍德眷惟舊學式渙新恩實千載之難逢極一時之榮遇伏惟歡慶恭以某官文髙典册名重搢紳蔚為廊廟之儒臣時乃聖神之德友顧初潛之所在宜上心之不忘千仗翠華傾臣民而就日一聲清蹕覺池苑之生春蔥蔥瑞氣之襲人厯厯舊遊之在目嵗律屢易治既格於承平宫僚幾人公獨居於左右是宜渥澤特峻華遷方將疇咨登庸爰相坐使照臨之內一歸陶冶之中仰合乾行永熙帝載某猥沿孤進最荷曲成恭聞除音增抃丹悃念坐縻於外寄阻拜慶於下風瞻跂鈞庭卑情不勝傾倒之切賀何彥時啓伏審拜命大庭升榮東觀職是論著豈惟一時文字之工卓然才能乃是異日公卿之選光生臺閣喜動搢紳伏惟歡慶恭以某官天資髙明德度宏逺詩禮夙傳於家學猶有異聞父子並受於聖知斯為榮遇比校讎於祕府俄退伏於倚廬既御祥琴遂參史筆多士畏仰能仕蓋本乎教忠萬里奮飛銜訓即期於嗣事清議所屬斯言不誣某猥以迂踈久於庇賴莫前參慶苐劇欣愈代賀康漕啓伏審對揚黼座祗拜恩綸陟書殿之榮名申朔方之成命凡繄庇賴舉切欣愈伏惟歡慶恭以某官風采照人文章絶俗熙寧庠序躐居俊造之先大觀朝廷蔚有謀猷之助先職河圖之清切出臨使部以按亷綏靖一方覆育多士兵民足食已寬宵旰之憂車馬來朝益峻褒升之數矧惟麗正上直奎躔凡清秩莫尚于兹非名儒不可以處飛芻斡糴烏可久于漕臺揚藻摛華行入趨于司禁士論所屬愚言不誣顧以舊遊方假餘照念縻官于邊閫阻修慶于賓鴻永言頌瞻實倍倫品賀少保樞密啓伏審孚號明廷進位亞保總籌帷之機密參鼎席之尊崇凡在陶融惟胥鼓舞伏惟歡慶恭以某官膺天之任逢時有為周旋一紀之餘拱揖羣公之上式是百辟亶惟樊侯憲于萬邦孰先吉甫基名鳯沼制勝斗樞老成實重於典刑折衝不越乎樽俎協贊聖治已臻庶績之咸熙布宣皇威豈止四方之無侮於昭德烈克對寵光矧惟寅亮天地之官時乃左右輔弼之任二公宏化式隆巖石之瞻當軸處中方倚巨川之濟諒惟詔册近在浹旬夷夏屬心搢紳傾耳某早沿蹇薄最辱知憐僻處江湖莫修慶謁嘉與動植均被生成瞻望鈞庭下情無任送沈郎中啓伏審光奉朝恩言還帝闕解東甌之印綬政已告成望南浦之旌麾人皆戀德恭惟某官承家文采奕世聲名錦帳分曹爛矣郎官之宿繡衣出使廓然刺史之天均逸名城正緣色養父老方歌於來暮漁樵俄結於去思春草池塘悵莫資于吟咏蒼苔階砌方有待于步趨進即清除益攄逺業某夙逰門下方爾里居屬以負薪之憂莫綴攀轅之列春序云半氣候尚暄山川悠然徒馭勤止願為宗社益保寢興代賀范郎中啓某官出自故家夙推賢業録微契於疇曩况函翰以勤渠故躅已遙徒追懷于舊德素風未泯幸獲際于諸郎欣慨之私敷陳莫既代賀林兵書啓伏審進位夏卿兼官天府詔語滋渥士論所歸伏惟歡慶恭以某官文采承家聲名蓋世摛藻西掖專機要於五人視草北門追誥命於三代雍容議論貫穿古今妙簡清衷逺聘絶域肅將君命皇皇真使者之華坐折姦謀蹇蹇有王臣之節惟帝畿所治者千里而司馬實統於六師非有一時之茂勳敢當二者之重任張趙方宜配美吳李曽何足言維時樞衡之嚴猶有虛席會見夢卜之命敷告在庭中外所期祝願之切某叨塵法從逺守塞垣悵展慶之莫前徒溯風而增抃賀致政薛老啓伏審光奉渙恩進升美秩里閭增重杖履有光伏惟歡慶竊以仕非為貧蓋欲行義老之將至則思引年此君子出處之常亦人臣進退之義比觀士習寖失古風耽祿忘歸以身徇物或青霄得路方日蹈于危機或白首投荒猶未離于罪籍死生契濶妻子散離雖富貴初樂于平時而憂患難堪于晚節得不償失辱多于榮彼聞髙風不無甚愧某官所操彌約陳義甚髙生逢盛時力辭美仕不顧儻來之軒冕徑尋歸去之田園林下一人而今始見人生七十于古亦稀而况優遊琴樽左右孫子風波逺矣無可畏之簡書里社依然有必恭之桑梓凡人未見一可而公獨能兩全不有得乎豈能如此屬真人之御厯覃慶賚以在人雖曰退休亦均渥澤不獨俯優于耆舊蓋將少激于貪婪凡與見聞舉皆欣躍顧惟孱陋夙被眷存方抱憂哀莫伸燕雀之賀永言嚮頌何勝犬馬之勞代賀許觀文啓伏審誕孚渙號榮拜茂恩陟祕殿之隆名峻留都之重寄傳聞逺邇聳動搢紳伏惟歡慶恭以某官有王佐之才任天下之重持循一節翊戴五朝忠言嘉謨四方之所傳誦仁心義問多士以為依歸頃辭政機得請宫鑰綏懷強敵坐折姦謀約束洪河俾無怒溢上寬憂顧屬我老成恭聞詔音實慰民願擁兩河之和氣溢全魏之歡聲矧聖賢方急于經綸而民物有待于康濟眷樊侯之在外式遄其歸嘉傅説之欽承爰立作相當使照臨之內一歸坯冶之中公議所期斯言可必某猥沿踈薄夙荷眷知屬假守于邊州阻祗慶于鈞席惟是欣頌未易名言賀吳唐彥啓伏審光被渙恩躐升華序伏惟歡慶恭以某官寓武于文作忠以孝力戰西陲蓋嘗一月而三捷論功北闕庶幾閲嵗而九遷喜溢廷闈光生壁壘亨塗寖闢逺業可量某屬縻簿書阻慶齋閣顧寸懷之增喜非尺紙之能宣代賀林顯謨啓伏審光被制書載升廷閣任賢樞管允為廊廟之名臣進秩庭闈是乃朝廷之盛典除音始下輿議交孚伏惟慶慰恭以某官育德直方受材宏博兄弟操履有先世之風流文章流傳為後學之師法踐揚中外茂著事功上被一人之深知獨號五朝之舊德屬慶嗣登延于右府而祕職特峻于西清是謂異恩式昭盛事矧當君臣千載之遇必極父子一門之榮帷幄運籌巳克承于舊物屛風隔坐豈専美于古人召擢之期倚立以俟某恭聞成命屬守邊州雖慶謁之未前苐欣愈之罔斁賀張幾仲啓伏審榮拜朝恩欽承天詔再留北道謂謀帥實罕其人進直西清蓋念公久勞于外歡傳夷夏鼓舞兵民伏惟歡抃恭以某官德宇清深天機駿發果藝從政兼孔門二子之長文武憲邦具周室總戎之美受知仁聖出鎮河關外護百城指形勢于掌上旁制強敵得動息于目中人材各引其所長吏事無細而不舉惟其亹亹忘倦政自恢恢有餘措疆場于妥安寬朝廷之憂顧曩繇眷奬亦既借留殆至七年之淹尚諉一方之寄並推異數斷自清衷彼增秩賜金雖有守臣之故事然受鉞分閫未聞成命之再申洪惟元功獨出前古告成於上當錫誓于山河式遄其歸即賡歌于廊廟某海隅賤士門下庸流犬馬戀軒忽焉再嵗燕雀賀厦敢後此時屬猥役之坐縻悵願言之未獲其為悚惕未易殫敷代賀蔡顯謨啓伏審拜恩中禁進職西清詔目四馳士論胥協伏惟慶抃竊以新外朝之寶構儲先帝之聖謨倬乎雲漢之章煥如龜洛之出蒞職于此其人可知乃有英才來符睿選恭以某官才髙華胄名重妙齡探術業于聖門謹義方于公衮他日獨立常趨學禮之庭三年一飛遂奮沖天之翼比淹書局密簡宸衷載升延閣之榮躐處從班之首而况對宴間之玉色奉講讀于金華蓋能仕本乎教忠而銜訓可以嗣事君臣千載之遇從古罕聞父子一門之中于今為盛某早沿涼薄嘗荷眷知側聆新除倍欣鄙抱屬塞垣之有守慶台席以無階愧畏之私敷陳罔既
