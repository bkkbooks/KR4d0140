body:
  text: 橫塘集卷十七宋許景衡撰小間與周令前日特煩眷報而敷致剴切動與理契竊有以見大君子端已平施之意甚善甚善拜寵畏慕何言顧恨衰迷不獲親承以裨固陋耿耿初炎比惟尊候萬福恭啓起居與馮守淮安吏民天與之幸乃得賢偉君子儼然臨之恩威所施兩適其中境內帖然有日于此矣奉法循理古循吏之事史氏以為百姓無稱今於左右為尤信苐虞召命不越朝夕進據要近以攄及物之澤凡我州民不得究被拊育之賜惟此之恨爾預此眷眷請違台席俯仰兼旬轉徙修塗永懷恩紀之重南望慨然俗事紛馳不獲即叙嚮往中甚慚惕惟神明有以諒之東行愈逺門牆眷眷之誠欲言不盡某窮海細人稟賦單淺承學無所得每自悼其不競獨幸備數麾下猥奉趨走之役䝉賜眷拊周旋覆露既寬譴斥而又豫告俾便其私竊顧孱微果何取於左右而愛憐之意乃至此耶雖至仁博愛不間疏昵然非所應得惟劇慚㥏耳乃者告去有日重䝉宴餞眷意滋渥已切感戴而行李百須復爾煩浼台聽益不自遑惟寬大不以為罪爾某午日抵闕下官舟早暮可得即東下矣旅次屬此大熱尤難久處也前塗别當參訊起居寒薄幸甚得綴使令之末早暮左右雖愚暗不足以仰窺高闊至於行已首公孳孳於及物實多士所矜式况在部吏也耶違去麾棨忽焉歲莫念念眷録之重實惟朝夕行有參省之日繫吝之素豫爾欣釋歲律行盡氣候益凜不審台候何似伏惟綏靖一方諸福沓至更乞善保崇重以副朝家眷倚之意下情無任傾禱之切頃者京師草略參問起居自爾奔走修阻且無西去便仰詢動靜於是不繼悚惕有不可言者唯門下愛撫之舊有以諒其匪懈爾不勝拳拳恭承受代不逺還朝遂有顯拜之慶此固清議所屬苐以吏民銜賜滋渥惘然惜旍斾之北爾然翔翥要劇利澤所及者逺與其為一州其輕重小大何如哉誠不敢自私輒以此賀某自夏徂秋跋涉長塗所至濡滯閏月方到家猥幹牽纒初寒離鄉以為歲暮必獲參拜舟行復阻汳水凍澀貧橐碎纍艱於出陸勢須新春方行還局遲遲不任惶恐重念趨走府下閲日雖淺而周旋保庇之私實厚輩等則終始記録固宜徼賜門下仰惟樂育成就之德孚于多士蕞爾嚮往殆無窮盡答鄭國材昨䝉惠書屬病中僅能執筆作報草草當已早達春盡渴雨稍熱想惟孝履支持前書所喻皆盛德者所任非僕敢當也少時窮空應舉覓官冀祿及親耳稍長從賢士大夫游乃知夫仕不獨為貧也頗思進於學問而求其所謂成已者然資禀凡下知識昏鈍又未嘗得親近賢師友無切磋之益以至于今而茫然無所詣也交游間過聽輒見推許曾不知其迂疏固陋無一堪者此殆周人之璞也而足下又以衆人所以望璞者為言豈不過哉昨䝉誤恩寬之言責蓋嘗歷誦蹇淺辭不獲命靦顔就職亦幾數月雖愚甚猶不自量庶幾草芥之微求裕天地苐未知蹇淺果有以自效否區區未易悉布于此也示問中庸大指非公好學不耻下問誰肯千里移書見及耶曲能有誠謂之致力於所偏曲其義有所未安誠如來喻蓋擇善而固執之者學者之事也擇者當如何學問思辨是也此所謂致曲也曲能有誠誠於致曲而已與太守窮臘寒苦恭惟照臨一方鱗集諸福朝廷賢德海內傾屬伏乞上為聖時善保崇重無任竊某誠心願見有年于此疏賤之限無階親近居用悵仰比獲于典謁伏䝉寬大特與之進凜然德義俾遂瞻炙實不資之幸遽復請違方爾行役跂首台座何勝眷眷早暮之情伏冀聰察頃自台席謁誨滋欵暗劣不競為之廓然而高明不居俯同於物燕笑從容若遇等輩雖自大君子夷曠所存顧不肖何幸耶拜别匆草叙感不究萬一尺紙寓誠復爾澀訥祇益慚懼惟門下諒之而已竊以風望之重載在士論上簡聖心均逸名州雖自優寄而清議大有所未厭柄復之命當在晨夕蓋中外所共祝賤子敢佞某疏慵無似每念承教不早頃從執謁而愛拊欵昵若素役於左右者又䝉矜憐安全之賜下及泉壤厚德所施雖存沒均感顧何以報稱萬一唯知誦詠以為不忘耳與人比者東歸往還使部獲拜幕履下䝉不鄙棄延誨滋欵蹇薄慰幸良已不資計違行府忽焉易月欽味德義之重惟爾拳拳愈逺侍承西去悵惘實惟朝夕謹上啓參問執事者春序云晚氣候益暄恭惟對時受福無量更乞善護宴起茂對寵光以副海內屬望之意伏念疇昔最荷知奬之賜願言瞻拜少叙感遇萬一而疏逺之限久未契何勝悵惘重以頻年以來洊罹憂患轉徙道路上記將命復爾缺絶顧何取為愛撫之厚者區區愧訟良不自置惟神明有以諒此竊以精識逺度輔以力學已足為多士楷式而好賢樂善汲汲如不及尤為識者所欽嘆謂宜進贊國論使康濟之澤出于一門尚掩册府輿議誠有所未厭顧在眄睞之末拳拳祝頌尤劇真切某前者請急歸鄉比還任取道闕下屢走謁舍而漫刺訖不得上通將命渴德之悃益覺勞吝尚冀昭其匪懈不絶其後日之進幸甚與何丞相前日祗造鈞庭獲望履舄伏䝉至仁曲加問勞所以存撫蹇躓之意尤渥小人何以得此恭惟某官端方寬厚協德元聖登延揆路三載于此雖動植之微畢霑惠澤矧在疵賤嘗辱一盻之舊者耶欣慕感嘆欲言不盡未即祗謝苐劇拳拳某不才一行作吏舊學益落重以憂患之故筆研廢閣久矣比者侍坐伏䝉鈞誨俯及鄙文聞命悸汗重念寒薄前此每䝉奬誘而荒唐弗競訖無以稱眷意之萬一居抱慚悚而寬大涵容未從斥絶復俾以文字煩凂聰聽蓋有收而教之之意念非木石豈不慨然輒忘其蕪陋不堪繕寫上呈伏惟謀謨之暇特賜觀覽逆旅楮墨未具所獻不多又以告假有限迫於還任不獲躬詣崇屏仰丐彈畫無任惶恐請教齊閣尚期後日惟相公不倦有以終始之代人與樞密春序云晏氣候益暄恭惟協贊政機坐擁祉祿仁聖眷倚華夷屬望更乞調御寢餗以副具瞻下情無任祝頌之至斯者恭審榮拜綸書入秉樞管除目紛播有識相慶恭惟德望威名聳動中外雍容談笑固已折衝千里之外而况高才力學志存經濟行須詔麻正席揆路使昆蟲草木畢霑惠澤䕫稷偉業復見此時實中外所同禱也匪佞伏念違去鈞庭屢易弦朔驅馳冗劇不時上記執事者何勝愧訟尚倚寬大有以諒其匪懈耳方當進位廊廟之始海內奔走以修慶謁獨是孱鄙繫官窮僻不獲從旅進操刺贊喜北望牆屏不勝依歸悚汗之至伏念譾薄不自知其不肖猥沿愛撫出入門闌親承欵昵實自疇昔顧在疵賤雖不足以仰副勤與而盛德久要所不忍棄况當被遇仁聖康濟海內之日則區區欣抃宜其百倍衆人惟矜憐眷録有以終始之此生幸甚備員偏州茍免罪戾蓋自庇覆之賜其幸不資苐以食貧指衆私計百出薄祿不足以周給此為病耳以門下眷存之舊喋喋及此夏序云初不審機務至繁啓處何似時方清和物被長養伏乞茂對令序益綏福履以副中外屬望之意伏念去離門下閲日滋久低徊薄祿綴繫僻陋永念祗侍幕履既未易得而欽誦疇昔眷撫之重炯然未始輒忘北望鈞庭裁十數舍尚冀時得以尺牘上勤將命而拳拳早暮之誠庶有以自達爾伏乞賜諒比承以道德風望登延右府實宗社夷夏之福雖嘗以短書叙慶而楮墨澀訥豈惟不足以敷寫海內傾誦之意顧在微生誠心欣戴曾未究展萬一何勝慚恨唯祈即膺爰立之命攄發逺業以濟元元使得繼馳賀幅少畢願言無任勤懇拙薄仰祿于此忽忽踰年無補公家徒自慚怍獨幸大賢得志澤被區宇惟是不才得與動植仰均餘潤苐切欣躍自賀耳與人初夏不審鈞候何似恭惟神明協輔慶履日新時方清和物被長養更乞茂對令序善保威崇少副中外屬望之意伏念違離閎屏積有歲序永惟終始顧矚之眷刻畫寸臆殆今不忘奔走小官既不獲日奉灑掃之役至於參候宴起彌時缺然愧負鴻私殆無說以自恕惟倚寬大有以諒其嚮往之實耳無任拳拳祝望之切某昨者率爾問起居蓋恃門下照知之舊不以凂黷為罪方爾恐愧遽拜鈞翰之寵辭情欵昵所以慰藉之意尤渥伏讀感戴不知所言職守拘縻無緣祗伏軒垿以謝異數徒劇慚悚伏乞賜諒比審眷留闕庭疊侍黼座恩數之渥敻無前比圖任共政非公而誰佇聞詔麻正位宰席康濟寰㝢對越在天四海所懷施諸今日乃士民朝夕顒顒之望顧惟頑鄙得與動植均被休澤何勝千萬之幸某叨祿奉親從事不敏此心兢兢常恐有玷門下疇昔誤知之意備數偏州稍逭曠罰蓋自輝潤之出况當恩席行執魁柄在寒賤欣躍區區不止逃罪戾而已也與吳尚書某不望幕履下俯仰踰年念念眷撫之隆實惟朝夕小官匏繫漫無參省之便尺牘寓勤復爾不繼仰負收恤徒自愧訟正惟門下照知之舊情恕必矣然在孱薄終不自安也自頃超陟省座實階大用多士稱慶殆不容口洪惟忠義直節簡在帝心畀命樞衡當不越旦暮蓋民所同願顧被遇之深者猶勤勤於祝望也寒門冷族誰肯顧眄而兄弟賤陋最荷矜恤闔户戴德不知所喻唯祈早膺柄用使得與動植均被惠澤誠心頌願拳拳以之某備數偏州叨祿為老稚之賴未從汰遣猥自奬庇之出區區感仰欲言不盡與張守伏念旬浹不侍幕履永懷恩紀之重實惟朝夕涉履修阻參訊興居不覺緩後雖門下眷知之渥端能諒其匪懈然不敏之迹已疑於逋慢矣無任栗栗比日不審鎮撫多暇宴起何似時方清和物被長養更乞善綏福祿前對顯重之寵下情祈願良切昔者竊聞盛德之譽載在多士居限疏逺無階參拜徒有嚮往區區然亦以為翔翥清切屬被大任久矣不謂屈臨一州而冗散無似實𨽻麾下猥沿趨走得償積歲願見之誠豈天姑遲晉擢特以為不肖者幸耶所恨遽易職事不獲從容扣請左右竊計召節趣還在旦暮頃則出入門下以畢願言尚何晚耶某伏念備數吏屬閲日未幾而撫存顧遇之厚有若素役於左右者此心銜荷已無窮盡誤恩遽及告去有日更䝉贐賚稠沓犒餞周至仰惟終始之眷度越夷等感戀實亦稱是雖孱薄略無報塞之萬一敢不佩服永為不忘耶寵假卒夫大濟旅瑣感激萬萬四名者先遣還其二候置到建茶當令賫回伏恐尊意京師别有幹委伏乞下喻
